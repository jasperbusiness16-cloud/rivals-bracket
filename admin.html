<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Rivals Gauntlet</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<script>
const adminPassword = prompt("Enter admin password:");

if (adminPassword !== "77hawkeyes") {
  document.body.innerHTML =
    "<h1 style='color:white;text-align:center;margin-top:100px;'>Access Denied</h1>";
}
</script>

<section class="page-hero">
  <p class="eyebrow">ADMIN PANEL</p>
  <h1>Rivals Gauntlet Control</h1>
  <p>Update tournament info across the website.</p>
</section>

<section class="event-card admin-card">
  <div class="admin-section">
<h2>Event Settings</h2>

<label>Event Name</label>
  <input id="eventName" placeholder="Event Name">

  <label>Prize Pool</label>
<input id="prizePool" placeholder="$60">

<label>Starting Prize Pool</label>
<input id="startingPrizePool" placeholder="$60">

<label>Community Donations</label>
<input id="communityDonations" placeholder="+$0">
<label>Donation Goal</label>
<input id="donationGoal" placeholder="$250">
  
  <label>Registration Status</label>
<select id="registrationStatus">
  <option value="OPEN">OPEN</option>
  <option value="CLOSED">CLOSED</option>
  <option value="FULL">FULL</option>
</select>

  <label>Countdown Date</label>
  <input id="countdownDate" placeholder="2026-06-27T19:00:00-06:00">

  <label>Live Status</label>
<select id="status">
  <option value="● OFFLINE">● OFFLINE</option>
  <option value="● LIVE">● LIVE</option>
</select>

  <label>Current Match</label>
<select id="currentMatch">
  <option value="No Match Live">No Match Live</option>
<option value="R16-1 • Bo3">R16-1 • Bo3</option>
<option value="R16-2 • Bo3">R16-2 • Bo3</option>
<option value="R16-3 • Bo3">R16-3 • Bo3</option>
<option value="R16-4 • Bo3">R16-4 • Bo3</option>
<option value="R16-5 • Bo3">R16-5 • Bo3</option>
<option value="R16-6 • Bo3">R16-6 • Bo3</option>
<option value="R16-7 • Bo3">R16-7 • Bo3</option>
<option value="R16-8 • Bo3">R16-8 • Bo3</option>
  <option value="QF1 • Bo3">QF1 • Bo3</option>
  <option value="QF2 • Bo3">QF2 • Bo3</option>
  <option value="QF3 • Bo3">QF3 • Bo3</option>
  <option value="QF4 • Bo3">QF4 • Bo3</option>

  <option value="SF1 • Bo3">SF1 • Bo3</option>
  <option value="SF2 • Bo3">SF2 • Bo3</option>

 <option value="Grand Finals • Bo5">Grand Finals • Bo5</option>
</select>

</div>

<div class="admin-section">
<h2>Tournament Info</h2>

<label>Total Payout</label>
<input id="totalPayout" placeholder="$0">

<label>Events Hosted</label>
<input id="eventsHosted" placeholder="1">

  <label>Tournament Format</label>
  <select id="formatType">
    <option value="8_single_elim">8 Team Single Elimination</option>
    <option value="16_single_elim">16 Team Single Elimination</option>
    <option value="8_double_elim">8 Team Double Elimination</option>
  </select>

  </div>

<div class="admin-section">

  <input id="team1" placeholder="Team 1">

  <label>Team 2</label>
  <input id="team2" placeholder="Team 2">

  <label>Team 3</label>

  <button class="join-btn" onclick="saveSiteData()">SAVE CHANGES</button>

<div style="margin-top:25px; display:grid; gap:12px;">
  <button class="secondary" onclick="resetScoresOnly()">RESET SCORES ONLY</button>
