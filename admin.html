<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
  <title>Rivals Gauntlet Admin Bracket</title>
  <link rel="stylesheet" href="style.css?v=50">
</head>
<body>

<button id="resetBtn" style="
position:fixed;
top:10px;
left:10px;
z-index:9999;
padding:10px;
font-weight:bold;
background:black;
color:gold;
border:2px solid gold;
">
Reset Tournament
</button>

<div class="bracket-container">
  <img src="835B94F1-D99E-4ED1-970E-77F3EEFE91AA.png" class="bracket-img">

  <div id="A_R1_M1_T1" class="team a-r1-m1-t1" onclick="pick('A_R1_M1','Team 1')">Team 1</div>
  <div id="A_R1_M1_T2" class="team a-r1-m1-t2" onclick="pick('A_R1_M1','Team 2')">Team 2</div>

  <div id="A_R1_M2_T1" class="team a-r1-m2-t1" onclick="pick('A_R1_M2','Team 3')">Team 3</div>
  <div id="A_R1_M2_T2" class="team a-r1-m2-t2" onclick="pick('A_R1_M2','Team 4')">Team 4</div>

  <div id="A_WIN_T1" class="team a-win-t1" onclick="pick('A_WIN','slot:A_WIN_T1')"></div>
  <div id="A_WIN_T2" class="team a-win-t2" onclick="pick('A_WIN','slot:A_WIN_T2')"></div>

  <div id="A_LOSE_T1" class="team a-lose-t1" onclick="pick('A_LOSE','slot:A_LOSE_T1')"></div>
  <div id="A_LOSE_T2" class="team a-lose-t2" onclick="pick('A_LOSE','slot:A_LOSE_T2')"></div>

  <div id="A_FINAL_LOSE_T1" class="team a-final-lose-t1" onclick="pick('A_FINAL_LOSE','slot:A_FINAL_LOSE_T1')"></div>
  <div id="A_FINAL_LOSE_T2" class="team a-final-lose-t2" onclick="pick('A_FINAL_LOSE','slot:A_FINAL_LOSE_T2')"></div>

  <div id="A_SEMI_T1" class="team a-semi-t1" onclick="pick('A_SEMI','slot:A_SEMI_T1')"></div>
  <div id="A_SEMI_T2" class="team a-semi-t2" onclick="pick('A_SEMI','slot:A_SEMI_T2')"></div>

  <div id="B_R1_M1_T1" class="team b-r1-m1-t1" onclick="pick('B_R1_M1','Team 5')">Team 5</div>
  <div id="B_R1_M1_T2" class="team b-r1-m1-t2" onclick="pick('B_R1_M1','Team 6')">Team 6</div>

  <div id="B_R1_M2_T1" class="team b-r1-m2-t1" onclick="pick('B_R1_M2','Team 7')">Team 7</div>
  <div id="B_R1_M2_T2" class="team b-r1-m2-t2" onclick="pick('B_R1_M2','Team 8')">Team 8</div>

  <div id="B_WIN_T1" class="team b-win-t1" onclick="pick('B_WIN','slot:B_WIN_T1')"></div>
  <div id="B_WIN_T2" class="team b-win-t2" onclick="pick('B_WIN','slot:B_WIN_T2')"></div>

  <div id="B_LOSE_T1" class="team b-lose-t1" onclick="pick('B_LOSE','slot:B_LOSE_T1')"></div>
  <div id="B_LOSE_T2" class="team b-lose-t2" onclick="pick('B_LOSE','slot:B_LOSE_T2')"></div>

  <div id="B_FINAL_LOSE_T1" class="team b-final-lose-t1" onclick="pick('B_FINAL_LOSE','slot:B_FINAL_LOSE_T1')"></div>
  <div id="B_FINAL_LOSE_T2" class="team b-final-lose-t2" onclick="pick('B_FINAL_LOSE','slot:B_FINAL_LOSE_T2')"></div>

  <div id="B_SEMI_T1" class="team b-semi-t1" onclick="pick('B_SEMI','slot:B_SEMI_T1')"></div>
  <div id="B_SEMI_T2" class="team b-semi-t2" onclick="pick('B_SEMI','slot:B_SEMI_T2')"></div>

<div id="GRAND_T1" class="team grand-t1" onclick="pick('GRAND','slot:GRAND_T1')"></div>
<div id="GRAND_T2" class="team grand-t2" onclick="pick('GRAND','slot:GRAND_T2')"></div>

<div id="champion" class="champion"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="firebase.js"></script>

<script>
  window.IS_ADMIN = true;

  document.getElementById("resetBtn").addEventListener("click", function () {
    if (!confirm("Reset the entire tournament?")) return;

    database.ref("rivalsBracketV2").set({})
      .then(() => alert("Tournament reset."))
      .catch((error) => alert("Reset failed: " + error.message));
  });
</script>

<script src="script.js"></script>

</body>
</html>
