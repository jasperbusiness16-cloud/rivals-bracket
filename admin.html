<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Rivals Gauntlet</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<script>
const adminPassword = prompt("Enter admin password:");

if (adminPassword !== "77hawkeyes") {
  document.body.innerHTML =
    "<h1 style='color:white;text-align:center;margin-top:100px;'>Access Denied</h1>";
}
</script>

<section class="page-hero">
  <p class="eyebrow">ADMIN PANEL</p>
  <h1>Rivals Gauntlet Control</h1>
  <p>Update tournament info across the website.</p>
</section>

<section class="event-card admin-card">
  <h2>Site Controls</h2>

  <label>Event Name</label>
  <input id="eventName" placeholder="Event Name">

  <label>Prize Pool</label>
<input id="prizePool" placeholder="$60">

<label>Starting Prize Pool</label>
<input id="startingPrizePool" placeholder="$60">

<label>Community Donations</label>
<input id="communityDonations" placeholder="+$0">
<label>Donation Goal</label>
<input id="donationGoal" placeholder="$250">
  
  <label>Registration Status</label>
<select id="registrationStatus">
  <option value="OPEN">OPEN</option>
  <option value="CLOSED">CLOSED</option>
  <option value="FULL">FULL</option>
</select>

  <label>Countdown Date</label>
  <input id="countdownDate" placeholder="2026-06-27T19:00:00-06:00">

  <label>Live Status</label>
<select id="status">
  <option value="● OFFLINE">● OFFLINE</option>
  <option value="● LIVE">● LIVE</option>
</select>

  <label>Current Match</label>
<select id="currentMatch">
  <option value="No Match Live">No Match Live</option>

  <option value="QF1 • Bo3">QF1 • Bo3</option>
  <option value="QF2 • Bo3">QF2 • Bo3</option>
  <option value="QF3 • Bo3">QF3 • Bo3</option>
  <option value="QF4 • Bo3">QF4 • Bo3</option>

  <option value="SF1 • Bo3">SF1 • Bo3</option>
  <option value="SF2 • Bo3">SF2 • Bo3</option>

  <option value="Grand Finals • Bo5">Grand Finals • Bo5</option>
</select>

  <label>Total Payout</label>
  <input id="totalPayout" placeholder="$0">

  <label>Events Hosted</label>
  <input id="eventsHosted" placeholder="1">

  <label>Tournament Format</label>
  <select id="formatType">
    <option value="8_single_elim">8 Team Single Elimination</option>
    <option value="16_single_elim">16 Team Single Elimination</option>
    <option value="8_double_elim">8 Team Double Elimination</option>
  </select>

  <h2 style="margin-top:35px;">Team Names</h2>

  <label>Team 1</label>
  <input id="team1" placeholder="Team 1">

  <label>Team 2</label>
  <input id="team2" placeholder="Team 2">

  <label>Team 3</label>
  <input id="team3" placeholder="Team 3">

  <label>Team 4</label>
  <input id="team4" placeholder="Team 4">

  <label>Team 5</label>
  <input id="team5" placeholder="Team 5">

  <label>Team 6</label>
  <input id="team6" placeholder="Team 6">

  <label>Team 7</label>
  <input id="team7" placeholder="Team 7">

  <label>Team 8</label>
  <input id="team8" placeholder="Team 8">

  <h2 style="margin-top:35px;">Match Winners</h2>

  <label>QF1 Winner</label>
  <select id="qf1Winner"></select>

  <label id="qf1Team1Label">Team 1 Score</label>
  <input id="qf1Team1Score" placeholder="0">

  <label id="qf1Team2Label">Team 2 Score</label>
  <input id="qf1Team2Score" placeholder="0">

  <label>QF2 Winner</label>
  <select id="qf2Winner"></select>

  <label id="qf2Team1Label">Team 3 Score</label>
  <input id="qf2Team1Score" placeholder="0">

  <label id="qf2Team2Label">Team 4 Score</label>
  <input id="qf2Team2Score" placeholder="0">

  <label>QF3 Winner</label>
  <select id="qf3Winner"></select>

  <label id="qf3Team1Label">Team 5 Score</label>
  <input id="qf3Team1Score" placeholder="0">

  <label id="qf3Team2Label">Team 6 Score</label>
  <input id="qf3Team2Score" placeholder="0">

  <label>QF4 Winner</label>
  <select id="qf4Winner"></select>

  <label id="qf4Team1Label">Team 7 Score</label>
  <input id="qf4Team1Score" placeholder="0">

  <label id="qf4Team2Label">Team 8 Score</label>
  <input id="qf4Team2Score" placeholder="0">

  <label>SF1 Winner</label>
<select id="sf1Winner"></select>

<label id="sf1Team1Label">SF1 Team 1 Score</label>
<input id="sf1Team1Score" placeholder="0">

<label id="sf1Team2Label">SF1 Team 2 Score</label>
<input id="sf1Team2Score" placeholder="0">

<label>SF2 Winner</label>
<select id="sf2Winner"></select>

<label id="sf2Team1Label">SF2 Team 1 Score</label>
<input id="sf2Team1Score" placeholder="0">

<label id="sf2Team2Label">SF2 Team 2 Score</label>
<input id="sf2Team2Score" placeholder="0">

<label>Grand Finals Winner</label>
<select id="grandWinner"></select>

<label id="gfTeam1Label">GF Team 1 Score</label>
<input id="gfTeam1Score" placeholder="0">

<label id="gfTeam2Label">GF Team 2 Score</label>
<input id="gfTeam2Score" placeholder="0">

  <button class="join-btn" onclick="saveSiteData()">SAVE CHANGES</button>

<div style="margin-top:25px; display:grid; gap:12px;">
  <button class="secondary" onclick="resetScoresOnly()">RESET SCORES ONLY</button>
  <button class="secondary" onclick="resetWinnersOnly()">RESET WINNERS ONLY</button>
  <button class="join-btn" onclick="resetFullTournament()">RESET FULL TOURNAMENT</button>
</div>
  
  <p id="saveStatus"></p>
</section>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase.js"></script>
<script src="admin.js?v=3"></script>

</body>
</html>
