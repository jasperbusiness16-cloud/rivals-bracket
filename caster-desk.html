<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">

  <title>Rivals Gauntlet | Caster Desk</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --bg: #06060b;
      --panel: rgba(13, 12, 21, 0.94);
      --panel-soft: rgba(22, 17, 37, 0.9);

      --text: #f8f5ff;
      --soft: #c9c2d5;
      --muted: #8e8799;
      --dim: #625b6e;

      --purple: #9a7cff;
      --purple-bright: #c4b2ff;
      --purple-rgb: 154, 124, 255;

      --green: #62e1a6;
      --yellow: #f2c66c;
      --red: #ff718a;

      --line: rgba(194, 176, 255, 0.14);
      --line-strong: rgba(194, 176, 255, 0.32);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 1920px;
      height: 1080px;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      color: var(--text);
      font-family: "Rajdhani", Arial, sans-serif;
    }

    .studio-stage {
      position: relative;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      isolation: isolate;

      background:
        radial-gradient(
          circle at 50% 38%,
          rgba(var(--purple-rgb), 0.12),
          transparent 29%
        ),
        radial-gradient(
          circle at 8% 18%,
          rgba(92, 57, 190, 0.1),
          transparent 31%
        ),
        radial-gradient(
          circle at 92% 75%,
          rgba(91, 56, 190, 0.08),
          transparent 34%
        ),
        linear-gradient(
          145deg,
          #110d1d 0%,
          #09080f 46%,
          #05050a 100%
        );
    }

    .studio-stage::before {
      content: "";
      position: absolute;
      inset: -70px;
      z-index: -7;

      background:
        linear-gradient(
          116deg,
          transparent 0 23%,
          rgba(255, 255, 255, 0.012) 23.2% 23.45%,
          transparent 23.7% 75%,
          rgba(255, 255, 255, 0.009) 75.2% 75.45%,
          transparent 75.7%
        ),
        repeating-linear-gradient(
          90deg,
          transparent 0 98px,
          rgba(255, 255, 255, 0.007) 99px,
          transparent 100px 196px
        );

      animation:
        backgroundDrift 32s ease-in-out
        infinite alternate;
    }

    .studio-stage::after {
      content: "RG";
      position: absolute;
      left: 50%;
      top: 53%;
      z-index: -6;

      color: rgba(255, 255, 255, 0.012);
      font-size: 720px;
      font-weight: 800;
      line-height: 0.72;
      letter-spacing: -0.12em;

      transform: translate(-48%, -50%);
    }

    .studio-grid {
      position: absolute;
      inset: -120px;
      z-index: -5;

      opacity: 0.34;

      background-image:
        linear-gradient(
          rgba(var(--purple-rgb), 0.035) 1px,
          transparent 1px
        ),
        linear-gradient(
          90deg,
          rgba(var(--purple-rgb), 0.035) 1px,
          transparent 1px
        );

      background-size: 84px 84px;

      transform:
        perspective(780px)
        rotateX(68deg)
        translateY(470px)
        scale(1.32);

      transform-origin: center bottom;

      mask-image:
        linear-gradient(
          to top,
          black,
          transparent 80%
        );

      animation:
        gridTravel 24s linear infinite;
    }

    .studio-orb {
      position: absolute;
      z-index: -4;
      border-radius: 50%;
      filter: blur(4px);
      pointer-events: none;
    }

    .studio-orb.orb-left {
      width: 420px;
      height: 420px;
      left: -150px;
      top: 245px;

      border:
        1px solid
        rgba(var(--purple-rgb), 0.065);

      background:
        radial-gradient(
          circle,
          rgba(var(--purple-rgb), 0.04),
          transparent 68%
        );

      animation:
        orbitFloatLeft 18s ease-in-out
        infinite alternate;
    }

    .studio-orb.orb-right {
      width: 560px;
      height: 560px;
      right: -210px;
      top: 115px;

      border:
        1px solid
        rgba(var(--purple-rgb), 0.055);

      background:
        radial-gradient(
          circle,
          rgba(var(--purple-rgb), 0.035),
          transparent 70%
        );

      animation:
        orbitFloatRight 23s ease-in-out
        infinite alternate;
    }

    .studio-frame {
      position: absolute;
      inset: 28px;
      z-index: 40;
      pointer-events: none;

      border:
        1px solid
        rgba(var(--purple-rgb), 0.1);

      clip-path: polygon(
        0 0,
        17% 0,
        18% 6px,
        82% 6px,
        83% 0,
        100% 0,
        100% 27%,
        calc(100% - 6px) 28%,
        calc(100% - 6px) 72%,
        100% 73%,
        100% 100%,
        83% 100%,
        82% calc(100% - 6px),
        18% calc(100% - 6px),
        17% 100%,
        0 100%,
        0 73%,
        6px 72%,
        6px 28%,
        0 27%
      );
    }

    .studio-header {
      position: absolute;
      left: 54px;
      right: 54px;
      top: 42px;
      z-index: 30;

      display: grid;
      grid-template-columns:
        minmax(320px, 1fr)
        minmax(520px, 1.35fr)
        minmax(320px, 1fr);

      align-items: center;
      gap: 22px;

      opacity: 0;
      transform: translateY(-15px);

      animation:
        headerEnter 780ms
        cubic-bezier(0.18, 0.86, 0.24, 1)
        90ms forwards;
    }

    .studio-brand {
      min-width: 0;

      display: flex;
      align-items: center;
      gap: 14px;
    }

    .studio-mark {
      position: relative;

      width: 56px;
      height: 56px;

      display: grid;
      place-items: center;

      flex: 0 0 auto;

      border:
        1px solid
        rgba(var(--purple-rgb), 0.42);

      border-radius: 15px;

      background:
        linear-gradient(
          145deg,
          rgba(var(--purple-rgb), 0.16),
          rgba(8, 7, 13, 0.96) 68%
        );

      box-shadow:
        inset 0 0 20px
        rgba(var(--purple-rgb), 0.08),
        0 0 26px
        rgba(var(--purple-rgb), 0.11);

      font-size: 21px;
      font-weight: 800;
      letter-spacing: -0.05em;
    }

    .studio-mark::before {
      content: "";
      position: absolute;
      inset: 6px;

      border:
        1px solid
        rgba(255, 255, 255, 0.045);

      border-radius: 10px;
    }

    .studio-brand-copy {
      min-width: 0;
    }

    .studio-brand-copy span,
    .studio-brand-copy strong {
      display: block;
    }

    .studio-brand-copy span {
      color: var(--purple-bright);

      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.21em;
      text-transform: uppercase;
    }

    .studio-brand-copy strong {
      max-width: 520px;

      margin-top: 4px;
      overflow: hidden;

      font-size: 23px;
      font-weight: 800;
      letter-spacing: 0.05em;

      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .match-status {
      position: relative;
      min-width: 0;

      display: grid;
      place-items: center;

      min-height: 58px;
      padding: 8px 58px;

      border:
        1px solid
        rgba(var(--purple-rgb), 0.14);

      border-radius: 18px;

      background:
        linear-gradient(
          180deg,
          rgba(var(--purple-rgb), 0.065),
          rgba(8, 8, 14, 0.7)
        );

      box-shadow:
        inset 0 1px 0
        rgba(255, 255, 255, 0.025),
        0 14px 42px
        rgba(0, 0, 0, 0.24);

      text-align: center;
    }

    .match-status::before,
    .match-status::after {
      content: "";

      position: absolute;
      top: 50%;

      width: 34px;
      height: 1px;

      background:
        linear-gradient(
          90deg,
          transparent,
          rgba(var(--purple-rgb), 0.45)
        );
    }

    .match-status::before {
      left: 14px;
    }

    .match-status::after {
      right: 14px;
      transform: scaleX(-1);
    }

    .match-status span,
    .match-status strong {
      display: block;
      max-width: 100%;
    }

    .match-status span {
      color: var(--purple-bright);

      font-size: 8px;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .match-status strong {
      margin-top: 4px;
      overflow: hidden;

      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.045em;

      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .studio-meta {
      min-width: 0;

      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
    }

    .connection {
      min-height: 36px;

      display: flex;
      align-items: center;
      gap: 8px;

      padding: 0 13px;

      border:
        1px solid
        rgba(242, 198, 108, 0.2);

      border-radius: 999px;

      color: var(--yellow);

      background:
        rgba(242, 198, 108, 0.055);

      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    .connection.online {
      border-color:
        rgba(98, 225, 166, 0.22);

      color: var(--green);

      background:
        rgba(98, 225, 166, 0.055);
    }

    .connection.error {
      border-color:
        rgba(255, 113, 138, 0.25);

      color: var(--red);

      background:
        rgba(255, 113, 138, 0.06);
    }

    .connection-dot {
      width: 7px;
      height: 7px;

      border-radius: 50%;

      background: currentColor;

      box-shadow:
        0 0 11px currentColor;
    }

    .website-pill {
      min-height: 36px;

      display: flex;
      align-items: center;

      padding: 0 14px;

      border:
        1px solid
        rgba(var(--purple-rgb), 0.15);

      border-radius: 999px;

      color: var(--soft);

      background:
        rgba(var(--purple-rgb), 0.035);

      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .caster-zone {
      position: absolute;
      left: 54px;
      right: 54px;
      top: 132px;
      bottom: 122px;
      z-index: 10;

      display: grid;
      place-items: center;
    }

    .caster-layout {
      width: 100%;
      height: 100%;

      display: grid;
      align-items: center;
      justify-content: center;
      align-content: center;

      gap: 26px;

      transition:
        opacity 0.25s ease,
        transform 0.35s
        cubic-bezier(0.2, 0.8, 0.2, 1),
        filter 0.25s ease;
    }

    .caster-layout.is-changing {
      opacity: 0;

      transform:
        scale(0.985)
        translateY(8px);

      filter: blur(3px);
    }

    .caster-layout[data-count="1"] {
      grid-template-columns: 980px;
    }

    .caster-layout[data-count="2"] {
      grid-template-columns:
        repeat(2, 760px);
    }

    .caster-layout[data-count="3"] {
      grid-template-columns:
        repeat(3, 535px);
    }

    .caster-layout[data-count="4"] {
      grid-template-columns:
        repeat(2, 560px);

      grid-template-rows:
        repeat(2, auto);

      gap: 18px 28px;
    }

    .caster-slot {
      position: relative;
      min-width: 0;

      opacity: 0;

      transform:
        translateY(24px)
        scale(0.975);

      animation:
        casterEnter 700ms
        cubic-bezier(0.18, 0.86, 0.24, 1)
        var(--slot-delay, 220ms)
        forwards;
    }

    .camera-frame {
      position: relative;
      width: 100%;

      aspect-ratio: 16 / 9;

      overflow: hidden;

      border:
        1px solid
        rgba(var(--purple-rgb), 0.26);

      border-radius: 22px 22px 8px 8px;

      background:
        linear-gradient(
          145deg,
          rgba(var(--purple-rgb), 0.06),
          rgba(5, 5, 10, 0.95) 62%
        );

      box-shadow:
        0 28px 74px
        rgba(0, 0, 0, 0.46),
        inset 0 1px 0
        rgba(255, 255, 255, 0.035),
        inset 0 0 42px
        rgba(var(--purple-rgb), 0.045);

      animation:
        frameBreath 8s ease-in-out
        var(--frame-delay, 0s)
        infinite;
    }

    .camera-frame::before {
      content: "";

      position: absolute;
      inset: 8px;
      z-index: 2;

      border:
        1px solid
        rgba(255, 255, 255, 0.035);

      border-radius: 15px 15px 5px 5px;

      pointer-events: none;

      clip-path: polygon(
        0 0,
        88% 0,
        100% 16%,
        100% 100%,
        12% 100%,
        0 84%
      );
    }

    .camera-frame::after {
      content: "";

      position: absolute;
      left: 9%;
      right: 9%;
      top: 0;
      z-index: 3;

      height: 2px;

      background:
        linear-gradient(
          90deg,
          transparent,
          rgba(var(--purple-rgb), 0.48) 24%,
          rgba(229, 221, 255, 0.78) 50%,
          rgba(var(--purple-rgb), 0.48) 76%,
          transparent
        );

      opacity: 0.75;
    }

    .camera-space {
      position: absolute;
      inset: 10px;

      overflow: hidden;

      border-radius: 14px 14px 4px 4px;

      background:
        radial-gradient(
          circle at 50% 35%,
          rgba(var(--purple-rgb), 0.075),
          transparent 42%
        ),
        repeating-linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.012) 0 1px,
          transparent 1px 18px
        ),
        rgba(3, 3, 7, 0.76);
    }

    .camera-space::before {
      content: "";

      position: absolute;
      inset: 0;

      background:
        linear-gradient(
          180deg,
          transparent 55%,
          rgba(0, 0, 0, 0.42)
        );
    }

    .camera-space::after {
      content: attr(data-camera-label);

      position: absolute;
      left: 50%;
      top: 50%;

      color:
        rgba(255, 255, 255, 0.055);

      font-size: clamp(18px, 2vw, 36px);
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      white-space: nowrap;

      transform:
        translate(-50%, -50%);
    }

    .frame-corner {
      position: absolute;
      z-index: 4;

      width: 36px;
      height: 36px;

      pointer-events: none;

      opacity: 0.78;

      animation:
        cornerPulse 6s ease-in-out
        var(--corner-delay, 0s)
        infinite;
    }

    .frame-corner::before,
    .frame-corner::after {
      content: "";
      position: absolute;

      background:
        rgba(var(--purple-rgb), 0.62);

      box-shadow:
        0 0 9px
        rgba(var(--purple-rgb), 0.28);
    }

    .frame-corner::before {
      width: 100%;
      height: 2px;
    }

    .frame-corner::after {
      width: 2px;
      height: 100%;
    }

    .frame-corner.top-left {
      left: 0;
      top: 0;
    }

    .frame-corner.top-right {
      right: 0;
      top: 0;
      transform: rotate(90deg);
    }

    .frame-corner.bottom-right {
      right: 0;
      bottom: 0;
      transform: rotate(180deg);
    }

    .frame-corner.bottom-left {
      left: 0;
      bottom: 0;
      transform: rotate(270deg);
    }

    .caster-nameplate {
      position: relative;
      min-width: 0;

      min-height: 84px;

      display: grid;
      grid-template-columns:
        46px minmax(0, 1fr) auto;

      align-items: center;
      gap: 14px;

      margin: -1px 18px 0;
      padding: 13px 18px;

      overflow: hidden;

      border:
        1px solid
        rgba(var(--purple-rgb), 0.2);

      border-top-color:
        rgba(var(--purple-rgb), 0.35);

      border-radius: 0 0 18px 18px;

      background:
        radial-gradient(
          circle at 14% 0%,
          rgba(var(--purple-rgb), 0.12),
          transparent 38%
        ),
        linear-gradient(
          110deg,
          rgba(25, 19, 43, 0.97),
          rgba(8, 8, 14, 0.98)
        );

      box-shadow:
        0 18px 42px
        rgba(0, 0, 0, 0.38),
        inset 0 1px 0
        rgba(255, 255, 255, 0.025);
    }

    .caster-nameplate::before {
      content: "";

      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;

      width: 3px;

      background:
        linear-gradient(
          180deg,
          transparent,
          var(--purple),
          transparent
        );

      box-shadow:
        0 0 11px
        rgba(var(--purple-rgb), 0.36);
    }

    .caster-nameplate.data-updated {
      animation:
        plateDataPulse 620ms ease;
    }

    .plate-number {
      width: 42px;
      height: 42px;

      display: grid;
      place-items: center;

      border:
        1px solid
        rgba(var(--purple-rgb), 0.22);

      border-radius: 11px;

      color: var(--purple-bright);

      background:
        rgba(var(--purple-rgb), 0.05);

      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .plate-copy {
      min-width: 0;
    }

    .plate-copy strong,
    .plate-copy small {
      display: block;
      overflow: hidden;

      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .plate-copy strong {
      font-size: 25px;
      font-weight: 800;
      letter-spacing: 0.035em;
      text-transform: uppercase;
    }

    .plate-copy small {
      margin-top: 3px;

      color: var(--purple-bright);

      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .plate-handle {
      max-width: 190px;
      overflow: hidden;

      color: var(--muted);

      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;

      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .caster-layout[data-count="3"] .caster-nameplate,
    .caster-layout[data-count="4"] .caster-nameplate {
      min-height: 74px;

      grid-template-columns:
        38px minmax(0, 1fr);

      gap: 10px;

      margin-left: 10px;
      margin-right: 10px;
      padding: 10px 13px;
    }

    .caster-layout[data-count="3"] .plate-number,
    .caster-layout[data-count="4"] .plate-number {
      width: 34px;
      height: 34px;

      border-radius: 9px;
      font-size: 9px;
    }

    .caster-layout[data-count="3"] .plate-copy strong {
      font-size: 19px;
    }

    .caster-layout[data-count="4"] .plate-copy strong {
      font-size: 18px;
    }

    .caster-layout[data-count="3"] .plate-copy small,
    .caster-layout[data-count="4"] .plate-copy small {
      font-size: 8px;
    }

    .caster-layout[data-count="3"] .plate-handle,
    .caster-layout[data-count="4"] .plate-handle {
      display: none;
    }

    .standby-panel {
      width: 720px;
      min-height: 280px;

      display: none;
      place-items: center;

      padding: 42px;

      border:
        1px solid
        rgba(var(--purple-rgb), 0.18);

      border-radius: 25px;

      background:
        linear-gradient(
          145deg,
          rgba(var(--purple-rgb), 0.065),
          rgba(8, 8, 14, 0.94)
        );

      box-shadow:
        0 28px 74px
        rgba(0, 0, 0, 0.42);

      text-align: center;
    }

    .standby-panel.active {
      display: grid;
    }

    .standby-mark {
      width: 74px;
      height: 74px;

      display: grid;
      place-items: center;

      margin: 0 auto 18px;

      border:
        1px solid
        rgba(var(--purple-rgb), 0.35);

      border-radius: 18px;

      background:
        rgba(var(--purple-rgb), 0.06);

      font-size: 29px;
      font-weight: 800;
    }

    .standby-panel h2 {
      margin: 0;

      font-size: 34px;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .standby-panel p {
      margin: 9px 0 0;

      color: var(--muted);

      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .studio-footer {
      position: absolute;
      left: 54px;
      right: 54px;
      bottom: 34px;
      z-index: 30;

      display: grid;
      grid-template-columns:
        1fr auto 1fr;

      align-items: center;
      gap: 22px;

      opacity: 0;

      transform:
        translateY(13px);

      animation:
        footerEnter 720ms
        cubic-bezier(0.18, 0.86, 0.24, 1)
        470ms forwards;
    }

    .footer-line {
      height: 1px;

      background:
        linear-gradient(
          90deg,
          transparent,
          rgba(var(--purple-rgb), 0.3)
        );
    }

    .footer-line:last-child {
      transform: scaleX(-1);
    }

    .footer-content {
      display: flex;
      align-items: center;
      gap: 15px;

      white-space: nowrap;
    }

    .footer-content strong {
      color: var(--text);

      font-size: 19px;
      font-weight: 800;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    .footer-node {
      width: 5px;
      height: 5px;

      border-radius: 50%;

      background: var(--purple);

      box-shadow:
        0 0 10px
        rgba(var(--purple-rgb), 0.6);

      animation:
        nodePulse 3.4s
        ease-in-out infinite;
    }

    .footer-item {
      color: var(--muted);

      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    @keyframes backgroundDrift {
      from {
        transform:
          translate3d(-16px, -8px, 0)
          scale(1.012);
      }

      to {
        transform:
          translate3d(18px, 12px, 0)
          scale(1.028);
      }
    }

    @keyframes gridTravel {
      to {
        background-position:
          0 84px,
          84px 0;
      }
    }

    @keyframes orbitFloatLeft {
      from {
        transform:
          translate(-8px, -10px)
          scale(0.96);
      }

      to {
        transform:
          translate(24px, 18px)
          scale(1.05);
      }
    }

    @keyframes orbitFloatRight {
      from {
        transform:
          translate(14px, -14px)
          scale(1.04);
      }

      to {
        transform:
          translate(-22px, 22px)
          scale(0.95);
      }
    }

    @keyframes headerEnter {
      to {
        opacity: 1;
        transform: none;
      }
    }

    @keyframes casterEnter {
      to {
        opacity: 1;
        transform: none;
      }
    }

    @keyframes footerEnter {
      to {
        opacity: 1;
        transform: none;
      }
    }

    @keyframes frameBreath {
      0%,
      100% {
        border-color:
          rgba(var(--purple-rgb), 0.22);

        box-shadow:
          0 28px 74px
          rgba(0, 0, 0, 0.46),
          inset 0 1px 0
          rgba(255, 255, 255, 0.035),
          inset 0 0 42px
          rgba(var(--purple-rgb), 0.04);
      }

      50% {
        border-color:
          rgba(var(--purple-rgb), 0.34);

        box-shadow:
          0 30px 78px
          rgba(0, 0, 0, 0.48),
          inset 0 1px 0
          rgba(255, 255, 255, 0.04),
          inset 0 0 48px
          rgba(var(--purple-rgb), 0.065);
      }
    }

    @keyframes cornerPulse {
      0%,
      100% {
        opacity: 0.48;
        transform: scale(0.92);
      }

      50% {
        opacity: 0.88;
        transform: scale(1);
      }
    }

    @keyframes plateDataPulse {
      0% {
        filter: brightness(1);
      }

      42% {
        filter: brightness(1.34);

        box-shadow:
          0 18px 42px
          rgba(0, 0, 0, 0.38),
          0 0 28px
          rgba(var(--purple-rgb), 0.12);
      }

      100% {
        filter: brightness(1);
      }
    }

    @keyframes nodePulse {
      0%,
      100% {
        opacity: 0.48;
        transform: scale(0.86);
      }

      50% {
        opacity: 1;
        transform: scale(1.15);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }

      .studio-header,
      .caster-slot,
      .studio-footer {
        opacity: 1 !important;
        transform: none !important;
      }
    }
  </style>
</head>

<body>
  <main class="studio-stage">
    <div
      class="studio-grid"
      aria-hidden="true"
    ></div>

    <div
      class="studio-orb orb-left"
      aria-hidden="true"
    ></div>

    <div
      class="studio-orb orb-right"
      aria-hidden="true"
    ></div>

    <div
      class="studio-frame"
      aria-hidden="true"
    ></div>

    <header class="studio-header">
      <div class="studio-brand">
        <div
          class="studio-mark"
          aria-hidden="true"
        >
          RG
        </div>

        <div class="studio-brand-copy">
          <span>
            Rivals Gauntlet Studio
          </span>

          <strong id="studioEventName">
            RIVALS GAUNTLET
          </strong>
        </div>
      </div>

      <div class="match-status">
        <span id="studioStatusLabel">
          Caster Desk
        </span>

        <strong id="studioMatchLabel">
          Pre-Show Coverage
        </strong>
      </div>

      <div class="studio-meta">
        <div
          id="studioConnection"
          class="connection"
        >
          <span class="connection-dot"></span>

          <span id="studioConnectionText">
            Connecting
          </span>
        </div>

        <div
          id="studioWebsiteTop"
          class="website-pill"
        >
          RIVALSGAUNTLET.COM
        </div>
      </div>
    </header>

    <section class="caster-zone">
      <div
        id="casterLayout"
        class="caster-layout"
        data-count="2"
      ></div>

      <section
        id="casterStandby"
        class="standby-panel"
      >
        <div>
          <div
            class="standby-mark"
            aria-hidden="true"
          >
            RG
          </div>

          <h2>
            Caster Desk Standby
          </h2>

          <p>
            The next studio segment will begin shortly.
          </p>
        </div>
      </section>
    </section>

    <footer class="studio-footer">
      <span class="footer-line"></span>

      <div class="footer-content">
        <strong id="studioWebsite">
          RIVALSGAUNTLET.COM
        </strong>

        <span class="footer-node"></span>

        <span
          id="studioFooterMatch"
          class="footer-item"
        >
          PRE-SHOW COVERAGE
        </span>

        <span class="footer-node"></span>

        <span
          id="studioPrizePool"
          class="footer-item"
        >
          LIVE PRIZE POOL
        </span>

        <span class="footer-node"></span>

        <span class="footer-item">
          PREDICTIONS • BRACKET • RG POINTS
        </span>
      </div>

      <span class="footer-line"></span>
    </footer>
  </main>

  <script>
    window.addEventListener(
      "error",

      function (event) {
        var connection =
          document.getElementById(
            "studioConnection"
          );

        var connectionText =
          document.getElementById(
            "studioConnectionText"
          );

        if (connection) {
          connection.classList.add(
            "error"
          );
        }

        if (connectionText) {
          connectionText.textContent =
            "SCRIPT ERROR";
        }

        console.error(
          "[RG CASTER DESK] Script error:",
          event.message
        );
      }
    );
  </script>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script src="../firebase.js?v=2"></script>

  <script>
    (function () {
      "use strict";

      var DEFAULT_WEBSITE =
        "RIVALSGAUNTLET.COM";

      var DEFAULT_CASTERS = [
        {
          id: "caster1",
          active: true,
          name: "JASPER HARVEY",
          role: "HOST",
          handle: ""
        },
        {
          id: "caster2",
          active: true,
          name: "CASTER TWO",
          role: "ANALYST",
          handle: ""
        },
        {
          id: "caster3",
          active: false,
          name: "GUEST CASTER",
          role: "GUEST",
          handle: ""
        },
        {
          id: "caster4",
          active: false,
          name: "CASTER FOUR",
          role: "ANALYST",
          handle: ""
        }
      ];

      var studioData = {};
      var siteData = {};
      var countdownData = {};
      var donationsData = [];

      var lastCasterSignature = "";
      var renderTimer = null;

      var studioEventName =
        document.getElementById(
          "studioEventName"
        );

      var studioStatusLabel =
        document.getElementById(
          "studioStatusLabel"
        );

      var studioMatchLabel =
        document.getElementById(
          "studioMatchLabel"
        );

      var studioWebsite =
        document.getElementById(
          "studioWebsite"
        );

      var studioWebsiteTop =
        document.getElementById(
          "studioWebsiteTop"
        );

      var studioFooterMatch =
        document.getElementById(
          "studioFooterMatch"
        );

      var studioPrizePool =
        document.getElementById(
          "studioPrizePool"
        );

      var casterLayout =
        document.getElementById(
          "casterLayout"
        );

      var casterStandby =
        document.getElementById(
          "casterStandby"
        );

      var studioConnection =
        document.getElementById(
          "studioConnection"
        );

      var studioConnectionText =
        document.getElementById(
          "studioConnectionText"
        );

      function clean(
        value,
        fallback
      ) {
        var text =
          value == null
            ? ""
            : String(value).trim();

        return text || fallback || "";
      }

      function escapeHtml(value) {
        return clean(value)
          .replace(
            /&/g,
            "&amp;"
          )
          .replace(
            /</g,
            "&lt;"
          )
          .replace(
            />/g,
            "&gt;"
          )
          .replace(
            /"/g,
            "&quot;"
          )
          .replace(
            /'/g,
            "&#039;"
          );
      }

      function moneyValue(
        value
      ) {
        var parsed =
          Number(
            String(
              value == null
                ? ""
                : value
            ).replace(
              /[^0-9.-]/g,
              ""
            )
          );

        return Number.isFinite(parsed)
          ? parsed
          : 0;
      }

      function formatMoney(value) {
        return new Intl.NumberFormat(
          "en-US",
          {
            style: "currency",
            currency: "USD",
            minimumFractionDigits: 0,
            maximumFractionDigits: 0
          }
        ).format(
          Math.max(
            0,
            Number(value) || 0
          )
        );
      }

      function normalizeWebsite(value) {
        return clean(
          value,
          DEFAULT_WEBSITE
        )
          .replace(
            /^https?:\/\//i,
            ""
          )
          .replace(
            /^www\./i,
            ""
          )
          .replace(
            /\/+$/,
            ""
          )
          .toUpperCase();
      }

      function getCurrentMatchText(value) {
        if (
          typeof value === "string"
        ) {
          return clean(value);
        }

        if (
          value &&
          typeof value === "object"
        ) {
          return clean(
            value.fullMatchId ||
            value.label ||
            value.name ||
            value.matchId ||
            value.id
          );
        }

        return "";
      }

      function prettyMatch(value) {
        var match =
          getCurrentMatchText(value);

        var text =
          match.toLowerCase();

        if (
          !text ||
          text.indexOf(
            "no match"
          ) !== -1
        ) {
          return "PRE-SHOW COVERAGE";
        }

        if (
          text.indexOf(
            "grand"
          ) !== -1 ||
          text.indexOf(
            "finals"
          ) !== -1
        ) {
          return "GRAND FINALS • BO5";
        }

        if (
          text.indexOf(
            "sf1"
          ) !== -1 ||
          text.indexOf(
            "semifinal 1"
          ) !== -1
        ) {
          return "SEMIFINAL 1 • BO3";
        }

        if (
          text.indexOf(
            "sf2"
          ) !== -1 ||
          text.indexOf(
            "semifinal 2"
          ) !== -1
        ) {
          return "SEMIFINAL 2 • BO3";
        }

        if (
          text.indexOf(
            "qf1"
          ) !== -1
        ) {
          return "QUARTERFINAL 1 • BO3";
        }

        if (
          text.indexOf(
            "qf2"
          ) !== -1
        ) {
          return "QUARTERFINAL 2 • BO3";
        }

        if (
          text.indexOf(
            "qf3"
          ) !== -1
        ) {
          return "QUARTERFINAL 3 • BO3";
        }

        if (
          text.indexOf(
            "qf4"
          ) !== -1
        ) {
          return "QUARTERFINAL 4 • BO3";
        }

        if (
          text.indexOf(
            "bo5"
          ) !== -1
        ) {
          return match
            .toUpperCase();
        }

        if (
          text.indexOf(
            "bo3"
          ) !== -1
        ) {
          return match
            .toUpperCase();
        }

        return match
          .toUpperCase();
      }

      function hasOwn(
        object,
        key
      ) {
        return Object.prototype
          .hasOwnProperty.call(
            object || {},
            key
          );
      }

      function oldSiteCaster(
        index
      ) {
        var enabledKey =
          "caster" +
          index +
          "Enabled";

        var nameKey =
          "caster" +
          index +
          "Name";

        var roleKey =
          "caster" +
          index +
          "Role";

        var handleKey =
          "caster" +
          index +
          "Handle";

        var hasEnabled =
          hasOwn(
            siteData,
            enabledKey
          );

        var hasName =
          clean(
            siteData[nameKey]
          ) !== "";

        var active;

        if (index === 1) {
          active = true;

        } else if (hasEnabled) {
          active =
            siteData[enabledKey] === true;

        } else if (hasName) {
          active = true;

        } else {
          active =
            index === 2;
        }

        return {
          id:
            "caster" + index,

          active: active,

          name:
            clean(
              siteData[nameKey],
              DEFAULT_CASTERS[
                index - 1
              ].name
            ),

          role:
            clean(
              siteData[roleKey],
              DEFAULT_CASTERS[
                index - 1
              ].role
            ),

          handle:
            clean(
              siteData[handleKey]
            )
        };
      }

      function newStudioCasters() {
        var source =
          studioData.casters;

        if (!source) {
          return [];
        }

        var list = [];

        if (
          Array.isArray(source)
        ) {
          source.forEach(
            function (
              caster,
              index
            ) {
              if (
                index >= 4
              ) {
                return;
              }

              caster =
                caster || {};

              list.push({
                id:
                  clean(
                    caster.id,
                    "caster" +
                    (
                      index + 1
                    )
                  ),

                active:
                  caster.active !==
                  false,

                name:
                  clean(
                    caster.name,
                    DEFAULT_CASTERS[
                      index
                    ].name
                  ),

                role:
                  clean(
                    caster.role,
                    DEFAULT_CASTERS[
                      index
                    ].role
                  ),

                handle:
                  clean(
                    caster.handle
                  )
              });
            }
          );

        } else {
          for (
            var index = 1;
            index <= 4;
            index += 1
          ) {
            var key =
              "caster" + index;

            var caster =
              source[key];

            if (!caster) {
              continue;
            }

            list.push({
              id: key,

              active:
                caster.active !==
                false,

              name:
                clean(
                  caster.name,
                  DEFAULT_CASTERS[
                    index - 1
                  ].name
                ),

              role:
                clean(
                  caster.role,
                  DEFAULT_CASTERS[
                    index - 1
                  ].role
                ),

              handle:
                clean(
                  caster.handle
                )
            });
          }
        }

        return list;
      }

      function getActiveCasters() {
        var configured =
          newStudioCasters();

        var list;

        if (configured.length) {
          list =
            configured;

        } else {
          list = [
            oldSiteCaster(1),
            oldSiteCaster(2),
            oldSiteCaster(3),
            oldSiteCaster(4)
          ];
        }

        list =
          list
            .filter(
              function (caster) {
                return caster.active;
              }
            )
            .slice(0, 4);

        if (
          !list.length &&
          studioData.visible !==
          false
        ) {
          list = [
            DEFAULT_CASTERS[0]
          ];
        }

        return list;
      }

      function renderCasterMarkup(
        caster,
        index
      ) {
        var handle =
          clean(
            caster.handle
          );

        return (
          '<article ' +
            'class="caster-slot" ' +
            'style="' +
              '--slot-index:' +
                index +
              ';' +
              '--slot-delay:' +
                (
                  220 +
                  index * 120
                ) +
                'ms;' +
              '--frame-delay:-' +
                (
                  index * 1.7
                ) +
                's;' +
              '--corner-delay:-' +
                (
                  index * 1.3
                ) +
                's;' +
            '"' +
          '>' +

            '<div class="camera-frame">' +

              '<div ' +
                'class="camera-space" ' +
                'data-camera-label="CAM ' +
                  String(
                    index + 1
                  ).padStart(
                    2,
                    "0"
                  ) +
                '"' +
              '></div>' +

              '<span class="frame-corner top-left"></span>' +
              '<span class="frame-corner top-right"></span>' +
              '<span class="frame-corner bottom-right"></span>' +
              '<span class="frame-corner bottom-left"></span>' +

            '</div>' +

            '<div class="caster-nameplate data-updated">' +

              '<span class="plate-number">' +
                'C' +
                String(
                  index + 1
                ).padStart(
                  2,
                  "0"
                ) +
              '</span>' +

              '<div class="plate-copy">' +

                '<strong>' +
                  escapeHtml(
                    caster.name
                  ) +
                '</strong>' +

                '<small>' +
                  escapeHtml(
                    caster.role
                  ) +
                '</small>' +

              '</div>' +

              '<span class="plate-handle">' +
                escapeHtml(
                  handle ||
                  "RIVALS GAUNTLET"
                ) +
              '</span>' +

            '</div>' +

          '</article>'
        );
      }

      function casterSignature(
        casters
      ) {
        return JSON.stringify(
          {
            visible:
              studioData.visible !==
              false,

            casters:
              casters,

            eventName:
              studioData.eventName,

            status:
              studioData.statusLabel
          }
        );
      }

      function renderCasterLayout() {
        var casters =
          getActiveCasters();

        var visible =
          studioData.visible !==
          false;

        var signature =
          casterSignature(
            casters
          );

        if (
          signature ===
          lastCasterSignature
        ) {
          return;
        }

        lastCasterSignature =
          signature;

        clearTimeout(
          renderTimer
        );

        casterLayout.classList.add(
          "is-changing"
        );

        renderTimer =
          setTimeout(
            function () {
              if (
                !visible ||
                !casters.length
              ) {
                casterLayout.innerHTML =
                  "";

                casterLayout.style.display =
                  "none";

                casterStandby.classList.add(
                  "active"
                );

              } else {
                casterStandby.classList.remove(
                  "active"
                );

                casterLayout.style.display =
                  "grid";

                casterLayout.setAttribute(
                  "data-count",
                  String(
                    casters.length
                  )
                );

                casterLayout.innerHTML =
                  casters
                    .map(
                      renderCasterMarkup
                    )
                    .join("");
              }

              casterLayout.classList.remove(
                "is-changing"
              );
            },
            190
          );
      }

      function donationTotal() {
        return donationsData.reduce(
          function (
            sum,
            donation
          ) {
            return (
              sum +
              moneyValue(
                donation &&
                donation.amount
              )
            );
          },
          0
        );
      }

      function renderStudioCopy() {
        var eventTitle =
          clean(
            studioData.eventName ||
            siteData.eventName,
            "RIVALS GAUNTLET"
          )
            .toUpperCase();

        var websiteText =
          normalizeWebsite(
            studioData.website ||
            countdownData.website ||
            siteData.websiteUrl ||
            siteData.website
          );

        var matchText =
          prettyMatch(
            siteData.currentMatch
          );

        var statusText =
          clean(
            studioData.statusLabel,
            "CASTER DESK"
          )
            .toUpperCase();

        var startingPool =
          moneyValue(
            siteData.startingPrizePool
          );

        var publishedPool =
          moneyValue(
            siteData.prizePool
          );

        var pool =
          Math.max(
            publishedPool,
            startingPool +
            donationTotal()
          );

        studioEventName.textContent =
          eventTitle;

        studioWebsite.textContent =
          websiteText;

        studioWebsiteTop.textContent =
          websiteText;

        studioStatusLabel.textContent =
          statusText;

        studioMatchLabel.textContent =
          matchText;

        studioFooterMatch.textContent =
          matchText;

        studioPrizePool.textContent =
          pool > 0
            ? formatMoney(
                pool
              ) +
              " LIVE PRIZE POOL"
            : "LIVE PRIZE POOL";
      }

      function renderAll() {
        renderStudioCopy();
        renderCasterLayout();
      }

      function connect() {
        var db = null;

        try {
          studioConnectionText.textContent =
            "CONNECTING";

          try {
            db = database;

          } catch (
            globalDatabaseError
          ) {
            db = null;
          }

          if (
            !db &&
            typeof firebase !==
              "undefined" &&
            firebase.apps &&
            firebase.apps.length > 0
          ) {
            db =
              firebase.database();
          }

          if (
            !db ||
            typeof db.ref !==
              "function"
          ) {
            throw new Error(
              "firebase.js did not expose a usable Realtime Database connection."
            );
          }

          db.ref(
            ".info/connected"
          ).on(
            "value",

            function (snapshot) {
              var online =
                snapshot.val() ===
                true;

              studioConnection.classList.toggle(
                "online",
                online
              );

              studioConnection.classList.remove(
                "error"
              );

              studioConnectionText.textContent =
                online
                  ? "REALTIME CONNECTED"
                  : "RECONNECTING";
            },

            function (error) {
              studioConnection.classList.add(
                "error"
              );

              studioConnectionText.textContent =
                "CONNECTION ERROR";

              console.error(
                "[RG CASTER DESK] Connection listener failed:",
                error
              );
            }
          );

          db.ref(
            "broadcastCasters"
          ).on(
            "value",

            function (snapshot) {
              studioData =
                snapshot.val() || {};

              renderAll();
            },

            function (error) {
              console.warn(
                "[RG CASTER DESK] broadcastCasters read failed. Falling back to legacy site caster fields:",
                error
              );

              studioData = {};
              renderAll();
            }
          );

          db.ref(
            "site"
          ).on(
            "value",

            function (snapshot) {
              siteData =
                snapshot.val() || {};

              renderAll();
            },

            function (error) {
              studioConnection.classList.add(
                "error"
              );

              studioConnectionText.textContent =
                error &&
                error.code ===
                "PERMISSION_DENIED"
                  ? "SITE READ BLOCKED"
                  : "SITE UNAVAILABLE";

              console.error(
                "[RG CASTER DESK] Site read failed:",
                error
              );
            }
          );

          db.ref(
            "broadcastCountdown"
          ).on(
            "value",

            function (snapshot) {
              countdownData =
                snapshot.val() || {};

              renderStudioCopy();
            },

            function (error) {
              console.warn(
                "[RG CASTER DESK] Countdown read failed:",
                error
              );
            }
          );

          db.ref(
            "donations"
          ).on(
            "value",

            function (snapshot) {
              var raw =
                snapshot.val() || {};

              donationsData =
                Object.keys(raw)
                  .map(
                    function (key) {
                      return raw[key];
                    }
                  )
                  .filter(Boolean);

              renderStudioCopy();
            },

            function (error) {
              donationsData = [];

              console.warn(
                "[RG CASTER DESK] Donations read failed:",
                error
              );
            }
          );

        } catch (error) {
          studioConnection.classList.add(
            "error"
          );

          studioConnectionText.textContent =
            "FIREBASE ERROR";

          console.error(
            "[RG CASTER DESK] Startup failed:",
            error
          );
        }
      }

      renderAll();
      connect();
    })();
  </script>
