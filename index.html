<!DOCTYPE html>
<html>
<head>
  <title>Rivals Gauntlet Bracket</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bracket-container">
  <img src="IMG_2141.png" class="bracket-img">

  <div class="team a1t1" onclick="pickMatch(1, 'Team 1', 'Team 2')">Team 1</div>
  <div class="team a1t2" onclick="pickMatch(1, 'Team 2', 'Team 1')">Team 2</div>

  <div class="team a2t1" onclick="pickMatch(2, 'Team 3', 'Team 4')">Team 3</div>
  <div class="team a2t2" onclick="pickMatch(2, 'Team 4', 'Team 3')">Team 4</div>

  <div class="team b1t1" onclick="pickMatch(3, 'Team 5', 'Team 6')">Team 5</div>
  <div class="team b1t2" onclick="pickMatch(3, 'Team 6', 'Team 5')">Team 6</div>

  <div class="team b2t1" onclick="pickMatch(4, 'Team 7', 'Team 8')">Team 7</div>
  <div class="team b2t2" onclick="pickMatch(4, 'Team 8', 'Team 7')">Team 8</div>

  <div id="semiA1" class="team semiA1"></div>
  <div id="semiA2" class="team semiA2"></div>

  <div id="semiB1" class="team semiB1"></div>
  <div id="semiB2" class="team semiB2"></div>

  <div id="finalA" class="team finalA"></div>
  <div id="finalB" class="team finalB"></div>

  <div id="loserA1" class="team loserA1"></div>
  <div id="loserA2" class="team loserA2"></div>

  <div id="loserB1" class="team loserB1"></div>
  <div id="loserB2" class="team loserB2"></div>

  <div id="champion" class="champion">Champion</div>
</div>

<script src="script.js"></script>
</body>
</html>
