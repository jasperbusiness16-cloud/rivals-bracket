<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Rivals Gauntlet</title>

  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=51">
  <link rel="stylesheet" href="account.css?v=2">
</head>

<body class="account-body">

<div class="auth-shell">

  <section class="auth-brand-side">
    <p>RIVALS GAUNTLET</p>
    <h1>COMPETE.<br>CREATE.<br>CONQUER.</h1>
    <span>
      Sign in to manage your creator profile, tournament applications,
      player history, and Rivals Gauntlet account.
    </span>
  </section>

  <section class="auth-form-side">
    <div class="auth-card">
      <h2>Sign In</h2>
      <p>Access your player dashboard and creator profile.</p>

      <label>Email</label>
      <input id="email" type="email" placeholder="you@example.com">

      <label>Password</label>
      <input id="password" type="password" placeholder="Password">

      <div class="account-actions">
        <button class="account-primary" onclick="loginUser()">
          SIGN IN
        </button>

        <button class="account-secondary" onclick="resetPassword()">
          RESET PASSWORD
        </button>
      </div>

      <p id="loginStatus" class="account-status"></p>

      <p style="margin-top:22px;color:#aaa;">
        Need an account?
        <a href="signup.html" style="color:#e63946;font-weight:900;">Create one</a>
      </p>
    </div>
  </section>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase.js?v=2"></script>

<script>
function clean(value) {
  return String(value || "").trim();
}

function loginUser() {
  const email = clean(document.getElementById("email").value);
  const password = document.getElementById("password").value;
  const status = document.getElementById("loginStatus");

  if (!email || !password) {
    status.innerText = "Please enter your email and password.";
    status.style.color = "#ef4444";
    return;
  }

  auth.signInWithEmailAndPassword(email, password)
    .then((credential) => {
      const user = credential.user;

      return database.ref(`users/${user.uid}`).update({
        emailVerified: user.emailVerified,
        lastLogin: Date.now()
      });
    })
    .then(() => {
      status.innerText = "✓ Signed in. Redirecting...";
      status.style.color = "#22c55e";

      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 800);
    })
    .catch((error) => {
      status.innerText = error.message;
      status.style.color = "#ef4444";
    });
}

function resetPassword() {
  const email = clean(document.getElementById("email").value);
  const status = document.getElementById("loginStatus");

  if (!email) {
    status.innerText = "Enter your email first, then tap Reset Password.";
    status.style.color = "#ef4444";
    return;
  }

  auth.sendPasswordResetEmail(email)
    .then(() => {
      status.innerText = "✓ Password reset email sent.";
      status.style.color = "#22c55e";
    })
    .catch((error) => {
      status.innerText = error.message;
      status.style.color = "#ef4444";
    });
}
</script>

</body>
</html>
