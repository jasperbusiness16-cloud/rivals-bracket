<!DOCTYPE html>
<html>
<head>
  <title>Rivals Gauntlet Overlay</title>
  <meta name="viewport" content="width=1920, initial-scale=0.42">
  <style>
    body { margin:0; background:transparent; overflow:hidden; font-family:Arial, Helvetica, sans-serif; color:white; }

    .overlay {
      position:absolute; top:22px; left:50%; transform:translateX(-50%);
      width:1180px; height:96px; display:flex; align-items:center; justify-content:center; gap:14px;
    }

    .team-panel {
      width:405px; height:74px;
      background:linear-gradient(180deg, rgba(20,20,20,.92), rgba(5,5,5,.88));
      border:2px solid #d6a83f; display:flex; flex-direction:column; justify-content:center;
      padding:0 22px; box-shadow:0 0 16px rgba(0,0,0,.65);
    }

    .left { text-align:left; border-radius:8px 0 0 8px; }
    .right { text-align:right; border-radius:0 8px 8px 0; }

    .team-name { font-size:30px; font-weight:900; letter-spacing:1px; text-transform:uppercase; line-height:1; }
    .record { margin-top:8px; font-size:15px; color:#f5d36b; font-weight:bold; letter-spacing:1px; }

    .center-panel {
      width:250px; height:88px; background:rgba(0,0,0,.92);
      border:2px solid #d6a83f; display:flex; flex-direction:column; align-items:center; justify-content:center;
      box-shadow:0 0 18px rgba(214,168,63,.25); border-radius:8px;
    }

    .title { font-size:19px; font-weight:900; letter-spacing:2px; color:#ffd86b; }
    .vs { font-size:18px; font-weight:900; margin-top:2px; }
    .match { font-size:13px; margin-top:6px; letter-spacing:1.5px; color:#ddd; text-transform:uppercase; }
  </style>
</head>

<body>

<div class="overlay">
  <div class="team-panel left">
    <div id="teamA" class="team-name">Team 1</div>
    <div id="recordA" class="record">0W • 0L</div>
  </div>

  <div class="center-panel">
    <div class="title">RIVALS</div>
    <div class="vs">VS</div>
    <div id="matchName" class="match">A ROUND 1</div>
  </div>

  <div class="team-panel right">
    <div id="teamB" class="team-name">Team 2</div>
    <div id="recordB" class="record">0W • 0L</div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDKEp-XP1QDCvnAJjn_tGkvjg2nMveJdq8",
  authDomain: "rivals-bracket-eb713.firebaseapp.com",
  databaseURL: "https://rivals-bracket-eb713-default-rtdb.firebaseio.com",
  projectId: "rivals-bracket-eb713",
  storageBucket: "rivals-bracket-eb713.firebasestorage.app",
  messagingSenderId: "248737838095",
  appId: "1:248737838095:web:583b27b79021b8ac9c9f7a"
};

firebase.initializeApp(firebaseConfig);

const database = firebase.database();
const bracketRef = database.ref("rivalsBracketV2");
const currentMatchRef = database.ref("streamOverlay/currentMatch");

let bracketState = {};
let selectedMatch = "A_R1_M1";

function addWin(records, team) {
  if (!team) return;
  if (!records[team]) records[team] = { wins: 0, losses: 0 };
  records[team].wins++;
}

function addLoss(records, team) {
  if (!team) return;
  if (!records[team]) records[team] = { wins: 0, losses: 0 };
  records[team].losses++;
}

function getLoser(teamA, teamB, winner) {
  if (!winner) return "";
  return winner === teamA ? teamB : teamA;
}

function loserOf(matchId, teams, state) {
  const winner = state[matchId];
  if (!winner) return "";
  return teams.find(team => team && team !== winner) || "";
}

function calculateRecords(state) {
  const records = {};

  const matches = [
    ["A_R1_M1", "Team 1", "Team 2"],
    ["A_R1_M2", "Team 3", "Team 4"],
    ["B_R1_M1", "Team 5", "Team 6"],
    ["B_R1_M2", "Team 7", "Team 8"],

    ["A_WIN", state.A_R1_M1, state.A_R1_M2],
    ["A_LOSE", loserOf("A_R1_M1", ["Team 1", "Team 2"], state), loserOf("A_R1_M2", ["Team 3", "Team 4"], state)],
    ["A_FINAL_LOSE", state.A_LOSE, loserOf("A_WIN", [state.A_R1_M1, state.A_R1_M2], state)],
    ["A_SEMI", state.A_WIN, state.A_FINAL_LOSE],

    ["B_WIN", state.B_R1_M1, state.B_R1_M2],
    ["B_LOSE", loserOf("B_R1_M1", ["Team 5", "Team 6"], state), loserOf("B_R1_M2", ["Team 7", "Team 8"], state)],
    ["B_FINAL_LOSE", state.B_LOSE, loserOf("B_WIN", [state.B_R1_M1, state.B_R1_M2], state)],
    ["B_SEMI", state.B_WIN, state.B_FINAL_LOSE],

    ["GRAND", state.A_SEMI, state.B_SEMI]
  ];

  matches.forEach(([matchId, teamA, teamB]) => {
    const winner = state[matchId];
    const loser = getLoser(teamA, teamB, winner);

    if (winner) addWin(records, winner);
    if (loser) addLoss(records, loser);
  });

  return records;
}

function getRecordText(records, team) {
  const record = records[team] || { wins: 0, losses: 0 };
  return `${record.wins}W • ${record.losses}L`;
}

function getMatchById(id, state) {
  const a1Winner = state.A_R1_M1 || "";
  const a2Winner = state.A_R1_M2 || "";
  const b1Winner = state.B_R1_M1 || "";
  const b2Winner = state.B_R1_M2 || "";

  const a1Loser = loserOf("A_R1_M1", ["Team 1", "Team 2"], state);
  const a2Loser = loserOf("A_R1_M2", ["Team 3", "Team 4"], state);
  const b1Loser = loserOf("B_R1_M1", ["Team 5", "Team 6"], state);
  const b2Loser = loserOf("B_R1_M2", ["Team 7", "Team 8"], state);

  const aWinLoser = loserOf("A_WIN", [a1Winner, a2Winner], state);
  const bWinLoser = loserOf("B_WIN", [b1Winner, b2Winner], state);

  if (id === "A_R1_M1") return { teamA: "Team 1", teamB: "Team 2", name: "A ROUND 1" };
  if (id === "A_R1_M2") return { teamA: "Team 3", teamB: "Team 4", name: "A ROUND 1" };
  if (id === "A_WIN") return { teamA: a1Winner || "A R1 M1 Winner", teamB: a2Winner || "A R1 M2 Winner", name: "A WINNERS MATCH" };
  if (id === "A_LOSE") return { teamA: a1Loser || "A R1 M1 Loser", teamB: a2Loser || "A R1 M2 Loser", name: "A LOSERS MATCH" };
  if (id === "A_FINAL_LOSE") return { teamA: state.A_LOSE || "A Losers Winner", teamB: aWinLoser || "A Winners Loser", name: "A FINAL LOSERS" };
  if (id === "A_SEMI") return { teamA: state.A_WIN || "A Winners Winner", teamB: state.A_FINAL_LOSE || "A Final Losers Winner", name: "A SEMIFINAL" };

  if (id === "B_R1_M1") return { teamA: "Team 5", teamB: "Team 6", name: "B ROUND 1" };
  if (id === "B_R1_M2") return { teamA: "Team 7", teamB: "Team 8", name: "B ROUND 1" };
  if (id === "B_WIN") return { teamA: b1Winner || "B R1 M1 Winner", teamB: b2Winner || "B R1 M2 Winner", name: "B WINNERS MATCH" };
  if (id === "B_LOSE") return { teamA: b1Loser || "B R1 M1 Loser", teamB: b2Loser || "B R1 M2 Loser", name: "B LOSERS MATCH" };
  if (id === "B_FINAL_LOSE") return { teamA: state.B_LOSE || "B Losers Winner", teamB: bWinLoser || "B Winners Loser", name: "B FINAL LOSERS" };
  if (id === "B_SEMI") return { teamA: state.B_WIN || "B Winners Winner", teamB: state.B_FINAL_LOSE || "B Final Losers Winner", name: "B SEMIFINAL" };

  if (id === "GRAND") return { teamA: state.A_SEMI || "A Semifinal Winner", teamB: state.B_SEMI || "B Semifinal Winner", name: "GRAND FINALS" };

  return { teamA: "UNKNOWN", teamB: id, name: "CHECK MATCH ID" };
}

function updateOverlay() {
  const records = calculateRecords(bracketState);
  const current = getMatchById(selectedMatch, bracketState);

  document.getElementById("teamA").innerText = current.teamA || "";
  document.getElementById("teamB").innerText = current.teamB || "";
  document.getElementById("recordA").innerText = current.teamA ? getRecordText(records, current.teamA) : "";
  document.getElementById("recordB").innerText = current.teamB ? getRecordText(records, current.teamB) : "";
  document.getElementById("matchName").innerText = current.name;
}

bracketRef.on("value", snapshot => {
  bracketState = snapshot.val() || {};
  updateOverlay();
});

currentMatchRef.on("value", snapshot => {
  selectedMatch = snapshot.val() || "A_R1_M1";
  updateOverlay();
});
</script>

</body>
</html>
