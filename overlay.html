<!DOCTYPE html>
<html>
<head>
  <title>Rivals Gauntlet Overlay</title>
 <meta name="viewport" content="width=1920, initial-scale=0.42">
  <style>
    body {
      margin: 0;
      background: transparent;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }

    .overlay {
      position: absolute;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      width: 1180px;
      height: 96px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .team-panel {
      width: 405px;
      height: 74px;
      background: linear-gradient(180deg, rgba(20,20,20,.92), rgba(5,5,5,.88));
      border: 2px solid #d6a83f;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 22px;
      box-shadow: 0 0 16px rgba(0,0,0,.65);
    }

    .left {
      text-align: left;
      border-radius: 8px 0 0 8px;
    }

    .right {
      text-align: right;
      border-radius: 0 8px 8px 0;
    }

    .team-name {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      line-height: 1;
    }

    .record {
      margin-top: 8px;
      font-size: 15px;
      color: #f5d36b;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .center-panel {
      width: 250px;
      height: 88px;
      background: rgba(0,0,0,.92);
      border: 2px solid #d6a83f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 18px rgba(214,168,63,.25);
      border-radius: 8px;
    }

    .title {
      font-size: 19px;
      font-weight: 900;
      letter-spacing: 2px;
      color: #ffd86b;
    }

    .vs {
      font-size: 18px;
      font-weight: 900;
      margin-top: 2px;
    }

    .match {
      font-size: 13px;
      margin-top: 6px;
      letter-spacing: 1.5px;
      color: #ddd;
      text-transform: uppercase;
    }
  </style>
</head>

<body>

<div class="overlay">
  <div class="team-panel left">
    <div id="teamA" class="team-name">Team 1</div>
    <div id="recordA" class="record">0W • 0L</div>
  </div>

  <div class="center-panel">
    <div class="title">RIVALS</div>
    <div class="vs">VS</div>
    <div id="matchName" class="match">ROUND 1</div>
  </div>

  <div class="team-panel right">
    <div id="teamB" class="team-name">Team 2</div>
    <div id="recordB" class="record">0W • 0L</div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDKEp-XP1QDCvnAJjn_tGkvjg2nMveJdq8",
  authDomain: "rivals-bracket-eb713.firebaseapp.com",
  databaseURL: "https://rivals-bracket-eb713-default-rtdb.firebaseio.com",
  projectId: "rivals-bracket-eb713",
  storageBucket: "rivals-bracket-eb713.firebasestorage.app",
  messagingSenderId: "248737838095",
  appId: "1:248737838095:web:583b27b79021b8ac9c9f7a"
};

firebase.initializeApp(firebaseConfig);

const database = firebase.database();
const bracketRef = database.ref("rivalsBracketV2");
const currentMatchRef = database.ref("streamOverlay/currentMatch");

let bracketState = {};
let selectedMatch = "A_R1_M1";

const firstRoundMatches = [
  { id: "A_R1_M1", teamA: "Team 1", teamB: "Team 2", name: "ROUND 1" },
  { id: "A_R1_M2", teamA: "Team 3", teamB: "Team 4", name: "ROUND 1" },
  { id: "B_R1_M1", teamA: "Team 5", teamB: "Team 6", name: "ROUND 1" },
  { id: "B_R1_M2", teamA: "Team 7", teamB: "Team 8", name: "ROUND 1" }
];

function addWin(records, team) {
  if (!team) return;
  if (!records[team]) records[team] = { wins: 0, losses: 0 };
  records[team].wins++;
}

function addLoss(records, team) {
  if (!team) return;
  if (!records[team]) records[team] = { wins: 0, losses: 0 };
  records[team].losses++;
}

function getLoser(teamA, teamB, winner) {
  if (!winner) return "";
  return winner === teamA ? teamB : teamA;
}

function calculateRecords(state) {
  const records = {};

  firstRoundMatches.forEach(match => {
    const winner = state[match.id];
    const loser = getLoser(match.teamA, match.teamB, winner);

    if (winner) addWin(records, winner);
    if (loser) addLoss(records, loser);
  });

  // Later rounds: wins are counted automatically.
  if (state.A_FINAL) addWin(records, state.A_FINAL);
  if (state.B_FINAL) addWin(records, state.B_FINAL);
  if (state.GRAND_FINAL) addWin(records, state.GRAND_FINAL);

  return records;
}

function getRecordText(records, team) {
  const record = records[team] || { wins: 0, losses: 0 };
  return `${record.wins}W • ${record.losses}L`;
}

function getMatchById(id, state) {
  if (id === "A_R1_M1") {
    return { teamA: "Team 1", teamB: "Team 2", name: "ROUND 1" };
  }

  if (id === "A_R1_M2") {
    return { teamA: "Team 3", teamB: "Team 4", name: "ROUND 1" };
  }

  if (id === "B_R1_M1") {
    return { teamA: "Team 5", teamB: "Team 6", name: "ROUND 1" };
  }

  if (id === "B_R1_M2") {
    return { teamA: "Team 7", teamB: "Team 8", name: "ROUND 1" };
  }

  if (id === "A_FINAL") {
    return {
      teamA: state.A_R1_M1 || "Group A Winner 1",
      teamB: state.A_R1_M2 || "Group A Winner 2",
      name: "GROUP A WINNERS"
    };
  }

  if (id === "B_FINAL") {
    return {
      teamA: state.B_R1_M1 || "Group B Winner 1",
      teamB: state.B_R1_M2 || "Group B Winner 2",
      name: "GROUP B WINNERS"
    };
  }

  if (id === "GRAND_FINAL") {
    return {
      teamA: state.A_FINAL || "Group A Champion",
      teamB: state.B_FINAL || "Group B Champion",
      name: "GRAND FINALS"
    };
  }

  return { teamA: "Team 1", teamB: "Team 2", name: "ROUND 1" };
}

function updateOverlay() {
  const records = calculateRecords(bracketState);
  const current = getMatchById(selectedMatch, bracketState);

  document.getElementById("teamA").innerText = current.teamA || "";
  document.getElementById("teamB").innerText = current.teamB || "";

  document.getElementById("recordA").innerText =
    current.teamA ? getRecordText(records, current.teamA) : "";

  document.getElementById("recordB").innerText =
    current.teamB ? getRecordText(records, current.teamB) : "";

  document.getElementById("matchName").innerText = current.name;
}

bracketRef.on("value", snapshot => {
  bracketState = snapshot.val() || {};
  updateOverlay();
});

currentMatchRef.on("value", snapshot => {
  selectedMatch = snapshot.val() || "A_R1_M1";
  updateOverlay();
});
</script>

</body>
</html>
