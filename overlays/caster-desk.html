<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">

  <title>Rivals Gauntlet | Caster Desk</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="caster-desk.css?v=2">
</head>

<body>

  <main class="desk-stage">

    <div class="studio-bg"></div>
    <div class="studio-vignette"></div>
    <div class="studio-smoke smoke-a"></div>
    <div class="studio-smoke smoke-b"></div>
    <div class="particle-layer dust-layer"></div>
<div class="particle-layer ember-layer"></div>
<div class="particle-layer shimmer-layer"></div>

    <section class="desk-panel" id="deskPanel">

      <div class="desk-red-streak"></div>
      <div class="desk-glass-sweep"></div>

      <div class="desk-left-wing"></div>
      <div class="desk-right-wing"></div>

      <div class="desk-core">

        <div class="desk-logo-wrap">
          <img src="assets/logos/clean%20logo.PNG" alt="Rivals Gauntlet" class="desk-logo">
        </div>

        <div class="desk-text">
          <div class="desk-title" id="deskTitle">RIVALS GAUNTLET DESK</div>

          <div class="desk-subline">
            <span></span>
            <p id="deskInfo">RIVALSGAUNTLET.COM</p>
            <span></span>
          </div>
        </div>

      </div>

    </section>

  </main>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="../firebase.js"></script>
  <script src="caster-desk.js?v=2"></script>

</body>
</html>
