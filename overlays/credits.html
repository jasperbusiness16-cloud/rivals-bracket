<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=1920, initial-scale=1.0"
  >

  <title>
    Rivals Gauntlet | End Credits
  </title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <style>
    :root{
      --bg:#050509;

      --text:#faf8ff;
      --soft:#cbc5d5;
      --muted:#9690a1;
      --dim:#676170;

      --purple:#9a7cff;
      --purple-bright:#c7b8ff;
      --purple-rgb:154,124,255;

      --gold:#f2d07a;
      --gold-bright:#fff0bc;
      --gold-rgb:242,208,122;

      --green:#62e1a6;
      --yellow:#f2c66c;
      --red:#ff718a;

      --line:rgba(209,196,255,.12);

      --credit-end:0px;
      --credit-duration:140s;
    }

    *{
      box-sizing:border-box;
    }

    html,
    body{
      width:1920px;
      height:1080px;

      margin:0;
      overflow:hidden;

      background:var(--bg);
    }

    body{
      color:var(--text);

      font-family:
        "Rajdhani",
        Arial,
        sans-serif;
    }

    .stage{
      position:relative;

      width:1920px;
      height:1080px;

      overflow:hidden;
      isolation:isolate;

      background:
        radial-gradient(
          circle at 50% 20%,
          rgba(var(--gold-rgb),.08),
          transparent 27%
        ),
        radial-gradient(
          circle at 21% 42%,
          rgba(var(--purple-rgb),.14),
          transparent 33%
        ),
        radial-gradient(
          circle at 81% 50%,
          rgba(103,74,202,.1),
          transparent 34%
        ),
        radial-gradient(
          circle at 50% 110%,
          rgba(var(--purple-rgb),.09),
          transparent 40%
        ),
        linear-gradient(
          150deg,
          #110d1c 0%,
          #090810 48%,
          #050509 100%
        );
    }

    .stage::before{
      content:"";

      position:absolute;
      inset:-80px;
      z-index:-8;

      background:
        linear-gradient(
          116deg,
          transparent 0 22%,
          rgba(255,255,255,.011)
          22.15% 22.4%,
          transparent 22.55% 75%,
          rgba(255,255,255,.009)
          75.15% 75.4%,
          transparent 75.55%
        ),
        repeating-linear-gradient(
          90deg,
          transparent 0 110px,
          rgba(255,255,255,.007) 111px,
          transparent 112px 220px
        );

      animation:
        backgroundDrift
        40s ease-in-out
        infinite alternate;
    }

    .stage::after{
      content:"RG";

      position:absolute;
      left:51%;
      top:53%;
      z-index:-7;

      color:
        rgba(255,255,255,.011);

      font-size:720px;
      font-weight:800;
      letter-spacing:-.13em;
      line-height:.72;

      transform:
        translate(-49%,-50%);
    }

    .grid{
      position:absolute;
      inset:-140px;
      z-index:-6;

      opacity:.28;

      background-image:
        linear-gradient(
          rgba(var(--purple-rgb),.038) 1px,
          transparent 1px
        ),
        linear-gradient(
          90deg,
          rgba(var(--purple-rgb),.038) 1px,
          transparent 1px
        );

      background-size:
        88px 88px;

      transform:
        perspective(780px)
        rotateX(68deg)
        translateY(490px)
        scale(1.34);

      transform-origin:
        center bottom;

      mask-image:
        linear-gradient(
          to top,
          black,
          transparent 79%
        );

      animation:
        gridMove
        28s linear infinite;
    }

    .light-column{
      position:absolute;
      top:-220px;
      bottom:-220px;
      z-index:-5;

      width:340px;

      background:
        linear-gradient(
          180deg,
          transparent,
          rgba(var(--purple-rgb),.025) 25%,
          rgba(var(--gold-rgb),.035) 50%,
          transparent 82%
        );

      filter:blur(12px);

      transform:
        rotate(13deg);
    }

    .light-column.one{
      left:180px;

      animation:
        columnFloat
        19s ease-in-out
        infinite alternate;
    }

    .light-column.two{
      right:220px;

      transform:
        rotate(-13deg);

      animation:
        columnFloat
        23s ease-in-out
        infinite alternate-reverse;
    }

    .star-field{
      position:absolute;
      inset:0;
      z-index:-3;

      overflow:hidden;
      pointer-events:none;
    }

    .star{
      position:absolute;
      left:var(--x);
      top:var(--y);

      width:var(--size);
      height:var(--size);

      border-radius:50%;

      background:
        var(--color);

      opacity:var(--opacity);

      box-shadow:
        0 0 9px
        currentColor;

      animation:
        starFloat
        var(--duration)
        ease-in-out
        var(--delay)
        infinite alternate;
    }

    .frame{
      position:absolute;
      inset:28px;
      z-index:80;

      pointer-events:none;

      border:
        1px solid
        rgba(var(--purple-rgb),.09);

      clip-path:polygon(
        0 0,
        18% 0,
        19% 6px,
        81% 6px,
        82% 0,
        100% 0,
        100% 28%,
        calc(100% - 6px) 29%,
        calc(100% - 6px) 71%,
        100% 72%,
        100% 100%,
        82% 100%,
        81% calc(100% - 6px),
        19% calc(100% - 6px),
        18% 100%,
        0 100%,
        0 72%,
        6px 71%,
        6px 29%,
        0 28%
      );
    }

    .topbar{
      position:absolute;
      left:58px;
      right:58px;
      top:42px;
      z-index:70;

      display:grid;

      grid-template-columns:
        auto
        minmax(0,1fr)
        auto;

      align-items:center;
      gap:22px;

      opacity:0;

      transform:
        translateY(-14px);
    }

    .stage.ready .topbar{
      animation:
        topbarIn
        .7s
        cubic-bezier(.18,.86,.24,1)
        forwards;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:15px;
      min-width:0;
    }

    .mark{
      position:relative;

      width:54px;
      height:54px;

      display:grid;
      place-items:center;

      border:
        1px solid
        rgba(var(--purple-rgb),.4);

      border-radius:14px;

      background:
        linear-gradient(
          145deg,
          rgba(var(--purple-rgb),.15),
          rgba(8,7,13,.96) 68%
        );

      box-shadow:
        inset 0 0 22px
        rgba(var(--purple-rgb),.07),
        0 0 26px
        rgba(var(--purple-rgb),.09);

      font-size:21px;
      font-weight:800;
      letter-spacing:-.05em;
    }

    .mark::before{
      content:"";

      position:absolute;
      inset:6px;

      border:
        1px solid
        rgba(255,255,255,.04);

      border-radius:9px;
    }

    .brand-copy span,
    .brand-copy strong{
      display:block;
    }

    .brand-copy span{
      color:var(--purple-bright);

      font-size:9px;
      font-weight:800;
      letter-spacing:.2em;
      text-transform:uppercase;
    }

    .brand-copy strong{
      max-width:660px;

      margin-top:4px;
      overflow:hidden;

      font-size:22px;
      font-weight:800;
      letter-spacing:.055em;

      text-overflow:ellipsis;
      text-transform:uppercase;
      white-space:nowrap;
    }

    .top-line{
      height:1px;

      background:
        linear-gradient(
          90deg,
          rgba(var(--purple-rgb),.3),
          transparent 76%
        );
    }

    .connection{
      min-height:34px;

      display:flex;
      align-items:center;
      gap:9px;

      padding:0 13px;

      border:
        1px solid
        rgba(242,198,108,.2);

      border-radius:999px;

      color:var(--yellow);

      background:
        rgba(242,198,108,.05);

      font-size:9px;
      font-weight:800;
      letter-spacing:.09em;
      text-transform:uppercase;
    }

    .connection.online{
      border-color:
        rgba(98,225,166,.22);

      color:var(--green);

      background:
        rgba(98,225,166,.05);
    }

    .connection.error{
      border-color:
        rgba(255,113,138,.22);

      color:var(--red);

      background:
        rgba(255,113,138,.05);
    }

    .connection-dot{
      width:7px;
      height:7px;

      border-radius:50%;

      background:currentColor;

      box-shadow:
        0 0 10px
        currentColor;
    }

    .credits-window{
      position:absolute;
      inset:0;
      z-index:20;

      overflow:hidden;

      mask-image:
        linear-gradient(
          to bottom,
          transparent 0%,
          black 8%,
          black 92%,
          transparent 100%
        );
    }

    .credits-track{
      width:100%;

      transform:
        translate3d(0,0,0);

      will-change:transform;
    }

    .credits-track.rolling{
      animation:
        creditsRoll
        var(--credit-duration)
        linear
        1.2s
        forwards;
    }

    .credit-screen{
      width:100%;
      min-height:1080px;

      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;

      padding:
        150px 150px 125px;

      text-align:center;
    }

    .credit-section{
      width:min(1280px,100%);

      display:flex;
      flex-direction:column;
      align-items:center;

      margin:0 auto;
      padding:130px 70px;

      text-align:center;
    }

    .credit-section.large-gap{
      padding-top:190px;
      padding-bottom:190px;
    }

    .section-kicker{
      color:var(--gold);

      font-size:11px;
      font-weight:800;
      letter-spacing:.3em;
      text-transform:uppercase;
    }

    .section-title{
      max-width:1380px;

      margin:16px 0 0;

      font-size:68px;
      font-weight:800;
      letter-spacing:-.025em;
      line-height:.9;

      text-transform:uppercase;

      text-shadow:
        0 0 38px
        rgba(var(--purple-rgb),.09);
    }

    .section-title.gold{
      color:var(--gold-bright);

      text-shadow:
        0 0 38px
        rgba(var(--gold-rgb),.1);
    }

    .section-subtitle{
      max-width:860px;

      margin:18px 0 0;

      color:var(--muted);

      font-size:18px;
      font-weight:600;
      line-height:1.45;
    }

    .section-rule{
      width:220px;
      height:1px;

      margin:29px 0;

      background:
        linear-gradient(
          90deg,
          transparent,
          rgba(var(--purple-rgb),.58),
          transparent
        );
    }

    .section-rule.gold{
      background:
        linear-gradient(
          90deg,
          transparent,
          rgba(var(--gold-rgb),.58),
          transparent
        );
    }

    .intro-mark{
      position:relative;

      width:132px;
      height:132px;

      display:grid;
      place-items:center;

      margin-bottom:37px;

      border:
        1px solid
        rgba(var(--purple-rgb),.42);

      border-radius:30px;

      background:
        linear-gradient(
          145deg,
          rgba(var(--purple-rgb),.17),
          rgba(8,7,13,.97) 68%
        );

      box-shadow:
        inset 0 0 32px
        rgba(var(--purple-rgb),.08),
        0 0 54px
        rgba(var(--purple-rgb),.1);

      font-size:48px;
      font-weight:800;
      letter-spacing:-.06em;
    }

    .intro-mark::before{
      content:"";

      position:absolute;
      inset:9px;

      border:
        1px solid
        rgba(255,255,255,.05);

      border-radius:22px;
    }

    .intro-eyebrow{
      color:var(--purple-bright);

      font-size:12px;
      font-weight:800;
      letter-spacing:.34em;
      text-transform:uppercase;
    }

    .intro-title{
      max-width:1400px;

      margin:22px 0 0;

      font-size:104px;
      font-weight:800;
      letter-spacing:-.045em;
      line-height:.82;

      text-transform:uppercase;
    }

    .intro-event{
      margin-top:28px;

      color:var(--gold-bright);

      font-size:24px;
      font-weight:800;
      letter-spacing:.16em;
      text-transform:uppercase;
    }

    .intro-date{
      margin-top:9px;

      color:var(--muted);

      font-size:13px;
      font-weight:800;
      letter-spacing:.15em;
      text-transform:uppercase;
    }

    .champion-feature{
      width:min(1190px,100%);

      margin-top:34px;
      padding:38px;

      border:
        1px solid
        rgba(var(--gold-rgb),.18);

      border-radius:24px;

      background:
        radial-gradient(
          circle at 50% 0%,
          rgba(var(--gold-rgb),.09),
          transparent 46%
        ),
        linear-gradient(
          145deg,
          rgba(var(--purple-rgb),.055),
          rgba(255,255,255,.01)
        );

      box-shadow:
        0 28px 76px
        rgba(0,0,0,.32),
        inset 0 1px 0
        rgba(255,255,255,.025);
    }

    .champion-team{
      font-size:70px;
      font-weight:800;
      letter-spacing:-.025em;
      line-height:.9;

      text-transform:uppercase;
    }

    .champion-claim{
      margin-top:15px;

      color:var(--gold);

      font-size:15px;
      font-weight:800;
      letter-spacing:.24em;
      text-transform:uppercase;
    }

    .champion-meta{
      display:flex;
      align-items:center;
      justify-content:center;
      flex-wrap:wrap;
      gap:13px 27px;

      margin-top:25px;
    }

    .champion-meta span{
      min-height:40px;

      display:flex;
      align-items:center;

      padding:0 14px;

      border:
        1px solid
        rgba(255,255,255,.055);

      border-radius:10px;

      color:var(--soft);

      background:
        rgba(255,255,255,.014);

      font-size:11px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .credit-list{
      width:min(860px,100%);

      display:grid;
      gap:22px;

      margin-top:36px;
    }

    .credit-row{
      display:grid;

      grid-template-columns:
        minmax(0,1fr)
        minmax(0,1fr);

      align-items:center;
      gap:40px;

      text-align:left;
    }

    .credit-row .role{
      color:var(--muted);

      font-size:13px;
      font-weight:800;
      letter-spacing:.14em;
      text-align:right;
      text-transform:uppercase;
    }

    .credit-row .name{
      font-size:27px;
      font-weight:800;
      letter-spacing:.025em;
      text-transform:uppercase;
    }

    .single-list{
      width:min(900px,100%);

      display:grid;
      gap:18px;

      margin-top:34px;
    }

    .single-line{
      font-size:29px;
      font-weight:800;
      letter-spacing:.03em;
      text-transform:uppercase;
    }

    .single-line small{
      display:block;

      margin-top:5px;

      color:var(--muted);

      font-size:11px;
      font-weight:800;
      letter-spacing:.13em;
      text-transform:uppercase;
    }

    .roster-list{
      width:min(1100px,100%);

      display:grid;

      grid-template-columns:
        repeat(2,minmax(0,1fr));

      gap:15px;

      margin-top:35px;
    }

    .roster-credit{
      min-height:84px;

      display:grid;

      grid-template-columns:
        56px
        minmax(0,1fr);

      align-items:center;
      gap:14px;

      padding:13px 16px;

      border:
        1px solid
        rgba(255,255,255,.05);

      border-radius:13px;

      background:
        linear-gradient(
          145deg,
          rgba(var(--gold-rgb),.03),
          rgba(255,255,255,.01)
        );

      text-align:left;
    }

    .roster-index{
      width:52px;
      height:52px;

      display:grid;
      place-items:center;

      border:
        1px solid
        rgba(var(--gold-rgb),.18);

      border-radius:12px;

      color:var(--gold-bright);

      background:
        rgba(var(--gold-rgb),.035);

      font-size:16px;
      font-weight:800;
    }

    .roster-copy{
      min-width:0;
    }

    .roster-copy strong{
      display:block;
      overflow:hidden;

      font-size:22px;
      font-weight:800;

      text-overflow:ellipsis;
      text-transform:uppercase;
      white-space:nowrap;
    }

    .roster-copy span{
      display:block;
      margin-top:4px;
      overflow:hidden;

      color:var(--muted);

      font-size:10px;
      font-weight:800;
      letter-spacing:.1em;

      text-overflow:ellipsis;
      text-transform:uppercase;
      white-space:nowrap;
    }

    .support-list{
      width:min(900px,100%);

      display:grid;
      gap:13px;

      margin-top:35px;
    }

    .support-line{
      min-height:64px;

      display:grid;

      grid-template-columns:
        50px
        minmax(0,1fr)
        auto;

      align-items:center;
      gap:15px;

      padding:12px 16px;

      border:
        1px solid
        rgba(255,255,255,.05);

      border-radius:12px;

      background:
        rgba(255,255,255,.012);

      text-align:left;
    }

    .support-position{
      width:42px;
      height:42px;

      display:grid;
      place-items:center;

      border:
        1px solid
        rgba(var(--purple-rgb),.17);

      border-radius:10px;

      color:var(--purple-bright);

      background:
        rgba(var(--purple-rgb),.035);

      font-size:12px;
      font-weight:800;
    }

    .support-name{
      overflow:hidden;

      font-size:20px;
      font-weight:800;

      text-overflow:ellipsis;
      text-transform:uppercase;
      white-space:nowrap;
    }

    .support-amount{
      color:var(--gold-bright);

      font-size:18px;
      font-weight:800;
      white-space:nowrap;
    }

    .team-grid{
      width:min(1200px,100%);

      display:grid;

      grid-template-columns:
        repeat(2,minmax(0,1fr));

      gap:14px;

      margin-top:38px;
    }

    .team-credit{
      min-height:69px;

      display:flex;
      align-items:center;
      justify-content:center;

      padding:12px 20px;

      border:
        1px solid
        rgba(255,255,255,.05);

      border-radius:12px;

      background:
        rgba(255,255,255,.012);

      font-size:21px;
      font-weight:800;
      letter-spacing:.04em;
      text-transform:uppercase;
    }

    .website-grid{
      width:min(1120px,100%);

      display:grid;

      grid-template-columns:
        repeat(4,minmax(0,1fr));

      gap:13px;

      margin-top:38px;
    }

    .website-card{
      min-height:115px;

      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;

      padding:16px;

      border:
        1px solid
        rgba(255,255,255,.05);

      border-radius:14px;

      background:
        linear-gradient(
          145deg,
          rgba(var(--purple-rgb),.04),
          rgba(255,255,255,.01)
        );
    }

    .website-card span{
      color:var(--dim);

      font-size:9px;
      font-weight:800;
      letter-spacing:.13em;
      text-transform:uppercase;
    }

    .website-card strong{
      margin-top:8px;

      font-size:19px;
      font-weight:800;
      line-height:1.05;
      text-transform:uppercase;
    }

    .final-mark{
      position:relative;

      width:150px;
      height:150px;

      display:grid;
      place-items:center;

      margin-bottom:40px;

      border:
        1px solid
        rgba(var(--gold-rgb),.38);

      border-radius:35px;

      background:
        linear-gradient(
          145deg,
          rgba(var(--gold-rgb),.12),
          rgba(var(--purple-rgb),.07),
          rgba(8,7,13,.97)
        );

      box-shadow:
        inset 0 0 36px
        rgba(var(--gold-rgb),.05),
        0 0 58px
        rgba(var(--gold-rgb),.08);

      font-size:54px;
      font-weight:800;
      letter-spacing:-.06em;
    }

    .final-mark::before{
      content:"";

      position:absolute;
      inset:10px;

      border:
        1px solid
        rgba(255,255,255,.05);

      border-radius:25px;
    }

    .final-title{
      max-width:1400px;

      margin:0;

      font-size:94px;
      font-weight:800;
      letter-spacing:-.04em;
      line-height:.84;

      text-transform:uppercase;
    }

    .final-site{
      margin-top:30px;

      color:var(--gold-bright);

      font-size:31px;
      font-weight:800;
      letter-spacing:.16em;
      text-transform:uppercase;
    }

    .final-copy{
      margin-top:16px;

      color:var(--muted);

      font-size:14px;
      font-weight:800;
      letter-spacing:.17em;
      text-transform:uppercase;
    }

    .footer{
      position:absolute;
      left:58px;
      right:58px;
      bottom:29px;
      z-index:70;

      display:grid;

      grid-template-columns:
        1fr
        auto
        1fr;

      align-items:center;
      gap:22px;

      opacity:0;

      transform:
        translateY(12px);
    }

    .stage.ready .footer{
      animation:
        footerIn
        .65s
        cubic-bezier(.18,.86,.24,1)
        .25s forwards;
    }

    .footer-line{
      height:1px;

      background:
        linear-gradient(
          90deg,
          transparent,
          rgba(var(--purple-rgb),.27)
        );
    }

    .footer-line:last-child{
      transform:scaleX(-1);
    }

    .footer-copy{
      display:flex;
      align-items:center;
      gap:14px;

      white-space:nowrap;
    }

    .footer-copy strong{
      font-size:19px;
      font-weight:800;
      letter-spacing:.1em;
      text-transform:uppercase;
    }

    .footer-copy i{
      width:5px;
      height:5px;

      border-radius:50%;

      background:var(--purple);

      box-shadow:
        0 0 10px
        rgba(var(--purple-rgb),.6);
    }

    .footer-copy span{
      color:var(--muted);

      font-size:9px;
      font-weight:800;
      letter-spacing:.16em;
      text-transform:uppercase;
    }

    .error-card{
      width:min(820px,calc(100% - 80px));

      margin:280px auto 0;
      padding:38px;

      border:
        1px solid
        rgba(255,113,138,.2);

      border-radius:18px;

      background:
        rgba(21,10,16,.9);

      text-align:center;
    }

    .error-card span{
      color:var(--red);

      font-size:10px;
      font-weight:800;
      letter-spacing:.18em;
      text-transform:uppercase;
    }

    .error-card strong{
      display:block;
      margin-top:12px;

      font-size:25px;
      font-weight:800;
      text-transform:uppercase;
    }

    @keyframes backgroundDrift{
      from{
        transform:
          translate3d(-16px,-8px,0)
          scale(1.015);
      }

      to{
        transform:
          translate3d(18px,10px,0)
          scale(1.03);
      }
    }

    @keyframes gridMove{
      to{
        background-position:
          0 88px,
          88px 0;
      }
    }

    @keyframes columnFloat{
      from{
        opacity:.35;

        transform:
          translateY(-25px)
          rotate(13deg);
      }

      to{
        opacity:.7;

        transform:
          translateY(35px)
          rotate(13deg);
      }
    }

    .light-column.two{
      animation-name:
        columnFloatRight;
    }

    @keyframes columnFloatRight{
      from{
        opacity:.3;

        transform:
          translateY(-20px)
          rotate(-13deg);
      }

      to{
        opacity:.64;

        transform:
          translateY(40px)
          rotate(-13deg);
      }
    }

    @keyframes starFloat{
      from{
        transform:
          translate3d(-5px,-8px,0)
          scale(.85);
      }

      to{
        transform:
          translate3d(8px,12px,0)
          scale(1.15);
      }
    }

    @keyframes topbarIn{
      to{
        opacity:1;
        transform:none;
      }
    }

    @keyframes footerIn{
      to{
        opacity:1;
        transform:none;
      }
    }

    @keyframes creditsRoll{
      0%,
      6%{
        transform:
          translate3d(0,0,0);
      }

      90%,
      100%{
        transform:
          translate3d(
            0,
            var(--credit-end),
            0
          );
      }
    }

    @media(prefers-reduced-motion:reduce){
      *,
      *::before,
      *::after{
        animation:none !important;
        transition:none !important;
      }

      .topbar,
      .footer{
        opacity:1;
        transform:none;
      }
    }
  </style>
</head>

<body>
  <main
    id="stage"
    class="stage"
  >
    <div
      class="grid"
      aria-hidden="true"
    ></div>

    <div
      class="light-column one"
      aria-hidden="true"
    ></div>

    <div
      class="light-column two"
      aria-hidden="true"
    ></div>

    <div
      id="starField"
      class="star-field"
      aria-hidden="true"
    ></div>

    <div
      class="frame"
      aria-hidden="true"
    ></div>

    <header class="topbar">
      <div class="brand">
        <div
          class="mark"
          aria-hidden="true"
        >
          RG
        </div>

        <div class="brand-copy">
          <span>
            Rivals Gauntlet Broadcast
          </span>

          <strong id="headerEventName">
            END OF BROADCAST
          </strong>
        </div>
      </div>

      <div
        class="top-line"
        aria-hidden="true"
      ></div>

      <div
        id="connection"
        class="connection"
      >
        <span class="connection-dot"></span>

        <span id="connectionText">
          Connecting
        </span>
      </div>
    </header>

    <section class="credits-window">
      <div
        id="creditsTrack"
        class="credits-track"
      ></div>
    </section>

    <footer class="footer">
      <span class="footer-line"></span>

      <div class="footer-copy">
        <strong id="footerWebsite">
          RIVALSGAUNTLET.COM
        </strong>

        <i></i>

        <span>
          Compete • Predict • Earn
        </span>
      </div>

      <span class="footer-line"></span>
    </footer>
  </main>

  <script>
    window.addEventListener(
      "error",

      function (event) {
        var connection =
          document.getElementById(
            "connection"
          );

        var connectionText =
          document.getElementById(
            "connectionText"
          );

        var creditsTrack =
          document.getElementById(
            "creditsTrack"
          );

        if (connection) {
          connection.classList.add(
            "error"
          );
        }

        if (connectionText) {
          connectionText.textContent =
            "SCRIPT ERROR";
        }

        if (creditsTrack) {
          creditsTrack.innerHTML =
            '<div class="error-card">' +
              '<span>Credits Error</span>' +
              '<strong>' +
                String(
                  event.message ||
                  "The credits script stopped."
                )
                  .replace(/</g,"&lt;")
                  .replace(/>/g,"&gt;") +
              '</strong>' +
            '</div>';
        }
      }
    );
  </script>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script src="../firebase.js?v=2"></script>

  <script>
    (function () {
      "use strict";

      var state = {
        site: {},
        countdown: {},
        teams: {},
        champions: {},
        donations: [],
        casters: {},
        tournamentId: "open1"
      };

      var loaded = {
        site:false,
        countdown:false,
        champions:false,
        donations:false,
        casters:false,
        teams:false
      };

      var teamsRef = null;
      var teamsCallback = null;

      var renderTimer = null;
      var lastSignature = "";

      var stage =
        document.getElementById(
          "stage"
        );

      var creditsTrack =
        document.getElementById(
          "creditsTrack"
        );

      var headerEventName =
        document.getElementById(
          "headerEventName"
        );

      var footerWebsite =
        document.getElementById(
          "footerWebsite"
        );

      var connection =
        document.getElementById(
          "connection"
        );

      var connectionText =
        document.getElementById(
          "connectionText"
        );

      var starField =
        document.getElementById(
          "starField"
        );

      function clean(
        value,
        fallback
      ) {
        var text =
          value == null
            ? ""
            : String(value).trim();

        return text ||
          fallback ||
          "";
      }

      function escapeHtml(value) {
        return clean(value)
          .replace(/&/g,"&amp;")
          .replace(/</g,"&lt;")
          .replace(/>/g,"&gt;")
          .replace(/"/g,"&quot;")
          .replace(/'/g,"&#039;");
      }

      function normalize(value) {
        return clean(value)
          .toLowerCase()
          .replace(
            /[^a-z0-9]/g,
            ""
          );
      }

      function numberValue(
        value,
        fallback
      ) {
        var parsed =
          Number(value);

        return isFinite(parsed)
          ? parsed
          : Number(
              fallback || 0
            );
      }

      function moneyValue(
        value,
        fallback
      ) {
        var parsed =
          Number(
            String(
              value == null
                ? ""
                : value
            ).replace(
              /[^0-9.-]/g,
              ""
            )
          );

        return isFinite(parsed)
          ? parsed
          : Number(
              fallback || 0
            );
      }

      function formatMoney(
        value,
        cents
      ) {
        return new Intl.NumberFormat(
          "en-US",
          {
            style:"currency",
            currency:"USD",

            minimumFractionDigits:
              cents
                ? 2
                : 0,

            maximumFractionDigits:
              cents
                ? 2
                : 0
          }
        ).format(
          Math.max(
            0,
            numberValue(value)
          )
        );
      }

      function parseTimestamp(value) {
        if (!value) {
          return 0;
        }

        if (
          typeof value ===
            "number" &&
          isFinite(value)
        ) {
          return value;
        }

        var numeric =
          Number(value);

        if (
          isFinite(numeric) &&
          numeric > 0
        ) {
          return numeric;
        }

        var parsed =
          new Date(value)
            .getTime();

        return isFinite(parsed)
          ? parsed
          : 0;
      }

      function initials(value) {
        var parts =
          clean(
            value,
            "RG"
          )
            .split(/\s+/)
            .filter(Boolean);

        if (!parts.length) {
          return "RG";
        }

        if (parts.length === 1) {
          return parts[0]
            .slice(0,2)
            .toUpperCase();
        }

        return (
          (
            parts[0][0] ||
            ""
          ) +
          (
            parts[
              parts.length - 1
            ][0] ||
            ""
          )
        ).toUpperCase();
      }

      function formatDate(value) {
        var stamp =
          parseTimestamp(value);

        if (!stamp) {
          stamp =
            parseTimestamp(
              state.site.countdownDate
            );
        }

        if (!stamp) {
          stamp =
            Date.now();
        }

        try {
          return new Intl.DateTimeFormat(
            "en-US",
            {
              month:"long",
              day:"numeric",
              year:"numeric"
            }
          ).format(
            new Date(stamp)
          );

        } catch (error) {
          return new Date(stamp)
            .toLocaleDateString();
        }
      }

      function getWebsite() {
        var follow =
          state.countdown.follow ||
          {};

        return clean(
          state.countdown.website ||
          follow.website ||
          state.site.website,
          "RIVALSGAUNTLET.COM"
        )
          .replace(
            /^https?:\/\//i,
            ""
          )
          .replace(
            /^www\./i,
            ""
          )
          .replace(
            /\/+$/,
            ""
          )
          .toUpperCase();
      }

      function getTeamsArray() {
        var published =
          state.teams ||
          {};

        var teams =
          published.teams ||
          {};

        var names =
          published.teamNames ||
          {};

        var logos =
          published.teamLogos ||
          published.logos ||
          {};

        return Object.keys(teams)
          .sort(
            function (a,b) {
              return (
                Number(
                  a.replace(
                    /\D/g,
                    ""
                  )
                ) -
                Number(
                  b.replace(
                    /\D/g,
                    ""
                  )
                )
              );
            }
          )
          .map(
            function (
              teamKey,
              index
            ) {
              return {
                teamKey:teamKey,

                seed:
                  index + 1,

                teamName:
                  clean(
                    names[teamKey],
                    "Team " +
                    (
                      index + 1
                    )
                  ),

                logo:
                  clean(
                    logos[teamKey]
                  ),

                players:
                  Array.isArray(
                    teams[teamKey]
                  )
                    ? teams[
                        teamKey
                      ].filter(Boolean)
                    : []
              };
            }
          );
      }

      function findTeam(value) {
        var raw =
          clean(value);

        var teams =
          getTeamsArray();

        var index;
        var match;

        if (!raw) {
          return null;
        }

        for (
          index = 0;
          index < teams.length;
          index += 1
        ) {
          if (
            teams[index].teamKey ===
              raw ||
            normalize(
              teams[index].teamName
            ) ===
              normalize(raw)
          ) {
            return teams[index];
          }
        }

        match =
          raw.match(
            /^Team\s+(\d+)$/i
          );

        if (
          match &&
          teams[
            Number(match[1]) - 1
          ]
        ) {
          return teams[
            Number(match[1]) - 1
          ];
        }

        return {
          teamKey:"",
          teamName:raw,
          logo:"",
          players:[]
        };
      }

      function currentChampionRecord() {
        var direct =
          state.champions[
            state.tournamentId
          ];

        var key;
        var record;

        if (
          direct &&
          typeof direct ===
            "object"
        ) {
          return direct;
        }

        for (
          key in state.champions
        ) {
          if (
            Object.prototype
              .hasOwnProperty
              .call(
                state.champions,
                key
              )
          ) {
            record =
              state.champions[key];

            if (
              record &&
              typeof record ===
                "object" &&
              clean(
                record.tournamentId
              ) ===
                state.tournamentId
            ) {
              return record;
            }
          }
        }

        return null;
      }

      function championData() {
        var record =
          currentChampionRecord();

        var winnerValue =
          clean(
            state.site.grandWinner ||
            state.site.champion ||
            (
              record &&
              (
                record.teamKey ||
                record.teamName
              )
            )
          );

        var team =
          findTeam(
            winnerValue
          );

        var name =
          clean(
            (
              team &&
              team.teamName
            ) ||
            (
              record &&
              record.teamName
            ) ||
            winnerValue
          );

        var players = [];

        if (
          team &&
          Array.isArray(
            team.players
          )
        ) {
          players =
            team.players
              .filter(Boolean)
              .slice(0,6);

        } else if (
          record &&
          Array.isArray(
            record.players
          )
        ) {
          players =
            record.players
              .filter(Boolean)
              .slice(0,6);
        }

        return {
          record:record,
          team:team,
          teamName:name,
          players:players
        };
      }

      function normalizePlayer(
        player,
        index
      ) {
        var record =
          player &&
          typeof player ===
            "object"
            ? player
            : {
                displayName:player
              };

        return {
          name:
            clean(
              record.rivalsIgn ||
              record.displayName ||
              record.playerName ||
              record.name,
              "Player " +
              (
                index + 1
              )
            ),

          role:
            clean(
              record.mainRole ||
              record.preferredRole ||
              record.role,
              "Champion Roster"
            ),

          rgId:
            clean(
              record.rgId ||
              record.rgID
            )
        };
      }

      function finalScore(
        champion
      ) {
        if (
          champion.record &&
          clean(
            champion.record.finalScore
          )
        ) {
          return clean(
            champion.record.finalScore
          );
        }

        var a =
          clean(
            state.site.gfTeam1Score
          );

        var b =
          clean(
            state.site.gfTeam2Score
          );

        if (
          a ||
          b
        ) {
          return (
            clean(a,"0") +
            " — " +
            clean(b,"0")
          );
        }

        return "Final";
      }

      function donationTotal() {
        return state.donations
          .reduce(
            function (
              total,
              donation
            ) {
              return (
                total +
                donation.amount
              );
            },
            0
          );
      }

      function calculatedPrizePool() {
        var starting =
          moneyValue(
            state.site
              .startingPrizePool,
            0
          );

        var published =
          moneyValue(
            state.site
              .prizePool,
            0
          );

        return Math.max(
          published,
          starting +
          donationTotal()
        );
      }

      function normalizeDonations(raw) {
        return Object.keys(
          raw || {}
        )
          .map(
            function (key) {
              var record =
                raw[key] ||
                {};

              return {
                name:
                  clean(
                    record.name ||
                    record.displayName ||
                    record.donorName ||
                    record.fromName ||
                    record.from_name,
                    "Anonymous"
                  ),

                amount:
                  moneyValue(
                    record.amount ||
                    record.amount_value,
                    0
                  ),

                createdAt:
                  parseTimestamp(
                    record.createdAt ||
                    record.timestamp ||
                    record.receivedAt ||
                    record.date
                  )
              };
            }
          )
          .filter(
            function (record) {
              return (
                record.amount >
                0
              );
            }
          )
          .sort(
            function (a,b) {
              return (
                b.createdAt -
                a.createdAt
              );
            }
          );
      }

      function topSupporters(limit) {
        var totals = {};

        state.donations.forEach(
          function (donation) {
            var key =
              donation.name
                .toLowerCase();

            if (!totals[key]) {
              totals[key] = {
                name:donation.name,
                amount:0
              };
            }

            totals[key].amount +=
              donation.amount;
          }
        );

        return Object.keys(totals)
          .map(
            function (key) {
              return totals[key];
            }
          )
          .sort(
            function (a,b) {
              return (
                b.amount -
                a.amount
              );
            }
          )
          .slice(
            0,
            limit || 5
          );
      }

      function getCasters() {
        var result = [];

        var casterRoot =
          state.casters &&
          state.casters.casters
            ? state.casters.casters
            : {};

        var keys =
          Object.keys(
            casterRoot
          )
            .sort();

        keys.forEach(
          function (key) {
            var caster =
              casterRoot[key] ||
              {};

            if (
              caster.active ===
                false
            ) {
              return;
            }

            if (
              clean(
                caster.name
              )
            ) {
              result.push({
                name:
                  clean(
                    caster.name
                  ),

                role:
                  clean(
                    caster.role,
                    "Caster"
                  ),

                handle:
                  clean(
                    caster.handle
                  )
              });
            }
          }
        );

        if (result.length) {
          return result.slice(0,4);
        }

        var index;

        for (
          index = 1;
          index <= 4;
          index += 1
        ) {
          var enabled =
            index === 1
              ? state.site[
                  "caster" +
                  index +
                  "Enabled"
                ] !== false
              : Boolean(
                  state.site[
                    "caster" +
                    index +
                    "Enabled"
                  ]
                );

          var name =
            clean(
              state.site[
                "caster" +
                index +
                "Name"
              ]
            );

          if (
            enabled &&
            name
          ) {
            result.push({
              name:name,

              role:
                clean(
                  state.site[
                    "caster" +
                    index +
                    "Role"
                  ],
                  "Caster"
                ),

              handle:
                clean(
                  state.site[
                    "caster" +
                    index +
                    "Handle"
                  ]
                )
            });
          }
        }

        return result.slice(0,4);
      }

      function openingSection(
        event,
        date
      ) {
        return (
          '<section class="credit-screen">' +

            '<div class="intro-mark">' +
              'RG' +
            '</div>' +

            '<div class="intro-eyebrow">' +
              'Rivals Gauntlet Broadcast' +
            '</div>' +

            '<h1 class="intro-title">' +
              'Thank You For Watching' +
            '</h1>' +

            '<div class="intro-event">' +
              escapeHtml(event) +
            '</div>' +

            '<div class="intro-date">' +
              escapeHtml(date) +
            '</div>' +

          '</section>'
        );
      }

      function championSection(
        champion,
        event
      ) {
        if (
          !champion.teamName
        ) {
          return (
            '<section class="credit-section large-gap">' +

              '<div class="section-kicker">' +
                'Tournament Complete' +
              '</div>' +

              '<h2 class="section-title">' +
                'Champion Archive Pending' +
              '</h2>' +

              '<p class="section-subtitle">' +
                'The official champion record will be published through Rivals Gauntlet.' +
              '</p>' +

            '</section>'
          );
        }

        var players =
          champion.players
            .map(normalizePlayer);

        var rosterHtml =
          players.length
            ? players
                .map(
                  function (
                    player,
                    index
                  ) {
                    var meta =
                      player.role;

                    if (player.rgId) {
                      meta +=
                        " • RG ID " +
                        player.rgId;
                    }

                    return (
                      '<article class="roster-credit">' +

                        '<div class="roster-index">' +
                          escapeHtml(
                            initials(
                              player.name
                            )
                          ) +
                        '</div>' +

                        '<div class="roster-copy">' +

                          '<strong>' +
                            escapeHtml(
                              player.name
                            ) +
                          '</strong>' +

                          '<span>' +
                            escapeHtml(meta) +
                          '</span>' +

                        '</div>' +

                      '</article>'
                    );
                  }
                )
                .join("")
            : (
                '<div class="section-subtitle">' +
                  'Official championship roster pending publication.' +
                '</div>'
              );

        var prize =
          champion.record &&
          clean(
            champion.record.prizeWon
          )
            ? clean(
                champion.record.prizeWon
              )
            : (
                calculatedPrizePool()
                  ? formatMoney(
                      calculatedPrizePool(),
                      false
                    )
                  : "Prize Pending"
              );

        return (
          '<section class="credit-section large-gap">' +

            '<div class="section-kicker">' +
              'Tournament Champions' +
            '</div>' +

            '<div class="champion-feature">' +

              '<div class="champion-team">' +
                escapeHtml(
                  champion.teamName
                ) +
              '</div>' +

              '<div class="champion-claim">' +
                'Claimed The Gauntlet' +
              '</div>' +

              '<div class="champion-meta">' +

                '<span>' +
                  escapeHtml(event) +
                '</span>' +

                '<span>' +
                  'Final Score • ' +
                  escapeHtml(
                    finalScore(
                      champion
                    )
                  ) +
                '</span>' +

                '<span>' +
                  'Prize Pool • ' +
                  escapeHtml(prize) +
                '</span>' +

              '</div>' +

              '<div class="roster-list">' +
                rosterHtml +
              '</div>' +

            '</div>' +

          '</section>'
        );
      }

      function castersSection() {
        var casters =
          getCasters();

        var html = "";

        if (casters.length) {
          html =
            casters
              .map(
                function (caster) {
                  var name =
                    caster.name;

                  if (
                    caster.handle
                  ) {
                    name +=
                      " • " +
                      caster.handle;
                  }

                  return (
                    '<div class="credit-row">' +

                      '<span class="role">' +
                        escapeHtml(
                          caster.role
                        ) +
                      '</span>' +

                      '<strong class="name">' +
                        escapeHtml(name) +
                      '</strong>' +

                    '</div>'
                  );
                }
              )
              .join("");

        } else {
          html =
            '<div class="single-line">' +
              'Rivals Gauntlet Broadcast Team' +
            '</div>';
        }

        return (
          '<section class="credit-section">' +

            '<div class="section-kicker">' +
              'On The Broadcast' +
            '</div>' +

            '<h2 class="section-title">' +
              'Caster Desk' +
            '</h2>' +

            '<div class="section-rule"></div>' +

            '<div class="credit-list">' +
              html +
            '</div>' +

          '</section>'
        );
      }

      function productionSection() {
        return (
          '<section class="credit-section">' +

            '<div class="section-kicker">' +
              'Behind The Gauntlet' +
            '</div>' +

            '<h2 class="section-title">' +
              'Broadcast Production' +
            '</h2>' +

            '<div class="section-rule"></div>' +

            '<div class="single-list">' +

              '<div class="single-line">' +
                'Rivals Gauntlet Broadcast Team' +

                '<small>' +
                  'Tournament Direction • Production • Graphics • Live Operations' +
                '</small>' +
              '</div>' +

              '<div class="single-line">' +
                'Rivals Gauntlet Tournament Staff' +

                '<small>' +
                  'Applications • Rosters • Bracket Operations • Match Administration' +
                '</small>' +
              '</div>' +

            '</div>' +

          '</section>'
        );
      }

      function supporterSection() {
        var supporters =
          topSupporters(6);

        var html =
          supporters.length
            ? supporters
                .map(
                  function (
                    supporter,
                    index
                  ) {
                    return (
                      '<div class="support-line">' +

                        '<span class="support-position">' +
                          '#' +
                          (
                            index + 1
                          ) +
                        '</span>' +

                        '<strong class="support-name">' +
                          escapeHtml(
                            supporter.name
                          ) +
                        '</strong>' +

                        '<strong class="support-amount">' +
                          escapeHtml(
                            formatMoney(
                              supporter.amount,
                              false
                            )
                          ) +
                        '</strong>' +

                      '</div>'
                    );
                  }
                )
                .join("")
            : (
                '<div class="section-subtitle">' +
                  'Thank you to every viewer and community member supporting the prize pool.' +
                '</div>'
              );

        return (
          '<section class="credit-section">' +

            '<div class="section-kicker">' +
              'Community Prize Pool' +
            '</div>' +

            '<h2 class="section-title">' +
              'Top Supporters' +
            '</h2>' +

            '<div class="section-rule gold"></div>' +

            '<div class="support-list">' +
              html +
            '</div>' +

          '</section>'
        );
      }

      function recentSupportSection() {
        var recent =
          state.donations.slice(
            0,
            6
          );

        if (!recent.length) {
          return "";
        }

        return (
          '<section class="credit-section">' +

            '<div class="section-kicker">' +
              'Newest Contributions' +
            '</div>' +

            '<h2 class="section-title">' +
              'Recent Supporters' +
            '</h2>' +

            '<div class="section-rule"></div>' +

            '<div class="support-list">' +

              recent
                .map(
                  function (
                    supporter,
                    index
                  ) {
                    return (
                      '<div class="support-line">' +

                        '<span class="support-position">' +
                          '+' +
                        '</span>' +

                        '<strong class="support-name">' +
                          escapeHtml(
                            supporter.name
                          ) +
                        '</strong>' +

                        '<strong class="support-amount">' +
                          '+' +
                          escapeHtml(
                            formatMoney(
                              supporter.amount,
                              false
                            )
                          ) +
                        '</strong>' +

                      '</div>'
                    );
                  }
                )
                .join("") +

            '</div>' +

          '</section>'
        );
      }

      function teamsSection() {
        var teams =
          getTeamsArray();

        if (!teams.length) {
          return "";
        }

        return (
          '<section class="credit-section large-gap">' +

            '<div class="section-kicker">' +
              'Entered The Gauntlet' +
            '</div>' +

            '<h2 class="section-title">' +
              'Participating Teams' +
            '</h2>' +

            '<p class="section-subtitle">' +
              'Thank you to every competitor who stepped into the tournament.' +
            '</p>' +

            '<div class="team-grid">' +

              teams
                .map(
                  function (team) {
                    return (
                      '<div class="team-credit">' +
                        escapeHtml(
                          team.teamName
                        ) +
                      '</div>'
                    );
                  }
                )
                .join("") +

            '</div>' +

          '</section>'
        );
      }

      function communitySection() {
        return (
          '<section class="credit-section">' +

            '<div class="section-kicker">' +
              'Special Thanks' +
            '</div>' +

            '<h2 class="section-title">' +
              'The Rivals Gauntlet Community' +
            '</h2>' +

            '<div class="section-rule"></div>' +

            '<div class="single-list">' +

              '<div class="single-line">' +
                'Every Competitor' +
              '</div>' +

              '<div class="single-line">' +
                'Every Viewer' +
              '</div>' +

              '<div class="single-line">' +
                'Every Prize Pool Supporter' +
              '</div>' +

              '<div class="single-line">' +
                'Everyone Helping Grow The Gauntlet' +
              '</div>' +

            '</div>' +

          '</section>'
        );
      }

      function websiteSection() {
        return (
          '<section class="credit-section large-gap">' +

            '<div class="section-kicker">' +
              'Continue Your Journey' +
            '</div>' +

            '<h2 class="section-title">' +
              'The Tournament Lives On' +
            '</h2>' +

            '<p class="section-subtitle">' +
              'Create your account, follow tournament updates and build your Predictor Ranking at RivalsGauntlet.com.' +
            '</p>' +

            '<div class="website-grid">' +

              '<div class="website-card">' +
                '<span>Account</span>' +
                '<strong>Create Your RG Profile</strong>' +
              '</div>' +

              '<div class="website-card">' +
                '<span>Predictions</span>' +
                '<strong>Predict • Earn RP • Rank Up</strong>' +
              '</div>' +

              '<div class="website-card">' +
                '<span>Tournament</span>' +
                '<strong>Bracket • Teams • Results</strong>' +
              '</div>' +

              '<div class="website-card">' +
                '<span>Community</span>' +
                '<strong>News • Events • Prize Pool</strong>' +
              '</div>' +

            '</div>' +

          '</section>'
        );
      }

      function finalSection(
        website
      ) {
        return (
          '<section class="credit-screen">' +

            '<div class="final-mark">' +
              'RG' +
            '</div>' +

            '<div class="section-kicker">' +
              'The Broadcast Has Ended' +
            '</div>' +

            '<h2 class="final-title">' +
              'See You In The Next Gauntlet' +
            '</h2>' +

            '<div class="final-site">' +
              escapeHtml(website) +
            '</div>' +

            '<div class="final-copy">' +
              'Compete • Predict • Earn' +
            '</div>' +

          '</section>'
        );
      }

      function buildCredits() {
        var event =
          clean(
            state.site.eventName ||
            state.countdown.eventName,
            "Rivals Gauntlet"
          );

        var champion =
          championData();

        var website =
          getWebsite();

        var date =
          formatDate(
            champion.record &&
            (
              champion.record.createdAt ||
              champion.record.publishedAt ||
              champion.record.date
            )
          );

        return (
          openingSection(
            event,
            date
          ) +

          championSection(
            champion,
            event
          ) +

          castersSection() +

          productionSection() +

          supporterSection() +

          recentSupportSection() +

          teamsSection() +

          communitySection() +

          websiteSection() +

          finalSection(
            website
          )
        );
      }

      function buildStars() {
        var colors = [
          "#9a7cff",
          "#c7b8ff",
          "#f2d07a",
          "#ffffff"
        ];

        var html = "";
        var index;

        for (
          index = 0;
          index < 54;
          index += 1
        ) {
          html +=
            '<span ' +
              'class="star" ' +
              'style="' +

                '--x:' +
                Math.round(
                  Math.random() *
                  100
                ) +
                '%;' +

                '--y:' +
                Math.round(
                  Math.random() *
                  100
                ) +
                '%;' +

                '--size:' +
                (
                  1 +
                  Math.round(
                    Math.random() *
                    2
                  )
                ) +
                'px;' +

                '--opacity:' +
                (
                  .15 +
                  Math.random() *
                  .48
                ) +
                ';' +

                '--duration:' +
                (
                  5 +
                  Math.random() *
                  9
                ) +
                's;' +

                '--delay:' +
                (
                  Math.random() *
                  7
                ) +
                's;' +

                '--color:' +
                colors[
                  index %
                  colors.length
                ] +
                ';' +

              '"' +
            '></span>';
        }

        starField.innerHTML =
          html;
      }

      function startCreditsRoll() {
        function measureAndStart() {
          var totalHeight =
            creditsTrack.scrollHeight;

          var distance =
            Math.max(
              0,
              totalHeight -
              1080
            );

          var duration =
            Math.max(
              105,

              Math.min(
                260,

                distance /
                34 +
                22
              )
            );

          creditsTrack.style
            .setProperty(
              "--credit-end",
              (
                -distance
              ) +
              "px"
            );

          creditsTrack.style
            .setProperty(
              "--credit-duration",
              duration +
              "s"
            );

          creditsTrack.classList
            .remove(
              "rolling"
            );

          void creditsTrack.offsetWidth;

          creditsTrack.classList
            .add(
              "rolling"
            );

          stage.classList.add(
            "ready"
          );
        }

        if (
          document.fonts &&
          document.fonts.ready
        ) {
          document.fonts.ready
            .then(
              function () {
                setTimeout(
                  measureAndStart,
                  180
                );
              }
            );

        } else {
          setTimeout(
            measureAndStart,
            350
          );
        }
      }

      function scheduleRender() {
        clearTimeout(
          renderTimer
        );

        renderTimer =
          setTimeout(
            render,
            520
          );
      }

      function render() {
        var champion =
          championData();

        var signature = [
          state.tournamentId,
          state.site.eventName,
          state.site.grandWinner,
          champion.teamName,
          getTeamsArray().length,
          getCasters().length,
          state.donations.length,
          calculatedPrizePool()
        ].join("|");

        headerEventName.textContent =
          clean(
            state.site.eventName,
            "END OF BROADCAST"
          )
            .toUpperCase();

        footerWebsite.textContent =
          getWebsite();

        if (
          signature ===
          lastSignature &&
          creditsTrack.innerHTML
        ) {
          return;
        }

        lastSignature =
          signature;

        stage.classList.remove(
          "ready"
        );

        creditsTrack.classList
          .remove(
            "rolling"
          );

        creditsTrack.innerHTML =
          buildCredits();

        startCreditsRoll();
      }

      function attachTeams(
        database,
        tournamentId
      ) {
        if (
          teamsRef &&
          teamsCallback
        ) {
          teamsRef.off(
            "value",
            teamsCallback
          );
        }

        state.tournamentId =
          clean(
            tournamentId,
            "open1"
          );

        state.teams = {};
        loaded.teams = false;

        teamsRef =
          database.ref(
            "teams/" +
            state.tournamentId
          );

        teamsCallback =
          function (snapshot) {
            state.teams =
              snapshot.val() ||
              {};

            loaded.teams = true;

            scheduleRender();
          };

        teamsRef.on(
          "value",
          teamsCallback,

          function (error) {
            loaded.teams = true;

            console.warn(
              "[RG CREDITS] Team data read failed:",
              error
            );

            scheduleRender();
          }
        );
      }

      function connect() {
        var database;

        try {
          if (
            typeof firebase ===
              "undefined" ||
            !firebase.apps ||
            firebase.apps.length === 0
          ) {
            throw new Error(
              "Firebase is not initialized. Check ../firebase.js."
            );
          }

          database =
            firebase.database();

          database.ref(
            ".info/connected"
          ).on(
            "value",

            function (snapshot) {
              var online =
                snapshot.val() ===
                true;

              connection.classList
                .toggle(
                  "online",
                  online
                );

              connection.classList
                .remove(
                  "error"
                );

              connectionText.textContent =
                online
                  ? "REALTIME CONNECTED"
                  : "RECONNECTING";
            }
          );

          database.ref(
            "site"
          ).on(
            "value",

            function (snapshot) {
              var nextSite =
                snapshot.val() ||
                {};

              var nextTournament =
                clean(
                  nextSite.currentTournament,
                  "open1"
                );

              var changed =
                nextTournament !==
                state.tournamentId;

              state.site =
                nextSite;

              loaded.site = true;

              if (
                changed ||
                !teamsRef
              ) {
                attachTeams(
                  database,
                  nextTournament
                );
              }

              scheduleRender();
            },

            function (error) {
              loaded.site = true;

              connection.classList.add(
                "error"
              );

              connectionText.textContent =
                error &&
                error.code ===
                  "PERMISSION_DENIED"
                  ? "SITE READ BLOCKED"
                  : "SITE UNAVAILABLE";

              scheduleRender();
            }
          );

          database.ref(
            "broadcastCountdown"
          ).on(
            "value",

            function (snapshot) {
              state.countdown =
                snapshot.val() ||
                {};

              loaded.countdown = true;

              scheduleRender();
            },

            function (error) {
              loaded.countdown = true;

              console.warn(
                "[RG CREDITS] Countdown data unavailable:",
                error
              );

              scheduleRender();
            }
          );

          database.ref(
            "champions"
          ).on(
            "value",

            function (snapshot) {
              state.champions =
                snapshot.val() ||
                {};

              loaded.champions = true;

              scheduleRender();
            },

            function (error) {
              loaded.champions = true;

              console.warn(
                "[RG CREDITS] Champion archive unavailable:",
                error
              );

              scheduleRender();
            }
          );

          database.ref(
            "donations"
          ).on(
            "value",

            function (snapshot) {
              state.donations =
                normalizeDonations(
                  snapshot.val()
                );

              loaded.donations = true;

              scheduleRender();
            },

            function (error) {
              state.donations = [];
              loaded.donations = true;

              console.warn(
                "[RG CREDITS] Donations unavailable:",
                error
              );

              scheduleRender();
            }
          );

          database.ref(
            "broadcastCasters"
          ).on(
            "value",

            function (snapshot) {
              state.casters =
                snapshot.val() ||
                {};

              loaded.casters = true;

              scheduleRender();
            },

            function (error) {
              state.casters = {};
              loaded.casters = true;

              console.warn(
                "[RG CREDITS] Caster data unavailable:",
                error
              );

              scheduleRender();
            }
          );

        } catch (error) {
          connection.classList.add(
            "error"
          );

          connectionText.textContent =
            "FIREBASE ERROR";

          creditsTrack.innerHTML =
            '<div class="error-card">' +
              '<span>Credits Startup Error</span>' +
              '<strong>' +
                escapeHtml(
                  error.message ||
                  "Credits could not connect."
                ) +
              '</strong>' +
            '</div>';
        }
      }

      buildStars();

      creditsTrack.innerHTML =
        '<section class="credit-screen">' +
          '<div class="intro-mark">RG</div>' +
          '<div class="intro-eyebrow">Preparing End Credits</div>' +
          '<h1 class="intro-title">Thank You For Watching</h1>' +
        '</section>';

      connect();
    })();
  </script>
</body>
</html>
