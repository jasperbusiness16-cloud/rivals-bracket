<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=1920, initial-scale=1.0">

<title>RG Match Dock</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="match-dock.css?v=1">

</head>

<body>

<div id="matchDock" class="match-dock">

    <div class="dock-glow"></div>

    <div class="dock-logo">

        <img
            src="assets/logos/clean%20logo.PNG"
            alt="Rivals Gauntlet">

    </div>

    <div class="dock-divider"></div>

    <div class="dock-content">

        <div
            id="matchLabel"
            class="dock-match">

            GRAND FINALS • BO5

        </div>

        <div class="dock-line">

            <span></span>

            <div class="dock-url">

                RIVALSGAUNTLET.COM

            </div>

            <span></span>

        </div>

    </div>

    <div class="glass-sweep"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="../firebase.js"></script>

<script src="match-dock.js?v=1"></script>

</body>

</html>
