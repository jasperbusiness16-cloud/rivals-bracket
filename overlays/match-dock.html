<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=1920, initial-scale=1.0"
  >

  <title>RG Match Dock</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --dock-width: 650px;
      --dock-height: 96px;

      --bg-0: rgba(7, 7, 12, 0.97);
      --bg-1: rgba(14, 12, 22, 0.97);
      --bg-2: rgba(24, 18, 42, 0.95);

      --text: #f8f5ff;
      --muted: #8e8799;

      --purple: #9a7cff;
      --purple-bright: #c2afff;
      --purple-rgb: 154, 124, 255;

      --border: rgba(194, 174, 255, 0.2);
      --border-strong: rgba(194, 174, 255, 0.4);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 1920px;
      height: 1080px;
      margin: 0;
      overflow: hidden;
      background: transparent;
    }

    body {
      position: relative;
      color: var(--text);
      font-family: "Rajdhani", Arial, sans-serif;
    }

    .match-dock {
      position: fixed;
      left: 50%;
      bottom: 24px;

      width: var(--dock-width);
      height: var(--dock-height);

      transform: translateX(-50%);
      pointer-events: none;
      isolation: isolate;

      opacity: 0;

      animation:
        dockIntro 850ms cubic-bezier(0.18, 0.86, 0.24, 1)
        80ms forwards;
    }

    .dock-shadow {
      position: absolute;
      inset: 20px 28px -11px;
      z-index: -2;

      border-radius: 50%;
      background: rgba(0, 0, 0, 0.68);
      filter: blur(22px);
    }

    .dock-shell {
      position: relative;
      width: 100%;
      height: 100%;

      display: grid;
      place-items: center;

      overflow: hidden;

      border: 1px solid var(--border);
      border-radius: 18px;

      background:
        radial-gradient(
          circle at 50% -30%,
          rgba(var(--purple-rgb), 0.15),
          transparent 46%
        ),
        radial-gradient(
          circle at 8% 30%,
          rgba(var(--purple-rgb), 0.08),
          transparent 30%
        ),
        radial-gradient(
          circle at 92% 30%,
          rgba(var(--purple-rgb), 0.08),
          transparent 30%
        ),
        linear-gradient(
          180deg,
          var(--bg-2) 0%,
          var(--bg-1) 34%,
          var(--bg-0) 100%
        );

      box-shadow:
        0 18px 44px rgba(0, 0, 0, 0.52),
        inset 0 1px 0 rgba(255, 255, 255, 0.035),
        inset 0 -1px 0 rgba(0, 0, 0, 0.8),
        0 0 0 1px rgba(var(--purple-rgb), 0.035);
    }

    .dock-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;

      background:
        linear-gradient(
          116deg,
          transparent 0 29%,
          rgba(255, 255, 255, 0.018) 29.2% 29.6%,
          transparent 29.8% 70%,
          rgba(255, 255, 255, 0.014) 70.2% 70.6%,
          transparent 70.8%
        ),
        repeating-linear-gradient(
          90deg,
          transparent 0 50px,
          rgba(255, 255, 255, 0.01) 51px,
          transparent 52px 100px
        );

      opacity: 0.58;
    }

    .dock-shell::after {
      content: "";
      position: absolute;
      left: 8%;
      right: 8%;
      bottom: 0;
      z-index: 4;

      height: 1px;

      background:
        linear-gradient(
          90deg,
          transparent,
          rgba(var(--purple-rgb), 0.3) 23%,
          rgba(224, 215, 255, 0.72) 50%,
          rgba(var(--purple-rgb), 0.3) 77%,
          transparent
        );

      opacity: 0.72;
      pointer-events: none;
    }

    .dock-inner-frame {
      position: absolute;
      inset: 5px;
      z-index: 1;

      border: 1px solid rgba(255, 255, 255, 0.035);
      border-radius: 13px;

      clip-path: polygon(
        4% 0,
        96% 0,
        100% 32%,
        100% 68%,
        96% 100%,
        4% 100%,
        0 68%,
        0 32%
      );

      pointer-events: none;
    }

    .dock-side-mark {
      position: absolute;
      top: 50%;
      z-index: 5;

      width: 16px;
      height: 48px;

      border: 1px solid rgba(var(--purple-rgb), 0.24);

      background:
        linear-gradient(
          180deg,
          rgba(var(--purple-rgb), 0.13),
          rgba(9, 8, 14, 0.94)
        );

      transform: translateY(-50%);
    }

    .dock-side-mark.left {
      left: -7px;

      clip-path: polygon(
        42% 0,
        100% 20%,
        100% 80%,
        42% 100%,
        0 78%,
        0 22%
      );
    }

    .dock-side-mark.right {
      right: -7px;

      clip-path: polygon(
        0 20%,
        58% 0,
        100% 22%,
        100% 78%,
        58% 100%,
        0 80%
      );
    }

    .dock-content {
      position: relative;
      z-index: 3;

      width: 100%;
      min-width: 0;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      padding: 10px 48px 9px;

      text-align: center;

      opacity: 0;
      transform: translateY(8px);

      animation:
        dockContentIntro 600ms cubic-bezier(0.18, 0.86, 0.24, 1)
        370ms forwards;
    }

    .dock-kicker-row {
      width: min(360px, 78%);

      display: grid;
      grid-template-columns:
        minmax(28px, 1fr)
        auto
        minmax(28px, 1fr);

      align-items: center;
      gap: 11px;
    }

    .dock-kicker-line {
      height: 1px;

      background:
        linear-gradient(
          90deg,
          transparent,
          rgba(var(--purple-rgb), 0.42)
        );
    }

    .dock-kicker-line:last-child {
      background:
        linear-gradient(
          90deg,
          rgba(var(--purple-rgb), 0.42),
          transparent
        );
    }

    .dock-kicker {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;

      color: var(--purple-bright);
      font-size: 8px;
      font-weight: 800;
      letter-spacing: 0.19em;
      line-height: 1;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .dock-kicker strong {
      width: 21px;
      height: 21px;

      display: grid;
      place-items: center;

      border: 1px solid rgba(var(--purple-rgb), 0.34);
      border-radius: 6px;

      color: var(--text);
      background: rgba(var(--purple-rgb), 0.08);

      font-size: 9px;
      letter-spacing: 0;

      transform: rotate(45deg);
    }

    .dock-kicker strong span {
      transform: rotate(-45deg);
    }

    .dock-match {
      width: 100%;
      min-width: 0;
      margin-top: 5px;

      overflow: hidden;

      color: var(--text);
      font-size: 29px;
      font-weight: 800;
      letter-spacing: 0.025em;
      line-height: 1;

      text-align: center;
      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;

      text-shadow:
        0 0 18px rgba(var(--purple-rgb), 0.12);

      transform-origin: center center;
      will-change: opacity, transform, filter;
    }

    .dock-match.is-leaving {
      animation:
        dockLabelLeave 170ms ease forwards;
    }

    .dock-match.is-entering {
      animation:
        dockLabelEnter 340ms cubic-bezier(0.18, 0.86, 0.24, 1)
        forwards;
    }

    .dock-url-row {
      width: min(440px, 88%);
      min-width: 0;

      display: grid;
      grid-template-columns:
        minmax(30px, 1fr)
        auto
        minmax(30px, 1fr);

      align-items: center;
      gap: 12px;

      margin-top: 9px;
    }

    .dock-url-line {
      height: 1px;

      background:
        linear-gradient(
          90deg,
          transparent,
          rgba(var(--purple-rgb), 0.34)
        );
    }

    .dock-url-line:last-child {
      background:
        linear-gradient(
          90deg,
          rgba(var(--purple-rgb), 0.34),
          transparent
        );
    }

    .dock-url {
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      line-height: 1;
      text-align: center;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .dock-energy {
      position: absolute;
      inset: 0;
      z-index: 8;

      overflow: hidden;
      pointer-events: none;
    }

    .dock-energy span {
      position: absolute;
      top: -1px;

      width: 96px;
      height: 2px;

      background:
        linear-gradient(
          90deg,
          transparent,
          rgba(234, 228, 255, 0.96),
          rgba(var(--purple-rgb), 0.75),
          transparent
        );

      filter:
        drop-shadow(
          0 0 5px rgba(var(--purple-rgb), 0.72)
        );

      opacity: 0;
    }

    .dock-energy .left {
      right: 50%;

      animation:
        dockEnergyLeft 7.6s linear 1.1s infinite;
    }

    .dock-energy .right {
      left: 50%;

      animation:
        dockEnergyRight 7.6s linear 1.1s infinite;
    }

    .dock-center-pulse {
      position: absolute;
      top: -4px;
      left: 50%;
      z-index: 9;

      width: 8px;
      height: 8px;

      border: 1px solid rgba(var(--purple-rgb), 0.56);
      background: rgba(20, 14, 34, 0.96);

      transform:
        translateX(-50%)
        rotate(45deg);

      box-shadow:
        0 0 10px rgba(var(--purple-rgb), 0.24);

      animation:
        dockCenterPulse 3.8s ease-in-out infinite;
    }

    .dock-glass-sweep {
      position: absolute;
      inset: -20px -100px;
      z-index: 7;

      pointer-events: none;

      background:
        linear-gradient(
          106deg,
          transparent 36%,
          rgba(255, 255, 255, 0.022) 45%,
          rgba(216, 205, 255, 0.1) 50%,
          rgba(255, 255, 255, 0.018) 55%,
          transparent 64%
        );

      transform: translateX(-118%);

      animation:
        dockGlassSweep 9.4s ease-in-out 2.5s infinite;
    }

    .dock-data-flash {
      position: absolute;
      inset: 0;
      z-index: 10;

      pointer-events: none;

      background:
        linear-gradient(
          90deg,
          transparent,
          rgba(var(--purple-rgb), 0.13),
          rgba(234, 228, 255, 0.18),
          rgba(var(--purple-rgb), 0.13),
          transparent
        );

      opacity: 0;
    }

    .match-dock.is-refreshing .dock-data-flash {
      animation:
        dockDataFlash 500ms ease;
    }

    @keyframes dockIntro {
      0% {
        opacity: 0;

        transform:
          translateX(-50%)
          translateY(22px)
          scaleX(0.84);

        filter: blur(4px);
      }

      58% {
        opacity: 1;
        filter: blur(0);
      }

      100% {
        opacity: 1;

        transform:
          translateX(-50%)
          translateY(0)
          scaleX(1);

        filter: blur(0);
      }
    }

    @keyframes dockContentIntro {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes dockLabelLeave {
      to {
        opacity: 0;

        transform:
          translateY(-5px)
          scaleX(0.985);

        filter: blur(2px);
      }
    }

    @keyframes dockLabelEnter {
      from {
        opacity: 0;

        transform:
          translateY(7px)
          scaleX(0.985);

        filter: blur(2px);
      }

      to {
        opacity: 1;

        transform:
          translateY(0)
          scaleX(1);

        filter: blur(0);
      }
    }

    @keyframes dockEnergyLeft {
      0%,
      67% {
        right: 50%;
        opacity: 0;
      }

      69% {
        opacity: 0.9;
      }

      81% {
        right: calc(100% - 88px);
        opacity: 0.7;
      }

      84%,
      100% {
        right: calc(100% - 88px);
        opacity: 0;
      }
    }

    @keyframes dockEnergyRight {
      0%,
      67% {
        left: 50%;
        opacity: 0;
      }

      69% {
        opacity: 0.9;
      }

      81% {
        left: calc(100% - 88px);
        opacity: 0.7;
      }

      84%,
      100% {
        left: calc(100% - 88px);
        opacity: 0;
      }
    }

    @keyframes dockCenterPulse {
      0%,
      100% {
        opacity: 0.45;

        box-shadow:
          0 0 8px rgba(var(--purple-rgb), 0.2);
      }

      50% {
        opacity: 1;

        box-shadow:
          0 0 16px rgba(var(--purple-rgb), 0.5);
      }
    }

    @keyframes dockGlassSweep {
      0%,
      70% {
        transform: translateX(-118%);
        opacity: 0;
      }

      73% {
        opacity: 0.7;
      }

      82% {
        opacity: 0.45;
      }

      86%,
      100% {
        transform: translateX(118%);
        opacity: 0;
      }
    }

    @keyframes dockDataFlash {
      0% {
        opacity: 0;
        transform: scaleX(0.35);
      }

      38% {
        opacity: 0.85;
      }

      100% {
        opacity: 0;
        transform: scaleX(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .match-dock,
      .dock-content,
      .dock-match,
      .dock-energy span,
      .dock-center-pulse,
      .dock-glass-sweep,
      .dock-data-flash {
        animation: none !important;
        transition: none !important;
      }

      .match-dock {
        opacity: 1 !important;
        transform: translateX(-50%) !important;
        filter: none !important;
      }

      .dock-content {
        opacity: 1 !important;
        transform: none !important;
      }
    }
  </style>
</head>

<body>
  <main
    id="matchDock"
    class="match-dock"
    aria-label="Current Rivals Gauntlet match"
  >
    <div
      class="dock-shadow"
      aria-hidden="true"
    ></div>

    <section class="dock-shell">
      <div
        class="dock-inner-frame"
        aria-hidden="true"
      ></div>

      <div
        class="dock-side-mark left"
        aria-hidden="true"
      ></div>

      <div
        class="dock-side-mark right"
        aria-hidden="true"
      ></div>

      <div
        class="dock-energy"
        aria-hidden="true"
      >
        <span class="left"></span>
        <span class="right"></span>
      </div>

      <div
        class="dock-center-pulse"
        aria-hidden="true"
      ></div>

      <div class="dock-content">
        <div class="dock-kicker-row">
          <span class="dock-kicker-line"></span>

          <div class="dock-kicker">
            <strong>
              <span>RG</span>
            </strong>

            <span>Current Series</span>
          </div>

          <span class="dock-kicker-line"></span>
        </div>

        <div
          id="matchLabel"
          class="dock-match"
          aria-live="polite"
        >
          CONNECTING TO LIVE MATCH
        </div>

        <div class="dock-url-row">
          <span class="dock-url-line"></span>

          <div class="dock-url">
            RIVALSGAUNTLET.COM
          </div>

          <span class="dock-url-line"></span>
        </div>
      </div>

      <div
        class="dock-data-flash"
        aria-hidden="true"
      ></div>

      <div
        class="dock-glass-sweep"
        aria-hidden="true"
      ></div>
    </section>
  </main>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="../firebase.js?v=2"></script>

<script>
(() => {
  "use strict";

  const matchLabel =
    document.getElementById("matchLabel");

  const dock =
    document.getElementById("matchDock");

  let lastLabel = "";
  let labelSwapTimer = null;
  let refreshTimer = null;
  let receivedMatchData = false;
  let listenerAttached = false;

  function clean(value = "") {
    return String(value == null ? "" : value).trim();
  }

  function getCurrentMatchText(value) {
    if (typeof value === "string") {
      return clean(value);
    }

    if (value && typeof value === "object") {
      return clean(
        value.fullMatchId ||
        value.label ||
        value.name ||
        value.matchId ||
        value.id ||
        ""
      );
    }

    return "";
  }

  function prettyStage(match = "") {
    const text = clean(match).toLowerCase();

    if (
      !text ||
      text.includes("no match")
    ) {
      return "AWAITING NEXT SERIES";
    }

    if (
      text.includes("grand") ||
      text.includes("finals")
    ) {
      return "GRAND FINALS";
    }

    if (
      text.includes("semifinal 1") ||
      text.includes("semi-final 1") ||
      text.includes("sf1")
    ) {
      return "SEMIFINAL 1";
    }

    if (
      text.includes("semifinal 2") ||
      text.includes("semi-final 2") ||
      text.includes("sf2")
    ) {
      return "SEMIFINAL 2";
    }

    if (
      text.includes("quarterfinal 1") ||
      text.includes("quarter-final 1") ||
      text.includes("qf1")
    ) {
      return "QUARTERFINAL 1";
    }

    if (
      text.includes("quarterfinal 2") ||
      text.includes("quarter-final 2") ||
      text.includes("qf2")
    ) {
      return "QUARTERFINAL 2";
    }

    if (
      text.includes("quarterfinal 3") ||
      text.includes("quarter-final 3") ||
      text.includes("qf3")
    ) {
      return "QUARTERFINAL 3";
    }

    if (
      text.includes("quarterfinal 4") ||
      text.includes("quarter-final 4") ||
      text.includes("qf4")
    ) {
      return "QUARTERFINAL 4";
    }

    const roundOf16Match = text.match(
      /(?:round\s*of\s*16|r16)[\s\-•:_]*(\d+)/
    );

    if (roundOf16Match) {
      return `ROUND OF 16 • MATCH ${roundOf16Match[1]}`;
    }

    if (
      text.includes("round of 16") ||
      text.includes("r16")
    ) {
      return "ROUND OF 16";
    }

    return "CURRENT MATCH";
  }

  function prettyFormat(match = "") {
    const text = clean(match).toLowerCase();

    if (
      text.includes("bo5") ||
      text.includes("best of 5") ||
      text.includes("best-of-5") ||
      text.includes("best-of-five")
    ) {
      return "BO5";
    }

    if (
      text.includes("bo3") ||
      text.includes("best of 3") ||
      text.includes("best-of-3") ||
      text.includes("best-of-three")
    ) {
      return "BO3";
    }

    if (
      text.includes("grand") ||
      text.includes("finals")
    ) {
      return "BO5";
    }

    return "BO3";
  }

  function buildDockLabel(currentMatch) {
    const stage = prettyStage(currentMatch);

    if (stage === "AWAITING NEXT SERIES") {
      return stage;
    }

    return `${stage} • ${prettyFormat(currentMatch)}`;
  }

  function replayRefreshPulse() {
    dock.classList.remove("is-refreshing");

    void dock.offsetWidth;

    dock.classList.add("is-refreshing");

    window.clearTimeout(refreshTimer);

    refreshTimer = window.setTimeout(() => {
      dock.classList.remove("is-refreshing");
    }, 540);
  }

  function updateDock(label) {
    const nextLabel =
      clean(label) || "AWAITING NEXT SERIES";

    if (nextLabel === lastLabel) {
      return;
    }

    window.clearTimeout(labelSwapTimer);

    if (!lastLabel) {
      lastLabel = nextLabel;
      matchLabel.textContent = nextLabel;
      replayRefreshPulse();
      return;
    }

    lastLabel = nextLabel;

    matchLabel.classList.remove("is-entering");
    matchLabel.classList.add("is-leaving");

    labelSwapTimer = window.setTimeout(() => {
      matchLabel.textContent = nextLabel;

      matchLabel.classList.remove("is-leaving");

      void matchLabel.offsetWidth;

      matchLabel.classList.add("is-entering");

      replayRefreshPulse();

      window.setTimeout(() => {
        matchLabel.classList.remove("is-entering");
      }, 370);
    }, 170);
  }

  function connectMatchDock() {
    if (listenerAttached) {
      return;
    }

    matchLabel.textContent =
      "INITIALIZING MATCH DATA";

    try {
      if (typeof firebase === "undefined") {
        throw new Error(
          "Firebase SDK did not load."
        );
      }

      if (
        !firebase.apps ||
        firebase.apps.length === 0
      ) {
        throw new Error(
          "firebase.js did not initialize Firebase."
        );
      }

      const db = firebase.database();

      listenerAttached = true;

      /*
       * Listen to the full site record, matching the
       * original overlay implementation.
       */
      db.ref("site").on(
        "value",

        snapshot => {
          receivedMatchData = true;

          const siteData =
            snapshot.val() || {};

          const currentMatch =
            getCurrentMatchText(
              siteData.currentMatch
            );

          console.log(
            "[RG Match Dock] currentMatch:",
            siteData.currentMatch
          );

          updateDock(
            buildDockLabel(currentMatch)
          );
        },

        error => {
          receivedMatchData = true;

          console.error(
            "[RG Match Dock] Firebase read failed:",
            error
          );

          updateDock(
            error && error.code === "PERMISSION_DENIED"
              ? "MATCH DATA PERMISSION BLOCKED"
              : "MATCH DATA UNAVAILABLE"
          );
        }
      );

      db.ref(".info/connected").on(
        "value",

        snapshot => {
          const connected =
            snapshot.val() === true;

          console.log(
            "[RG Match Dock] connected:",
            connected
          );

          if (
            !connected &&
            !receivedMatchData
          ) {
            matchLabel.textContent =
              "CONNECTING TO FIREBASE";
          }
        }
      );

      window.setTimeout(() => {
        if (!receivedMatchData) {
          updateDock(
            "WAITING FOR MATCH DATA"
          );
        }
      }, 5000);

    } catch (error) {
      console.error(
        "[RG Match Dock] startup failed:",
        error
      );

      updateDock(
        "FIREBASE STARTUP ERROR"
      );
    }
  }

  /*
   * Start immediately. The scripts above are
   * parser-blocking, so Firebase should already exist.
   */
  connectMatchDock();

  /*
   * Also retry when Safari restores the page from cache.
   */
  window.addEventListener(
    "pageshow",
    connectMatchDock
  );
})();
</script>

</body>
</html>
