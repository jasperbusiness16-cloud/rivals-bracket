<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=1920, initial-scale=1.0"
  >

  <title>RG Match Dock</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --dock-width: 650px;
      --dock-height: 94px;

      --dock-bg-0: rgba(8, 8, 14, 0.965);
      --dock-bg-1: rgba(17, 14, 27, 0.965);
      --dock-bg-2: rgba(28, 20, 48, 0.94);

      --dock-text: #f8f5ff;
      --dock-soft: #c8c1d4;
      --dock-muted: #847d91;
      --dock-dim: #5f586b;

      --dock-purple: #9a7cff;
      --dock-purple-bright: #c1adff;
      --dock-purple-rgb: 154, 124, 255;

      --dock-border: rgba(195, 176, 255, 0.18);
      --dock-border-strong: rgba(195, 176, 255, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 1920px;
      height: 1080px;
      margin: 0;
      overflow: hidden;
      background: transparent;
    }

    body {
      position: relative;
      color: var(--dock-text);
      font-family: "Rajdhani", Arial, sans-serif;
    }

    .match-dock {
      position: fixed;
      left: 50%;
      bottom: 24px;
      width: var(--dock-width);
      height: var(--dock-height);
      transform: translateX(-50%);
      pointer-events: none;
      isolation: isolate;

      opacity: 0;

      animation:
        dockIntro 900ms cubic-bezier(0.18, 0.86, 0.24, 1)
        100ms forwards;
    }

    .dock-shadow {
      position: absolute;
      inset: 13px 20px -10px;
      z-index: -2;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.64);
      filter: blur(22px);
      opacity: 0.8;
    }

    .dock-shell {
      position: relative;
      width: 100%;
      height: 100%;

      display: grid;
      grid-template-columns: 102px 1px minmax(0, 1fr);
      align-items: center;

      overflow: hidden;

      border: 1px solid var(--dock-border);
      border-radius: 17px;

      background:
        radial-gradient(
          circle at 13% 34%,
          rgba(var(--dock-purple-rgb), 0.12),
          transparent 27%
        ),
        radial-gradient(
          circle at 90% 15%,
          rgba(var(--dock-purple-rgb), 0.08),
          transparent 32%
        ),
        linear-gradient(
          110deg,
          var(--dock-bg-2) 0%,
          var(--dock-bg-1) 19%,
          var(--dock-bg-0) 53%,
          rgba(13, 12, 21, 0.975) 100%
        );

      box-shadow:
        0 18px 44px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.035),
        inset 0 -1px 0 rgba(0, 0, 0, 0.76),
        0 0 0 1px rgba(var(--dock-purple-rgb), 0.035);
    }

    .dock-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;

      background:
        linear-gradient(
          115deg,
          transparent 0 22%,
          rgba(255, 255, 255, 0.018) 22.2% 22.7%,
          transparent 22.9% 100%
        ),
        repeating-linear-gradient(
          90deg,
          transparent 0 45px,
          rgba(255, 255, 255, 0.012) 46px,
          transparent 47px 88px
        );

      opacity: 0.58;
    }

    .dock-shell::after {
      content: "";
      position: absolute;
      left: 17%;
      right: 4%;
      bottom: 0;
      z-index: 4;
      height: 1px;
      pointer-events: none;

      background:
        linear-gradient(
          90deg,
          transparent,
          rgba(var(--dock-purple-rgb), 0.35) 22%,
          rgba(218, 207, 255, 0.72) 50%,
          rgba(var(--dock-purple-rgb), 0.35) 78%,
          transparent
        );

      opacity: 0.72;
    }

    .dock-frame {
      position: absolute;
      inset: 5px;
      z-index: 1;
      pointer-events: none;

      border: 1px solid rgba(255, 255, 255, 0.035);
      border-radius: 12px;

      clip-path: polygon(
        0 0,
        94% 0,
        100% 35%,
        100% 100%,
        6% 100%,
        0 65%
      );
    }

    .dock-logo-wrap {
      position: relative;
      z-index: 5;
      width: 102px;
      height: 100%;

      display: grid;
      place-items: center;
    }

    .dock-logo-wrap::after {
      content: "";
      position: absolute;
      left: 14px;
      right: 7px;
      bottom: 9px;
      height: 1px;

      background:
        linear-gradient(
          90deg,
          transparent,
          rgba(var(--dock-purple-rgb), 0.5),
          transparent
        );

      opacity: 0.65;
    }

    .dock-logo-glow {
      position: absolute;
      width: 70px;
      height: 70px;
      border-radius: 50%;

      background:
        radial-gradient(
          circle,
          rgba(var(--dock-purple-rgb), 0.26),
          transparent 68%
        );

      filter: blur(9px);
      opacity: 0.62;
    }

    .dock-logo {
      position: relative;
      width: 66px;
      height: 66px;

      display: grid;
      place-items: center;

      overflow: hidden;

      border: 1px solid rgba(var(--dock-purple-rgb), 0.35);
      border-radius: 15px;

      background:
        linear-gradient(
          145deg,
          rgba(var(--dock-purple-rgb), 0.14),
          rgba(7, 7, 12, 0.92) 58%
        );

      box-shadow:
        inset 0 0 18px rgba(var(--dock-purple-rgb), 0.08),
        0 0 18px rgba(var(--dock-purple-rgb), 0.1);

      transform: translateY(13px) scale(0.84);
      opacity: 0;

      animation:
        dockLogoIntro 650ms cubic-bezier(0.18, 0.86, 0.24, 1)
        520ms forwards;
    }

    .dock-logo::before {
      content: "";
      position: absolute;
      inset: 5px;

      border: 1px solid rgba(255, 255, 255, 0.045);
      border-radius: 10px;
    }

    .dock-logo img {
      position: relative;
      z-index: 2;

      width: 53px;
      height: 53px;

      display: block;
      object-fit: contain;

      filter:
        drop-shadow(
          0 0 7px rgba(var(--dock-purple-rgb), 0.26)
        );
    }

    .dock-logo-fallback {
      position: absolute;
      inset: 0;
      z-index: 1;

      display: grid;
      place-items: center;

      color: var(--dock-text);
      font-size: 25px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .dock-logo img:not([src]),
    .dock-logo img[src=""] {
      display: none;
    }

    .dock-divider {
      position: relative;
      z-index: 4;

      width: 1px;
      height: 58px;

      background:
        linear-gradient(
          180deg,
          transparent,
          rgba(204, 189, 255, 0.36) 22%,
          rgba(255, 255, 255, 0.09) 50%,
          rgba(204, 189, 255, 0.28) 78%,
          transparent
        );
    }

    .dock-divider span {
      position: absolute;
      top: 50%;
      left: 50%;

      width: 5px;
      height: 5px;

      border: 1px solid rgba(var(--dock-purple-rgb), 0.5);
      background: #151020;

      transform:
        translate(-50%, -50%)
        rotate(45deg);
    }

    .dock-content {
      position: relative;
      z-index: 3;

      min-width: 0;
      height: 100%;

      display: flex;
      flex-direction: column;
      justify-content: center;

      padding: 8px 48px 7px 26px;

      opacity: 0;
      transform: translateX(-14px);

      animation:
        dockContentIntro 620ms cubic-bezier(0.18, 0.86, 0.24, 1)
        430ms forwards;
    }

    .dock-kicker {
      color: var(--dock-purple-bright);
      font-size: 8px;
      font-weight: 800;
      letter-spacing: 0.22em;
      line-height: 1;
      text-transform: uppercase;

      opacity: 0.78;
    }

    .dock-match {
      min-width: 0;
      margin-top: 4px;
      overflow: hidden;

      color: var(--dock-text);
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.025em;
      line-height: 1;

      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;

      text-shadow:
        0 0 18px rgba(var(--dock-purple-rgb), 0.11);

      transform-origin: left center;
      will-change: opacity, transform, filter;
    }

    .dock-match.is-leaving {
      animation:
        dockLabelLeave 170ms ease forwards;
    }

    .dock-match.is-entering {
      animation:
        dockLabelEnter 360ms cubic-bezier(0.18, 0.86, 0.24, 1)
        forwards;
    }

    .dock-url-row {
      min-width: 0;

      display: grid;
      grid-template-columns:
        minmax(25px, 1fr)
        auto
        minmax(25px, 1fr);

      align-items: center;
      gap: 10px;

      margin-top: 8px;
    }

    .dock-url-line {
      height: 1px;

      background:
        linear-gradient(
          90deg,
          transparent,
          rgba(var(--dock-purple-rgb), 0.38)
        );
    }

    .dock-url-line:last-child {
      background:
        linear-gradient(
          90deg,
          rgba(var(--dock-purple-rgb), 0.38),
          transparent
        );
    }

    .dock-url {
      color: var(--dock-muted);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      line-height: 1;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .dock-endcap {
      position: absolute;
      top: 50%;
      z-index: 6;

      width: 18px;
      height: 46px;

      border: 1px solid rgba(var(--dock-purple-rgb), 0.23);

      background:
        linear-gradient(
          180deg,
          rgba(var(--dock-purple-rgb), 0.14),
          rgba(11, 10, 17, 0.92)
        );

      transform: translateY(-50%);
    }

    .dock-endcap-left {
      left: -8px;

      clip-path: polygon(
        42% 0,
        100% 20%,
        100% 80%,
        42% 100%,
        0 78%,
        0 22%
      );
    }

    .dock-endcap-right {
      right: -8px;

      clip-path: polygon(
        0 20%,
        58% 0,
        100% 22%,
        100% 78%,
        58% 100%,
        0 80%
      );
    }

    .dock-energy {
      position: absolute;
      inset: 0;
      z-index: 8;

      overflow: hidden;
      pointer-events: none;
    }

    .dock-energy span {
      position: absolute;
      top: -1px;

      width: 92px;
      height: 2px;

      background:
        linear-gradient(
          90deg,
          transparent,
          rgba(232, 225, 255, 0.96),
          rgba(var(--dock-purple-rgb), 0.72),
          transparent
        );

      filter:
        drop-shadow(
          0 0 5px rgba(var(--dock-purple-rgb), 0.72)
        );

      opacity: 0;
    }

    .dock-energy-left {
      right: 50%;
      transform: translateX(0);

      animation:
        dockEnergyLeft 7.8s linear 1.2s infinite;
    }

    .dock-energy-right {
      left: 50%;
      transform: translateX(0);

      animation:
        dockEnergyRight 7.8s linear 1.2s infinite;
    }

    .dock-glass-sweep {
      position: absolute;
      inset: -18px -90px;
      z-index: 7;

      pointer-events: none;

      background:
        linear-gradient(
          106deg,
          transparent 36%,
          rgba(255, 255, 255, 0.025) 45%,
          rgba(216, 205, 255, 0.105) 50%,
          rgba(255, 255, 255, 0.018) 55%,
          transparent 64%
        );

      transform: translateX(-116%);

      animation:
        dockGlassSweep 9.6s ease-in-out 2.6s infinite;
    }

    .dock-data-flash {
      position: absolute;
      inset: 0;
      z-index: 9;

      pointer-events: none;

      background:
        linear-gradient(
          90deg,
          transparent,
          rgba(var(--dock-purple-rgb), 0.13),
          rgba(234, 228, 255, 0.18),
          rgba(var(--dock-purple-rgb), 0.13),
          transparent
        );

      opacity: 0;
    }

    .match-dock.is-refreshing .dock-data-flash {
      animation:
        dockDataFlash 520ms ease;
    }

    .match-dock.is-refreshing .dock-logo {
      animation:
        dockLogoDataPulse 520ms ease;
    }

    @keyframes dockIntro {
      0% {
        opacity: 0;

        transform:
          translateX(-50%)
          translateY(24px)
          scaleX(0.82);

        filter: blur(5px);
      }

      55% {
        opacity: 1;
        filter: blur(0);
      }

      100% {
        opacity: 1;

        transform:
          translateX(-50%)
          translateY(0)
          scaleX(1);

        filter: blur(0);
      }
    }

    @keyframes dockLogoIntro {
      from {
        opacity: 0;

        transform:
          translateY(13px)
          scale(0.84);
      }

      to {
        opacity: 1;

        transform:
          translateY(0)
          scale(1);
      }
    }

    @keyframes dockContentIntro {
      from {
        opacity: 0;
        transform: translateX(-14px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes dockLabelLeave {
      to {
        opacity: 0;

        transform:
          translateY(-5px)
          scaleX(0.985);

        filter: blur(2px);
      }
    }

    @keyframes dockLabelEnter {
      from {
        opacity: 0;

        transform:
          translateY(7px)
          scaleX(0.985);

        filter: blur(2px);
      }

      to {
        opacity: 1;

        transform:
          translateY(0)
          scaleX(1);

        filter: blur(0);
      }
    }

    @keyframes dockEnergyLeft {
      0%,
      68% {
        right: 50%;
        opacity: 0;
      }

      70% {
        opacity: 0.9;
      }

      81% {
        right: calc(100% - 84px);
        opacity: 0.72;
      }

      84%,
      100% {
        right: calc(100% - 84px);
        opacity: 0;
      }
    }

    @keyframes dockEnergyRight {
      0%,
      68% {
        left: 50%;
        opacity: 0;
      }

      70% {
        opacity: 0.9;
      }

      81% {
        left: calc(100% - 84px);
        opacity: 0.72;
      }

      84%,
      100% {
        left: calc(100% - 84px);
        opacity: 0;
      }
    }

    @keyframes dockGlassSweep {
      0%,
      70% {
        transform: translateX(-116%);
        opacity: 0;
      }

      73% {
        opacity: 0.7;
      }

      82% {
        opacity: 0.45;
      }

      86%,
      100% {
        transform: translateX(116%);
        opacity: 0;
      }
    }

    @keyframes dockDataFlash {
      0% {
        opacity: 0;
        transform: scaleX(0.35);
      }

      38% {
        opacity: 0.85;
      }

      100% {
        opacity: 0;
        transform: scaleX(1);
      }
    }

    @keyframes dockLogoDataPulse {
      0%,
      100% {
        transform: scale(1);

        box-shadow:
          inset 0 0 18px rgba(var(--dock-purple-rgb), 0.08),
          0 0 18px rgba(var(--dock-purple-rgb), 0.1);
      }

      45% {
        transform: scale(1.045);

        box-shadow:
          inset 0 0 22px rgba(var(--dock-purple-rgb), 0.16),
          0 0 28px rgba(var(--dock-purple-rgb), 0.25);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .match-dock,
      .dock-logo,
      .dock-content,
      .dock-energy span,
      .dock-glass-sweep,
      .dock-data-flash,
      .dock-match {
        animation: none !important;
        transition: none !important;
      }

      .match-dock {
        opacity: 1 !important;
        transform: translateX(-50%) !important;
        filter: none !important;
      }

      .dock-logo,
      .dock-content {
        opacity: 1 !important;
        transform: none !important;
        filter: none !important;
      }
    }
  </style>
</head>

<body>
  <main
    id="matchDock"
    class="match-dock"
    aria-label="Current Rivals Gauntlet match"
  >
    <div
      class="dock-shadow"
      aria-hidden="true"
    ></div>

    <div class="dock-shell">
      <div
        class="dock-frame"
        aria-hidden="true"
      ></div>

      <div
        class="dock-energy"
        aria-hidden="true"
      >
        <span class="dock-energy-left"></span>
        <span class="dock-energy-right"></span>
      </div>

      <div class="dock-logo-wrap">
        <div
          class="dock-logo-glow"
          aria-hidden="true"
        ></div>

        <div class="dock-logo">
          <img
            src="assets/logos/clean%20logo.PNG"
            alt="Rivals Gauntlet"
          >

          <span
            class="dock-logo-fallback"
            aria-hidden="true"
          >
            RG
          </span>
        </div>
      </div>

      <div
        class="dock-divider"
        aria-hidden="true"
      >
        <span></span>
      </div>

      <section class="dock-content">
        <div class="dock-kicker">
          Current Series
        </div>

        <div
          id="matchLabel"
          class="dock-match"
          aria-live="polite"
        >
          LOADING MATCH
        </div>

        <div class="dock-url-row">
          <span class="dock-url-line"></span>

          <div
            id="dockUrl"
            class="dock-url"
          >
            RIVALSGAUNTLET.COM
          </div>

          <span class="dock-url-line"></span>
        </div>
      </section>

      <div
        class="dock-endcap dock-endcap-left"
        aria-hidden="true"
      ></div>

      <div
        class="dock-endcap dock-endcap-right"
        aria-hidden="true"
      ></div>

      <div
        class="dock-data-flash"
        aria-hidden="true"
      ></div>

      <div
        class="dock-glass-sweep"
        aria-hidden="true"
      ></div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script src="../firebase.js"></script>

  <script>
    const siteRef = database.ref("site");

    const matchLabel =
      document.getElementById("matchLabel");

    const dockUrl =
      document.getElementById("dockUrl");

    const dock =
      document.getElementById("matchDock");

    let lastLabel = "";
    let labelSwapTimer = null;
    let refreshTimer = null;

    function clean(value = "") {
      return String(value ?? "").trim();
    }

    function getCurrentMatchText(value) {
      if (typeof value === "string") {
        return clean(value);
      }

      if (value && typeof value === "object") {
        return clean(
          value.fullMatchId ||
          value.label ||
          value.name ||
          value.matchId
        );
      }

      return "";
    }

    function prettyStage(match = "") {
      const text = clean(match).toLowerCase();

      if (
        !text ||
        text.includes("no match")
      ) {
        return "AWAITING NEXT SERIES";
      }

      if (
        text.includes("grand") ||
        text.includes("finals")
      ) {
        return "GRAND FINALS";
      }

      if (
        text.includes("semifinal 1") ||
        text.includes("semi-final 1") ||
        text.includes("sf1")
      ) {
        return "SEMIFINAL 1";
      }

      if (
        text.includes("semifinal 2") ||
        text.includes("semi-final 2") ||
        text.includes("sf2")
      ) {
        return "SEMIFINAL 2";
      }

      if (
        text.includes("quarterfinal 1") ||
        text.includes("quarter-final 1") ||
        text.includes("qf1")
      ) {
        return "QUARTERFINAL 1";
      }

      if (
        text.includes("quarterfinal 2") ||
        text.includes("quarter-final 2") ||
        text.includes("qf2")
      ) {
        return "QUARTERFINAL 2";
      }

      if (
        text.includes("quarterfinal 3") ||
        text.includes("quarter-final 3") ||
        text.includes("qf3")
      ) {
        return "QUARTERFINAL 3";
      }

      if (
        text.includes("quarterfinal 4") ||
        text.includes("quarter-final 4") ||
        text.includes("qf4")
      ) {
        return "QUARTERFINAL 4";
      }

      const roundOf16Match = text.match(
        /(?:round\s*of\s*16|r16)[\s\-•:_]*(\d+)/
      );

      if (roundOf16Match) {
        return `ROUND OF 16 • MATCH ${roundOf16Match[1]}`;
      }

      if (
        text.includes("round of 16") ||
        text.includes("r16")
      ) {
        return "ROUND OF 16";
      }

      return "CURRENT MATCH";
    }

    function prettyFormat(match = "") {
      const text = clean(match).toLowerCase();

      if (
        text.includes("bo5") ||
        text.includes("best of 5") ||
        text.includes("best-of-5")
      ) {
        return "BO5";
      }

      if (
        text.includes("bo3") ||
        text.includes("best of 3") ||
        text.includes("best-of-3")
      ) {
        return "BO3";
      }

      if (
        text.includes("grand") ||
        text.includes("finals")
      ) {
        return "BO5";
      }

      return "BO3";
    }

    function buildDockLabel(currentMatch) {
      const stage = prettyStage(currentMatch);

      if (stage === "AWAITING NEXT SERIES") {
        return stage;
      }

      return `${stage} • ${prettyFormat(currentMatch)}`;
    }

    function normalizeWebsite(value = "") {
      const text = clean(value)
        .replace(/^https?:\/\//i, "")
        .replace(/^www\./i, "")
        .replace(/\/+$/, "");

      return text || "RIVALSGAUNTLET.COM";
    }

    function replayRefreshPulse() {
      dock.classList.remove("is-refreshing");

      void dock.offsetWidth;

      dock.classList.add("is-refreshing");

      window.clearTimeout(refreshTimer);

      refreshTimer = window.setTimeout(() => {
        dock.classList.remove("is-refreshing");
      }, 560);
    }

    function updateDock(label) {
      const nextLabel =
        clean(label) || "AWAITING NEXT SERIES";

      if (nextLabel === lastLabel) {
        return;
      }

      window.clearTimeout(labelSwapTimer);

      if (!lastLabel) {
        lastLabel = nextLabel;
        matchLabel.textContent = nextLabel;
        replayRefreshPulse();
        return;
      }

      lastLabel = nextLabel;

      matchLabel.classList.remove("is-entering");
      matchLabel.classList.add("is-leaving");

      labelSwapTimer = window.setTimeout(() => {
        matchLabel.textContent = nextLabel;

        matchLabel.classList.remove("is-leaving");

        void matchLabel.offsetWidth;

        matchLabel.classList.add("is-entering");

        replayRefreshPulse();

        window.setTimeout(() => {
          matchLabel.classList.remove("is-entering");
        }, 390);
      }, 170);
    }

    siteRef.on(
      "value",

      snapshot => {
        const data = snapshot.val() || {};

        const currentMatch =
          getCurrentMatchText(data.currentMatch);

        updateDock(
          buildDockLabel(currentMatch)
        );

        dockUrl.textContent = normalizeWebsite(
          data.websiteUrl ||
          data.website ||
          data.siteUrl
        );
      },

      error => {
        console.error(
          "Match Dock could not read site data:",
          error
        );

        updateDock(
          "RIVALS GAUNTLET • LIVE BROADCAST"
        );
      }
    );
  </script>
</body>
</html>
