<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>Rivals Gauntlet Match Header</title>
  <link rel="stylesheet" href="overlay.css?v=20">
</head>
<body>

  <main class="overlay-stage">

    <section class="match-header">

      <div class="team team-left">
        <div class="team-mark">RG</div>
        <div class="team-text">
          <span>TEAM ONE</span>
          <h1 id="teamA">TEAM ALPHA</h1>
        </div>
      </div>

      <div class="center-score">
        <div class="brand">RIVALS <span>GAUNTLET</span></div>
        <div class="scores">
          <strong id="scoreA">0</strong>
          <em>VS</em>
          <strong id="scoreB">0</strong>
        </div>
        <p id="matchInfo">ROUND 1 • BEST OF 3</p>
      </div>

      <div class="team team-right">
        <div class="team-text">
          <span>TEAM TWO</span>
          <h1 id="teamB">TEAM BRAVO</h1>
        </div>
        <div class="team-mark">RG</div>
      </div>

    </section>

  </main>

  <script src="overlay.js?v=20"></script>
</body>
</html>
