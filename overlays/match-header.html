<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>Rivals Gauntlet | Gameplay Header</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="overlay.css?v=70">
<link rel="stylesheet" href="components.css?v=70">
<link rel="stylesheet" href="animations.css?v=70">
</head>
<body>

  <main class="stage">

    <section class="gameplay-header">

  <div class="side-panel left-panel rg-panel anim-panel-in">
    <div class="panel-brand">
      <div class="logo-frame">
<img src="assets/logos/clean%20logo.PNG" alt="Rivals Gauntlet Logo">
</div>

      <div class="team-block">
        <span class="rg-label" id="teamAMeta">QF1 • BO3</span>
        <h1 class="team-name" id="teamA">TEAM ALPHA</h1>
      </div>
    </div>

    <div class="panel-score">
      <div class="score-box" id="scoreA">0</div>
      <div class="series" id="seriesA"></div>
    </div>
  </div>

  <div class="center-safe-zone"></div>

  <div class="side-panel right-panel rg-panel anim-panel-in">
    <div class="panel-score">
      <div class="series" id="seriesB"></div>
      <div class="score-box" id="scoreB">0</div>
    </div>

    <div class="panel-brand">
      <div class="team-block">
        <span class="rg-label" id="teamBMeta">BEST OF 3</span>
        <h1 class="team-name" id="teamB">TEAM BRAVO</h1>
      </div>

      <div class="logo-frame">
  <img src="assets/logos/clean%20logo.PNG" alt="Rivals Gauntlet Logo">
</div>
    </div>
  </div>

</section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="../firebase.js"></script>
<script src="overlay.js?v=70"></script>
</body>
</html>
