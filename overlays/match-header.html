<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>Rivals Gauntlet | Gameplay Header</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="overlay.css?v=50">
<link rel="stylesheet" href="components.css?v=50">
<link rel="stylesheet" href="animations.css?v=50">
</head>
<body>

  <main class="stage">

    <section class="gameplay-header">

      <div class="side-panel left-panel">
        <div class="rg-mark">
    <img src="assets/logo/rg-white.png" alt="RG">
</div>

        <div class="team-block">
          <span class="team-meta" id="teamAMeta">#1 SEED</span>
          <h1 id="teamA">TEAM ALPHA</h1>
        </div>

        <div class="score-box" id="scoreA">0</div>

        <div class="series-dots" id="seriesA">
          <span class="dot active"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>

      <div class="center-safe-zone"></div>

      <div class="side-panel right-panel">
        <div class="series-dots" id="seriesB">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot active"></span>
        </div>

        <div class="score-box" id="scoreB">0</div>

        <div class="team-block">
          <span class="team-meta" id="teamBMeta">#4 SEED</span>
          <h1 id="teamB">TEAM BRAVO</h1>
        </div>

        <div class="rg-mark">
    <img src="assets/logo/rg-white.png" alt="RG">
</div>
      </div>

    </section>

  </main>

  <script src="overlay.js?v=30"></script>
</body>
</html>
