<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>Rivals Gauntlet | Match Intro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #06060b;
      --panel: rgba(13, 12, 21, 0.96);
      --panel-soft: rgba(20, 17, 33, 0.9);
      --text: #f8f5ff;
      --soft: #c8c1d3;
      --muted: #8d8798;
      --dim: #625c6f;
      --purple: #9a7cff;
      --purple-bright: #c5b5ff;
      --purple-rgb: 154, 124, 255;
      --blue: #78a9ff;
      --blue-rgb: 120, 169, 255;
      --green: #62e1a6;
      --yellow: #f2c66c;
      --red: #ff718a;
      --line: rgba(205, 191, 255, 0.13);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 1920px;
      height: 1080px;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      color: var(--text);
      font-family: "Rajdhani", Arial, sans-serif;
    }

    .stage {
      position: relative;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      isolation: isolate;

      background:
        radial-gradient(
          circle at 24% 42%,
          rgba(var(--purple-rgb), 0.14),
          transparent 31%
        ),
        radial-gradient(
          circle at 76% 42%,
          rgba(var(--blue-rgb), 0.11),
          transparent 31%
        ),
        radial-gradient(
          circle at 50% 50%,
          rgba(255, 255, 255, 0.025),
          transparent 25%
        ),
        linear-gradient(
          145deg,
          #110d1d 0%,
          #0a0912 48%,
          #06060b 100%
        );
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: -70px;
      z-index: -5;

      background:
        linear-gradient(
          116deg,
          transparent 0 22%,
          rgba(255, 255, 255, 0.012) 22.15% 22.4%,
          transparent 22.55% 75%,
          rgba(255, 255, 255, 0.01) 75.15% 75.4%,
          transparent 75.55%
        ),
        repeating-linear-gradient(
          90deg,
          transparent 0 110px,
          rgba(255, 255, 255, 0.008) 111px,
          transparent 112px 220px
        );

      animation: backgroundDrift 34s ease-in-out infinite alternate;
    }

    .stage::after {
      content: "RG";
      position: absolute;
      left: 50%;
      top: 53%;
      z-index: -4;

      color: rgba(255, 255, 255, 0.014);
      font-size: 700px;
      font-weight: 800;
      letter-spacing: -0.13em;
      line-height: 0.72;

      transform: translate(-48%, -50%);
    }

    .grid {
      position: absolute;
      inset: -120px;
      z-index: -3;

      opacity: 0.34;

      background-image:
        linear-gradient(
          rgba(var(--purple-rgb), 0.04) 1px,
          transparent 1px
        ),
        linear-gradient(
          90deg,
          rgba(var(--purple-rgb), 0.04) 1px,
          transparent 1px
        );

      background-size: 86px 86px;

      transform:
        perspective(760px)
        rotateX(68deg)
        translateY(470px)
        scale(1.32);

      transform-origin: center bottom;

      mask-image:
        linear-gradient(
          to top,
          black,
          transparent 78%
        );

      animation: gridMove 24s linear infinite;
    }

    .ambient {
      position: absolute;
      z-index: -2;
      border-radius: 50%;
      filter: blur(18px);
      opacity: 0.35;
    }

    .ambient.left {
      width: 560px;
      height: 560px;
      left: -260px;
      top: 180px;

      background:
        radial-gradient(
          circle,
          rgba(var(--purple-rgb), 0.18),
          transparent 68%
        );

      animation: ambientFloat 14s ease-in-out infinite alternate;
    }

    .ambient.right {
      width: 560px;
      height: 560px;
      right: -260px;
      top: 180px;

      background:
        radial-gradient(
          circle,
          rgba(var(--blue-rgb), 0.15),
          transparent 68%
        );

      animation: ambientFloat 17s ease-in-out infinite alternate-reverse;
    }

    .frame {
      position: absolute;
      inset: 28px;
      z-index: 40;
      pointer-events: none;

      border:
        1px solid
        rgba(var(--purple-rgb), 0.1);

      clip-path: polygon(
        0 0,
        18% 0,
        19% 6px,
        81% 6px,
        82% 0,
        100% 0,
        100% 28%,
        calc(100% - 6px) 29%,
        calc(100% - 6px) 71%,
        100% 72%,
        100% 100%,
        82% 100%,
        81% calc(100% - 6px),
        19% calc(100% - 6px),
        18% 100%,
        0 100%,
        0 72%,
        6px 71%,
        6px 29%,
        0 28%
      );
    }

    .header {
      position: absolute;
      left: 58px;
      right: 58px;
      top: 42px;
      z-index: 30;

      display: grid;
      grid-template-columns:
        minmax(0, 1fr)
        auto
        minmax(0, 1fr);

      align-items: center;
      gap: 26px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 15px;
      min-width: 0;
    }

    .mark {
      position: relative;

      width: 58px;
      height: 58px;

      display: grid;
      place-items: center;

      border:
        1px solid
        rgba(var(--purple-rgb), 0.42);

      border-radius: 15px;

      background:
        linear-gradient(
          145deg,
          rgba(var(--purple-rgb), 0.16),
          rgba(8, 7, 13, 0.96) 68%
        );

      box-shadow:
        inset 0 0 22px
        rgba(var(--purple-rgb), 0.08),
        0 0 28px
        rgba(var(--purple-rgb), 0.1);

      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.05em;
    }

    .mark::before {
      content: "";
      position: absolute;
      inset: 6px;

      border:
        1px solid
        rgba(255, 255, 255, 0.045);

      border-radius: 10px;
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-copy span,
    .brand-copy strong {
      display: block;
    }

    .brand-copy span {
      color: var(--purple-bright);
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .brand-copy strong {
      max-width: 640px;
      margin-top: 4px;
      overflow: hidden;

      font-size: 23px;
      font-weight: 800;
      letter-spacing: 0.055em;

      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .match-heading {
      min-width: 520px;

      padding: 12px 26px 13px;

      border:
        1px solid
        var(--line);

      border-radius: 15px;

      background:
        linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.018),
          transparent
        ),
        rgba(10, 9, 17, 0.78);

      box-shadow:
        0 16px 38px
        rgba(0, 0, 0, 0.28),
        inset 0 1px 0
        rgba(255, 255, 255, 0.025);

      text-align: center;
    }

    .match-heading span,
    .match-heading strong {
      display: block;
    }

    .match-heading span {
      color: var(--muted);
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .match-heading strong {
      margin-top: 3px;

      font-size: 21px;
      font-weight: 800;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .status-wrap {
      display: flex;
      justify-content: flex-end;
    }

    .connection {
      min-height: 36px;

      display: inline-flex;
      align-items: center;
      gap: 9px;

      padding: 0 14px;

      border:
        1px solid
        rgba(242, 198, 108, 0.2);

      border-radius: 999px;

      color: var(--yellow);
      background:
        rgba(242, 198, 108, 0.055);

      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    .connection.online {
      border-color:
        rgba(98, 225, 166, 0.22);

      color: var(--green);
      background:
        rgba(98, 225, 166, 0.055);
    }

    .connection.limited {
      border-color:
        rgba(255, 113, 138, 0.22);

      color: var(--red);
      background:
        rgba(255, 113, 138, 0.055);
    }

    .connection-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;

      background: currentColor;

      box-shadow:
        0 0 11px currentColor;
    }

    .match-layout {
      position: absolute;
      left: 52px;
      right: 52px;
      top: 136px;
      bottom: 88px;
      z-index: 10;

      display: grid;
      grid-template-columns:
        minmax(0, 1fr)
        214px
        minmax(0, 1fr);

      align-items: stretch;
      gap: 23px;
    }

    .team-panel {
      position: relative;
      min-width: 0;
      overflow: hidden;

      border:
        1px solid
        var(--line);

      border-radius: 25px;

      background:
        linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.014),
          transparent 110px
        ),
        linear-gradient(
          145deg,
          rgba(23, 18, 38, 0.95),
          rgba(8, 8, 14, 0.96)
        );

      box-shadow:
        0 28px 74px
        rgba(0, 0, 0, 0.42),
        inset 0 1px 0
        rgba(255, 255, 255, 0.025);
    }

    .team-panel::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;

      width: 3px;
    }

    .team-panel.left::before {
      left: 0;

      background:
        linear-gradient(
          to bottom,
          transparent,
          rgba(var(--purple-rgb), 0.86) 25%,
          rgba(var(--purple-rgb), 0.32) 76%,
          transparent
        );
    }

    .team-panel.right::before {
      right: 0;

      background:
        linear-gradient(
          to bottom,
          transparent,
          rgba(var(--blue-rgb), 0.82) 25%,
          rgba(var(--blue-rgb), 0.3) 76%,
          transparent
        );
    }

    .team-panel.left {
      animation:
        teamLeftIn 0.85s
        cubic-bezier(0.18, 0.86, 0.24, 1)
        both;
    }

    .team-panel.right {
      animation:
        teamRightIn 0.85s
        cubic-bezier(0.18, 0.86, 0.24, 1)
        both;
    }

    .team-header {
      min-height: 104px;

      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 22px;

      padding: 20px 26px;

      border-bottom:
        1px solid
        rgba(255, 255, 255, 0.055);
    }

    .team-header-copy {
      min-width: 0;
    }

    .team-header-copy span,
    .team-header-copy h2 {
      display: block;
    }

    .team-header-copy span {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .left .team-header-copy span {
      color: var(--purple-bright);
    }

    .right .team-header-copy span {
      color: #b9d1ff;
    }

    .team-header-copy h2 {
      max-width: 560px;
      margin: 5px 0 0;
      overflow: hidden;

      font-size: 36px;
      font-weight: 800;
      letter-spacing: 0.035em;
      line-height: 0.94;

      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .team-seed {
      min-width: 62px;
      height: 48px;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      border:
        1px solid
        rgba(255, 255, 255, 0.06);

      border-radius: 12px;

      background:
        rgba(255, 255, 255, 0.018);
    }

    .team-seed small,
    .team-seed strong {
      display: block;
    }

    .team-seed small {
      color: var(--dim);

      font-size: 8px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .team-seed strong {
      margin-top: 2px;

      font-size: 16px;
      font-weight: 800;
    }

    .player-grid {
      display: grid;
      grid-template-columns:
        repeat(2, minmax(0, 1fr));

      grid-auto-rows:
        minmax(0, 1fr);

      gap: 14px;

      height:
        calc(100% - 104px);

      padding: 18px;
    }

    .player-card {
      position: relative;
      min-width: 0;
      overflow: hidden;

      display: grid;
      grid-template-columns:
        118px minmax(0, 1fr);

      align-items: center;
      gap: 16px;

      padding: 15px;

      border:
        1px solid
        rgba(255, 255, 255, 0.055);

      border-radius: 17px;

      background:
        linear-gradient(
          145deg,
          rgba(255, 255, 255, 0.02),
          rgba(255, 255, 255, 0.008)
        );

      opacity: 0;

      transform:
        translateY(13px)
        scale(0.986);

      animation:
        playerCardIn 0.62s
        cubic-bezier(0.18, 0.86, 0.24, 1)
        forwards;

      animation-delay:
        calc(
          0.2s +
          var(--delay, 0) *
          0.08s
        );
    }

    .left .player-card::after,
    .right .player-card::after {
      content: "";
      position: absolute;
      left: 0;
      top: 18%;
      bottom: 18%;

      width: 2px;
      border-radius: 999px;
    }

    .left .player-card::after {
      background:
        rgba(var(--purple-rgb), 0.58);
    }

    .right .player-card::after {
      background:
        rgba(var(--blue-rgb), 0.54);
    }

    .player-photo {
      position: relative;

      width: 112px;
      height: 112px;

      overflow: hidden;

      border:
        1px solid
        rgba(255, 255, 255, 0.08);

      border-radius: 15px;

      background:
        linear-gradient(
          145deg,
          rgba(var(--purple-rgb), 0.11),
          rgba(8, 8, 14, 0.94)
        );

      box-shadow:
        inset 0 0 25px
        rgba(var(--purple-rgb), 0.04);
    }

    .right .player-photo {
      background:
        linear-gradient(
          145deg,
          rgba(var(--blue-rgb), 0.1),
          rgba(8, 8, 14, 0.94)
        );
    }

    .player-photo img {
      position: absolute;
      inset: 0;

      width: 100%;
      height: 100%;

      object-fit: cover;
      object-position: center;

      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .player-photo img.loaded {
      opacity: 1;
    }

    .player-initials {
      position: absolute;
      inset: 0;

      display: grid;
      place-items: center;

      color: var(--purple-bright);

      font-size: 31px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .right .player-initials {
      color: #b9d1ff;
    }

    .player-copy {
      min-width: 0;
    }

    .player-name {
      display: block;
      overflow: hidden;

      font-size: 25px;
      font-weight: 800;
      letter-spacing: 0.025em;
      line-height: 0.95;

      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .player-rgid {
      display: block;
      margin-top: 7px;
      overflow: hidden;

      color: var(--muted);

      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.13em;

      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .player-meta {
      display: grid;
      grid-template-columns:
        minmax(0, 1fr)
        minmax(0, 1fr);

      gap: 8px;
      margin-top: 13px;
    }

    .meta-pill {
      min-width: 0;
      min-height: 43px;

      display: flex;
      flex-direction: column;
      justify-content: center;

      padding: 7px 9px;

      border:
        1px solid
        rgba(255, 255, 255, 0.05);

      border-radius: 9px;

      background:
        rgba(255, 255, 255, 0.014);
    }

    .meta-pill small,
    .meta-pill strong {
      display: block;
      overflow: hidden;

      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .meta-pill small {
      color: var(--dim);

      font-size: 7px;
      font-weight: 800;
      letter-spacing: 0.11em;
      text-transform: uppercase;
    }

    .meta-pill strong {
      margin-top: 2px;

      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .left .meta-pill strong {
      color: var(--purple-bright);
    }

    .right .meta-pill strong {
      color: #b9d1ff;
    }

    .vs-column {
      position: relative;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      animation:
        vsIn 0.78s
        cubic-bezier(0.18, 0.86, 0.24, 1)
        0.12s both;
    }

    .vs-column::before,
    .vs-column::after {
      content: "";

      width: 1px;
      flex: 1;

      background:
        linear-gradient(
          to bottom,
          transparent,
          rgba(var(--purple-rgb), 0.25),
          transparent
        );
    }

    .vs-core {
      position: relative;

      width: 154px;
      height: 154px;

      display: grid;
      place-items: center;

      margin: 22px 0;

      border:
        1px solid
        rgba(var(--purple-rgb), 0.28);

      border-radius: 50%;

      background:
        radial-gradient(
          circle,
          rgba(var(--purple-rgb), 0.11),
          rgba(8, 8, 14, 0.96) 68%
        );

      box-shadow:
        0 0 42px
        rgba(var(--purple-rgb), 0.09),
        inset 0 0 28px
        rgba(var(--purple-rgb), 0.05);
    }

    .vs-core::before {
      content: "";

      position: absolute;
      inset: 12px;

      border:
        1px solid
        rgba(255, 255, 255, 0.04);

      border-radius: 50%;
    }

    .vs-core strong {
      font-size: 50px;
      font-weight: 800;
      letter-spacing: -0.055em;
    }

    .vs-format {
      min-width: 92px;

      margin-top: -8px;
      padding: 8px 13px;

      border:
        1px solid
        rgba(var(--purple-rgb), 0.18);

      border-radius: 999px;

      color: var(--purple-bright);

      background:
        rgba(var(--purple-rgb), 0.04);

      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-align: center;
      text-transform: uppercase;
    }

    .vs-label {
      max-width: 190px;
      margin-top: 15px;

      color: var(--muted);

      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.13em;
      line-height: 1.4;
      text-align: center;
      text-transform: uppercase;
    }

    .footer {
      position: absolute;
      left: 58px;
      right: 58px;
      bottom: 30px;
      z-index: 30;

      display: grid;
      grid-template-columns:
        1fr auto 1fr;

      align-items: center;
      gap: 22px;
    }

    .footer-line {
      height: 1px;

      background:
        linear-gradient(
          90deg,
          transparent,
          rgba(var(--purple-rgb), 0.3)
        );
    }

    .footer-line:last-child {
      transform: scaleX(-1);
    }

    .footer-copy {
      display: flex;
      align-items: center;
      gap: 14px;

      white-space: nowrap;
    }

    .footer-copy strong {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .footer-copy span {
      width: 5px;
      height: 5px;
      border-radius: 50%;

      background: var(--purple);

      box-shadow:
        0 0 10px
        rgba(var(--purple-rgb), 0.6);
    }

    .footer-copy small {
      color: var(--muted);

      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .stage.updating .team-panel,
    .stage.updating .vs-column {
      opacity: 0.3;
      transform: scale(0.992);
      transition:
        opacity 0.18s ease,
        transform 0.18s ease;
    }

    @keyframes backgroundDrift {
      from {
        transform:
          translate3d(-16px, -8px, 0)
          scale(1.015);
      }

      to {
        transform:
          translate3d(18px, 10px, 0)
          scale(1.03);
      }
    }

    @keyframes gridMove {
      to {
        background-position:
          0 86px,
          86px 0;
      }
    }

    @keyframes ambientFloat {
      from {
        transform:
          translate3d(-12px, -8px, 0)
          scale(0.96);
      }

      to {
        transform:
          translate3d(18px, 12px, 0)
          scale(1.05);
      }
    }

    @keyframes teamLeftIn {
      from {
        opacity: 0;
        transform: translateX(-34px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    @keyframes teamRightIn {
      from {
        opacity: 0;
        transform: translateX(34px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    @keyframes vsIn {
      from {
        opacity: 0;
        transform: scale(0.92);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    @keyframes playerCardIn {
      to {
        opacity: 1;
        transform: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }

      .player-card {
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>

<body>
  <main id="stage" class="stage">
    <div class="grid" aria-hidden="true"></div>
    <div class="ambient left" aria-hidden="true"></div>
    <div class="ambient right" aria-hidden="true"></div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

  <script>
    (function () {
      "use strict";

      var state = {
        site: {},
        countdown: {},
        intro: {},
        players: {},
        publicPlayers: {},
        publicProfiles: {},
        teams: {}
      };

      var readState = {
        players: true,
        publicPlayers: true,
        publicProfiles: true,
        teams: true
      };

      var renderTimer = null;

      var stage =
        document.getElementById(
          "stage"
        );

      var eventName =
        document.getElementById(
          "eventName"
        );

      var matchHeading =
        document.getElementById(
          "matchHeading"
        );

      var teamAName =
        document.getElementById(
          "teamAName"
        );

      var teamBName =
        document.getElementById(
          "teamBName"
        );

      var teamASeed =
        document.getElementById(
          "teamASeed"
        );

      var teamBSeed =
        document.getElementById(
          "teamBSeed"
        );

      var teamAPlayers =
        document.getElementById(
          "teamAPlayers"
        );

      var teamBPlayers =
        document.getElementById(
          "teamBPlayers"
        );

      var matchFormat =
        document.getElementById(
          "matchFormat"
        );

      var roundLabel =
        document.getElementById(
          "roundLabel"
        );

      var website =
        document.getElementById(
          "website"
        );

      var connection =
        document.getElementById(
          "connection"
        );

      var connectionText =
        document.getElementById(
          "connectionText"
        );

      function clean(
        value,
        fallback
      ) {
        var text =
          value == null
            ? ""
            : String(value).trim();

        return text || fallback || "";
      }

      function normalize(value) {
        return clean(value)
          .toLowerCase()
          .replace(
            /[^a-z0-9]/g,
            ""
          );
      }

      function escapeHtml(value) {
        return clean(value)
          .replace(
            /&/g,
            "&amp;"
          )
          .replace(
            /</g,
            "&lt;"
          )
          .replace(
            />/g,
            "&gt;"
          )
          .replace(
            /"/g,
            "&quot;"
          )
          .replace(
            /'/g,
            "&#039;"
          );
      }

      function objectValue(value) {
        return (
          value &&
          typeof value === "object"
        )
          ? value
          : {};
      }

      function firstValue(
        object,
        keys,
        fallback
      ) {
        var source =
          objectValue(object);

        var index;
        var value;

        for (
          index = 0;
          index < keys.length;
          index += 1
        ) {
          value =
            source[keys[index]];

          if (
            value !== undefined &&
            value !== null &&
            String(value).trim() !== ""
          ) {
            return value;
          }
        }

        return fallback;
      }

      function formatRgId(value) {
        var raw =
          clean(value);

        if (!raw) {
          return "RG ID NOT SET";
        }

        if (
          normalize(raw).indexOf(
            "rg"
          ) === 0
        ) {
          return raw.toUpperCase();
        }

        return (
          "RG ID • " +
          raw.toUpperCase()
        );
      }

      function initials(value) {
        var parts =
          clean(
            value,
            "RG"
          )
            .split(/\s+/)
            .filter(Boolean);

        if (!parts.length) {
          return "RG";
        }

        if (parts.length === 1) {
          return parts[0]
            .slice(0, 2)
            .toUpperCase();
        }

        return (
          (
            parts[0][0] ||
            ""
          ) +
          (
            parts[
              parts.length - 1
            ][0] ||
            ""
          )
        ).toUpperCase();
      }

      function getFormat(value) {
        var text =
          clean(value)
            .toLowerCase();

        return text.indexOf(
          "bo5"
        ) !== -1
          ? "BO5"
          : "BO3";
      }

      function getRoundLabel(value) {
        var text =
          clean(value)
            .toLowerCase();

        if (
          text.indexOf(
            "grand"
          ) !== -1
        ) {
          return "GRAND FINALS";
        }

        if (
          text.indexOf(
            "sf1"
          ) !== -1
        ) {
          return "SEMIFINAL 1";
        }

        if (
          text.indexOf(
            "sf2"
          ) !== -1
        ) {
          return "SEMIFINAL 2";
        }

        if (
          text.indexOf(
            "qf1"
          ) !== -1
        ) {
          return "QUARTERFINAL 1";
        }

        if (
          text.indexOf(
            "qf2"
          ) !== -1
        ) {
          return "QUARTERFINAL 2";
        }

        if (
          text.indexOf(
            "qf3"
          ) !== -1
        ) {
          return "QUARTERFINAL 3";
        }

        if (
          text.indexOf(
            "qf4"
          ) !== -1
        ) {
          return "QUARTERFINAL 4";
        }

        var r16Match =
          text.match(
            /r16[-\s]?([1-8])/
          );

        if (r16Match) {
          return (
            "ROUND OF 16 • MATCH " +
            r16Match[1]
          );
        }

        return clean(
          value,
          "MATCH INTRO"
        )
          .replace(
            /•\s*bo[35]/i,
            ""
          )
          .trim()
          .toUpperCase();
      }

      function validCurrentMatch() {
        var current =
          clean(
            state.site.currentMatch
          );

        if (!current) {
          return "";
        }

        var normalized =
          normalize(current);

        if (
          normalized ===
            "nomatchlive" ||
          normalized ===
            "nomatch"
        ) {
          return "";
        }

        return current;
      }

      function siteTeamName(number) {
        return clean(
          state.site[
            "team" + number
          ],
          "Team " + number
        );
      }

      function teamNumberByName(name) {
        var target =
          normalize(name);

        var number;

        if (!target) {
          return null;
        }

        for (
          number = 1;
          number <= 16;
          number += 1
        ) {
          if (
            normalize(
              siteTeamName(number)
            ) === target
          ) {
            return number;
          }
        }

        return null;
      }

      function bracketMatch(matchValue) {
        var current =
          clean(matchValue);

        var text =
          current.toLowerCase();

        var r16Match =
          text.match(
            /r16[-\s]?([1-8])/
          );

        if (r16Match) {
          var r16Number =
            Number(r16Match[1]);

          return {
            label:
              "ROUND OF 16 • MATCH " +
              r16Number,

            format:
              getFormat(current),

            aNum:
              (
                r16Number - 1
              ) *
              2 +
              1,

            bNum:
              (
                r16Number - 1
              ) *
              2 +
              2
          };
        }

        var qfMatch =
          text.match(
            /qf[-\s]?([1-4])/
          );

        if (qfMatch) {
          var qfNumber =
            Number(qfMatch[1]);

          return {
            label:
              "QUARTERFINAL " +
              qfNumber,

            format:
              getFormat(current),

            aNum:
              (
                qfNumber - 1
              ) *
              2 +
              1,

            bNum:
              (
                qfNumber - 1
              ) *
              2 +
              2
          };
        }

        if (
          text.indexOf(
            "sf1"
          ) !== -1
        ) {
          return {
            label:
              "SEMIFINAL 1",

            format:
              getFormat(current),

            aName:
              clean(
                state.site.qf1Winner,
                "Winner QF1"
              ),

            bName:
              clean(
                state.site.qf2Winner,
                "Winner QF2"
              )
          };
        }

        if (
          text.indexOf(
            "sf2"
          ) !== -1
        ) {
          return {
            label:
              "SEMIFINAL 2",

            format:
              getFormat(current),

            aName:
              clean(
                state.site.qf3Winner,
                "Winner QF3"
              ),

            bName:
              clean(
                state.site.qf4Winner,
                "Winner QF4"
              )
          };
        }

        if (
          text.indexOf(
            "grand"
          ) !== -1
        ) {
          return {
            label:
              "GRAND FINALS",

            format:
              getFormat(current),

            aName:
              clean(
                state.site.sf1Winner,
                "Winner SF1"
              ),

            bName:
              clean(
                state.site.sf2Winner,
                "Winner SF2"
              )
          };
        }

        return {
          label:
            getRoundLabel(current),

          format:
            getFormat(current),

          aNum: 1,
          bNum: 2
        };
      }

      function getMatchData() {
        var intro =
          objectValue(
            state.intro
          );

        var explicitA =
          clean(
            firstValue(
              intro,
              [
                "teamAName",
                "teamA",
                "leftTeam"
              ]
            )
          );

        var explicitB =
          clean(
            firstValue(
              intro,
              [
                "teamBName",
                "teamB",
                "rightTeam"
              ]
            )
          );

        var explicitANum =
          Number(
            firstValue(
              intro,
              [
                "teamANumber",
                "teamAIndex"
              ],
              0
            )
          ) || null;

        var explicitBNum =
          Number(
            firstValue(
              intro,
              [
                "teamBNumber",
                "teamBIndex"
              ],
              0
            )
          ) || null;

        if (
          explicitA ||
          explicitB ||
          explicitANum ||
          explicitBNum
        ) {
          var explicitLabel =
            clean(
              firstValue(
                intro,
                [
                  "label",
                  "matchLabel",
                  "round"
                ],
                validCurrentMatch()
              ),
              "MATCH INTRO"
            );

          return {
            label:
              getRoundLabel(
                explicitLabel
              ),

            format:
              clean(
                intro.format,
                getFormat(
                  explicitLabel
                )
              )
                .toUpperCase(),

            aNum:
              explicitANum,

            bNum:
              explicitBNum,

            aName:
              explicitA,

            bName:
              explicitB,

            aSeed:
              clean(
                intro.teamASeed
              ),

            bSeed:
              clean(
                intro.teamBSeed
              )
          };
        }

        var current =
          validCurrentMatch();

        if (current) {
          return bracketMatch(
            current
          );
        }

        var upNext =
          objectValue(
            state.countdown.upNext
          );

        if (
          upNext.teamA &&
          upNext.teamB
        ) {
          var upNextLabel =
            clean(
              upNext.label,
              "MATCH INTRO"
            );

          return {
            label:
              getRoundLabel(
                upNextLabel
              ),

            format:
              getFormat(
                upNextLabel
              ),

            aName:
              clean(
                upNext.teamA
              ),

            bName:
              clean(
                upNext.teamB
              )
          };
        }

        return bracketMatch(
          "QF1 • BO3"
        );
      }

      function teamRecordByName(name) {
        var target =
          normalize(name);

        var key;
        var record;
        var candidate;

        if (!target) {
          return null;
        }

        for (
          key in state.teams
        ) {
          if (
            Object.prototype.hasOwnProperty.call(
              state.teams,
              key
            )
          ) {
            record =
              objectValue(
                state.teams[key]
              );

            candidate =
              normalize(
                firstValue(
                  record,
                  [
                    "name",
                    "teamName",
                    "displayName",
                    "title",
                    "slug"
                  ],
                  key
                )
              );

            if (
              candidate === target ||
              normalize(key) === target
            ) {
              return {
                key: key,
                value: record
              };
            }
          }
        }

        return null;
      }

      function arrayFromCollection(
        value
      ) {
        var output = [];

        if (
          Array.isArray(value)
        ) {
          return value.slice();
        }

        if (
          value &&
          typeof value === "object"
        ) {
          Object.keys(value)
            .forEach(
              function (key) {
                var item =
                  value[key];

                if (
                  item === true
                ) {
                  output.push(
                    key
                  );

                } else if (
                  item !== false &&
                  item !== null &&
                  item !== undefined
                ) {
                  if (
                    typeof item ===
                    "object"
                  ) {
                    item.__key =
                      item.__key ||
                      key;
                  }

                  output.push(item);
                }
              }
            );
        }

        return output;
      }

      function teamRosterReferences(
        teamNumber,
        teamName
      ) {
        var references = [];
        var index;
        var value;

        var directCollections = [
          state.site[
            "team" +
            teamNumber +
            "Players"
          ],

          state.site[
            "team" +
            teamNumber +
            "Roster"
          ]
        ];

        directCollections.forEach(
          function (collection) {
            references =
              references.concat(
                arrayFromCollection(
                  collection
                )
              );
          }
        );

        for (
          index = 1;
          index <= 6;
          index += 1
        ) {
          value =
            firstValue(
              state.site,
              [
                "team" +
                  teamNumber +
                  "Player" +
                  index +
                  "Uid",

                "team" +
                  teamNumber +
                  "Player" +
                  index +
                  "UID",

                "team" +
                  teamNumber +
                  "Player" +
                  index +
                  "Id",

                "team" +
                  teamNumber +
                  "Player" +
                  index +
                  "RgId",

                "team" +
                  teamNumber +
                  "Player" +
                  index
              ]
            );

          if (
            value !== undefined &&
            value !== null &&
            String(value).trim() !== ""
          ) {
            references.push(value);
          }
        }

        var teamRecord =
          teamRecordByName(
            teamName
          );

        if (teamRecord) {
          var record =
            teamRecord.value;

          [
            "playerUids",
            "memberUids",
            "rosterUids",
            "players",
            "members",
            "roster"
          ].forEach(
            function (field) {
              references =
                references.concat(
                  arrayFromCollection(
                    record[field]
                  )
                );
            }
          );

          [
            "captainUid",
            "ownerUid"
          ].forEach(
            function (field) {
              if (record[field]) {
                references.push(
                  record[field]
                );
              }
            }
          );
        }

        var unique = [];
        var seen = {};

        references.forEach(
          function (reference) {
            var signature;

            if (
              reference &&
              typeof reference ===
              "object"
            ) {
              signature =
                clean(
                  firstValue(
                    reference,
                    [
                      "uid",
                      "playerUid",
                      "userId",
                      "id",
                      "rgId",
                      "rivalsIgn",
                      "displayName",
                      "name",
                      "__key"
                    ]
                  )
                );

            } else {
              signature =
                clean(reference);
            }

            signature =
              normalize(signature);

            if (
              signature &&
              !seen[signature]
            ) {
              seen[signature] = true;
              unique.push(reference);
            }
          }
        );

        return unique.slice(
          0,
          6
        );
      }

      function mergedProfiles() {
        var output = {};

        [
          state.players,
          state.publicPlayers,
          state.publicProfiles
        ].forEach(
          function (collection) {
            Object.keys(
              collection || {}
            )
              .forEach(
                function (uid) {
                  output[uid] =
                    Object.assign(
                      {},
                      output[uid] || {},
                      objectValue(
                        collection[uid]
                      ),
                      {
                        __uid: uid
                      }
                    );
                }
              );
          }
        );

        return output;
      }

      function findProfile(
        reference,
        profiles
      ) {
        var referenceObject =
          objectValue(reference);

        var directUid =
          clean(
            firstValue(
              referenceObject,
              [
                "uid",
                "playerUid",
                "userId",
                "id",
                "__key"
              ],

              typeof reference ===
                "string"
                ? reference
                : ""
            )
          );

        if (
          directUid &&
          profiles[directUid]
        ) {
          return Object.assign(
            {},
            referenceObject,
            profiles[directUid]
          );
        }

        var searchValues = [
          directUid,

          firstValue(
            referenceObject,
            [
              "rgId",
              "rgID",
              "rivalsId"
            ]
          ),

          firstValue(
            referenceObject,
            [
              "rivalsIgn",
              "playerName",
              "displayName",
              "ign",
              "username",
              "name"
            ]
          ),

          typeof reference ===
            "string"
            ? reference
            : ""
        ]
          .map(normalize)
          .filter(Boolean);

        var uid;
        var profile;
        var profileValues;

        for (
          uid in profiles
        ) {
          if (
            Object.prototype.hasOwnProperty.call(
              profiles,
              uid
            )
          ) {
            profile =
              profiles[uid];

            profileValues = [
              uid,

              firstValue(
                profile,
                [
                  "rgId",
                  "rgID",
                  "rivalsId"
                ]
              ),

              firstValue(
                profile,
                [
                  "rivalsIgn",
                  "playerName",
                  "displayName",
                  "ign",
                  "username",
                  "name"
                ]
              )
            ]
              .map(normalize)
              .filter(Boolean);

            if (
              searchValues.some(
                function (value) {
                  return (
                    profileValues.indexOf(
                      value
                    ) !== -1
                  );
                }
              )
            ) {
              return Object.assign(
                {},
                referenceObject,
                profile
              );
            }
          }
        }

        return Object.assign(
          {},
          referenceObject
        );
      }

      function textFromPossibleObject(
        value,
        fallback
      ) {
        if (
          value &&
          typeof value === "object"
        ) {
          return clean(
            firstValue(
              value,
              [
                "name",
                "label",
                "title",
                "tier",
                "value"
              ],
              fallback
            ),
            fallback
          );
        }

        return clean(
          value,
          fallback
        );
      }

      function normalizePlayer(
        source,
        fallbackName,
        slot
      ) {
        var player =
          objectValue(source);

        var playerName =
          clean(
            firstValue(
              player,
              [
                "rivalsIgn",
                "playerName",
                "ign",
                "displayName",
                "username",
                "name"
              ],
              fallbackName
            ),
            "PLAYER " + slot
          );

        var rgId =
          firstValue(
            player,
            [
              "rgId",
              "rgID",
              "rivalsId",
              "rivalsID"
            ]
          );

        var profileImage =
          clean(
            firstValue(
              player,
              [
                "profileImage",
                "profilePhoto",
                "profilePicture",
                "avatar",
                "avatarUrl",
                "photoURL",
                "image"
              ]
            )
          );

        var rank =
          textFromPossibleObject(
            firstValue(
              player,
              [
                "rank",
                "competitiveRank",
                "peakRank",
                "marvelRivalsRank",
                "currentRank"
              ]
            ),
            "Rank Not Set"
          );

        var preferredRole =
          textFromPossibleObject(
            firstValue(
              player,
              [
                "preferredRole",
                "mainRole",
                "playerRole",
                "role"
              ]
            ),
            "Flex"
          );

        return {
          name: playerName,
          rgId: formatRgId(rgId),
          profileImage: profileImage,
          rank: rank,
          preferredRole: preferredRole
        };
      }

      function rosterForTeam(
        teamNumber,
        teamName
      ) {
        var references =
          teamRosterReferences(
            teamNumber,
            teamName
          );

        var profiles =
          mergedProfiles();

        var output = [];
        var index;
        var reference;
        var profile;
        var fallbackName;

        for (
          index = 0;
          index < 6;
          index += 1
        ) {
          reference =
            references[index];

          fallbackName =
            clean(
              state.site[
                "team" +
                teamNumber +
                "Player" +
                (
                  index + 1
                )
              ],
              "Player " +
              (
                index + 1
              )
            );

          profile =
            findProfile(
              reference ||
              fallbackName,
              profiles
            );

          output.push(
            normalizePlayer(
              profile,
              fallbackName,
              index + 1
            )
          );
        }

        return output;
      }

      function playerCardHtml(
        player,
        index
      ) {
        var imageHtml = "";

        if (player.profileImage) {
          imageHtml =
            '<img ' +
              'src="' +
              escapeHtml(
                player.profileImage
              ) +
              '" ' +
              'alt="' +
              escapeHtml(
                player.name
              ) +
              '" ' +
              'onload="this.classList.add(\'loaded\')" ' +
              'onerror="this.style.display=\'none\'"' +
            '>';
        }

        return (
          '<article class="player-card" style="--delay:' +
            index +
          '">' +

            '<div class="player-photo">' +

              '<span class="player-initials">' +
                escapeHtml(
                  initials(
                    player.name
                  )
                ) +
              '</span>' +

              imageHtml +

            '</div>' +

            '<div class="player-copy">' +

              '<strong class="player-name">' +
                escapeHtml(
                  player.name
                ) +
              '</strong>' +

              '<span class="player-rgid">' +
                escapeHtml(
                  player.rgId
                ) +
              '</span>' +

              '<div class="player-meta">' +

                '<div class="meta-pill">' +
                  '<small>Rank</small>' +

                  '<strong>' +
                    escapeHtml(
                      player.rank
                    ) +
                  '</strong>' +
                '</div>' +

                '<div class="meta-pill">' +
                  '<small>Preferred Role</small>' +

                  '<strong>' +
                    escapeHtml(
                      player.preferredRole
                    ) +
                  '</strong>' +
                '</div>' +

              '</div>' +

            '</div>' +

          '</article>'
        );
      }

      function renderPlayers(
        container,
        players
      ) {
        container.innerHTML =
          players
            .map(playerCardHtml)
            .join("");
      }

      function seedForTeam(
        teamNumber,
        teamName
      ) {
        var teamRecord =
          teamRecordByName(
            teamName
          );

        if (
          teamRecord &&
          teamRecord.value
        ) {
          return clean(
            firstValue(
              teamRecord.value,
              [
                "seed",
                "tournamentSeed"
              ]
            ),
            "—"
          );
        }

        return clean(
          state.site[
            "team" +
            teamNumber +
            "Seed"
          ],
          "—"
        );
      }

      function scheduleRender() {
        clearTimeout(
          renderTimer
        );

        stage.classList.add(
          "updating"
        );

        renderTimer =
          setTimeout(
            function () {
              render();

              stage.classList.remove(
                "updating"
              );
            },
            150
          );
      }

      function render() {
        var match =
          getMatchData();

        var aNum =
          match.aNum ||
          teamNumberByName(
            match.aName
          ) ||
          1;

        var bNum =
          match.bNum ||
          teamNumberByName(
            match.bName
          ) ||
          2;

        var aName =
          clean(
            match.aName,
            siteTeamName(
              aNum
            )
          );

        var bName =
          clean(
            match.bName,
            siteTeamName(
              bNum
            )
          );

        var round =
          clean(
            match.label,
            "MATCH INTRO"
          )
            .toUpperCase();

        var format =
          clean(
            match.format,
            "BO3"
          )
            .toUpperCase();

        eventName.textContent =
          clean(
            state.site.eventName,
            "RIVALS GAUNTLET"
          )
            .toUpperCase();

        matchHeading.textContent =
          round +
          " • " +
          format;

        teamAName.textContent =
          aName.toUpperCase();

        teamBName.textContent =
          bName.toUpperCase();

        teamASeed.textContent =
          clean(
            match.aSeed,
            seedForTeam(
              aNum,
              aName
            )
          );

        teamBSeed.textContent =
          clean(
            match.bSeed,
            seedForTeam(
              bNum,
              bName
            )
          );

        matchFormat.textContent =
          format;

        roundLabel.textContent =
          round;

        website.textContent =
          clean(
            state.intro.website ||
            state.countdown.website ||
            (
              state.countdown.follow &&
              state.countdown.follow.website
            ),
            "RIVALSGAUNTLET.COM"
          )
            .replace(
              /^https?:\/\//i,
              ""
            )
            .replace(
              /^www\./i,
              ""
            )
            .replace(
              /\/+$/,
              ""
            )
            .toUpperCase();

        renderPlayers(
          teamAPlayers,
          rosterForTeam(
            aNum,
            aName
          )
        );

        renderPlayers(
          teamBPlayers,
          rosterForTeam(
            bNum,
            bName
          )
        );
      }

      function updateConnectionLabel() {
        var profileDataAvailable =
          Object.keys(
            state.players || {}
          ).length > 0 ||
          Object.keys(
            state.publicPlayers || {}
          ).length > 0 ||
          Object.keys(
            state.publicProfiles || {}
          ).length > 0;

        var profileReadAttempted =
          readState.players ||
          readState.publicPlayers ||
          readState.publicProfiles;

        if (
          profileReadAttempted &&
          !profileDataAvailable &&
          (
            !readState.players &&
            !readState.publicPlayers &&
            !readState.publicProfiles
          )
        ) {
          connection.classList.add(
            "limited"
          );

          connectionText.textContent =
            "PROFILE DATA LIMITED";

          return;
        }

        connection.classList.remove(
          "limited"
        );
      }

      function connect() {
        var db;

        try {
          if (
            typeof firebase ===
              "undefined" ||
            !firebase.apps ||
            firebase.apps.length === 0
          ) {
            throw new Error(
              "Firebase is not initialized. Check ../firebase.js."
            );
          }

          db =
            firebase.database();

          db.ref(
            ".info/connected"
          ).on(
            "value",

            function (snapshot) {
              var online =
                snapshot.val() ===
                true;

              connection.classList.toggle(
                "online",
                online
              );

              if (online) {
                connectionText.textContent =
                  "REALTIME CONNECTED";

                updateConnectionLabel();

              } else {
                connectionText.textContent =
                  "RECONNECTING";
              }
            }
          );

          [
            {
              path: "site",
              key: "site",
              required: true
            },

            {
              path:
                "broadcastCountdown",
              key: "countdown",
              required: true
            },

            {
              path:
                "broadcastMatchIntro",
              key: "intro",
              required: false
            },

            {
              path: "players",
              key: "players",
              required: false
            },

            {
              path:
                "publicPlayers",
              key:
                "publicPlayers",
              required: false
            },

            {
              path:
                "publicProfiles",
              key:
                "publicProfiles",
              required: false
            },

            {
              path: "teams",
              key: "teams",
              required: false
            }
          ].forEach(
            function (listener) {
              db.ref(
                listener.path
              ).on(
                "value",

                function (snapshot) {
                  state[
                    listener.key
                  ] =
                    snapshot.val() || {};

                  if (
                    Object.prototype.hasOwnProperty.call(
                      readState,
                      listener.key
                    )
                  ) {
                    readState[
                      listener.key
                    ] = true;
                  }

                  updateConnectionLabel();
                  scheduleRender();
                },

                function (error) {
                  if (
                    Object.prototype.hasOwnProperty.call(
                      readState,
                      listener.key
                    )
                  ) {
                    readState[
                      listener.key
                    ] = false;
                  }

                  if (
                    listener.required
                  ) {
                    connection.classList.add(
                      "limited"
                    );

                    connectionText.textContent =
                      error &&
                      error.code ===
                        "PERMISSION_DENIED"
                        ? "READ BLOCKED"
                        : "DATA UNAVAILABLE";

                  } else {
                    updateConnectionLabel();
                  }

                  console.warn(
                    "[RG MATCH INTRO] " +
                    listener.path +
                    " read failed:",
                    error
                  );
                }
              );
            }
          );

        } catch (error) {
          connection.classList.add(
            "limited"
          );

          connectionText.textContent =
            "FIREBASE ERROR";

          console.error(
            "[RG MATCH INTRO] Startup failed:",
            error
          );
        }
      }

      render();
      connect();
    })();
  </script>
</body>
</html>
