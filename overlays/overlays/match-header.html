<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, initial-scale=1.0" />
  <title>Rivals Gauntlet Match Header</title>
  <link rel="stylesheet" href="overlay.css" />
</head>
<body>

  <div class="match-header">
    <div class="team team-left">
      <div class="team-logo">RG</div>
      <div>
        <h2 id="teamA">TEAM ALPHA</h2>
        <p>ALPHA</p>
      </div>
    </div>

    <div class="score-box">
      <div id="scoreA" class="score">0</div>
      <div class="center-brand">
        <h1>RIVALS</h1>
        <span>GAUNTLET</span>
        <small id="matchInfo">ROUND 1 • BEST OF 3</small>
      </div>
      <div id="scoreB" class="score">0</div>
    </div>

    <div class="team team-right">
      <div>
        <h2 id="teamB">TEAM BRAVO</h2>
        <p>BRAVO</p>
      </div>
      <div class="team-logo">RG</div>
    </div>
  </div>

  <script src="overlay.js"></script>
</body>
</html>
